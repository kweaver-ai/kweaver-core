name: Release Umbrella Charts

on:
  push:
    tags: ['v*']
    branches:
      - 'feature/umbrella-chart-oci'   # TODO: remove after testing
    paths:
      - 'deploy/charts/**'
      - '.github/workflows/umbrella-release.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  OCI_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Push all subchart .tgz packages to OCI (from helm-repo/packages)
  # -------------------------------------------------------------------------
  push-subcharts:
    name: Push Subcharts to OCI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout helm-repo (subchart packages)
        uses: actions/checkout@v4
        with:
          repository: kweaver-ai/helm-repo
          path: helm-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Extract required subchart versions from Chart.yaml
        id: deps
        run: |
          PACKAGES=""
          for chart in deploy/charts/kweaver-core/Chart.yaml deploy/charts/kweaver-dip/Chart.yaml; do
            while IFS= read -r line; do
              name=$(echo "$line" | cut -d'|' -f1)
              version=$(echo "$line" | cut -d'|' -f2)
              repo=$(echo "$line" | cut -d'|' -f3)
              # Only process subchart dependencies (skip kweaver-core self-reference)
              if [[ "$repo" == *"/charts"* ]]; then
                PACKAGES="${PACKAGES} ${name}-${version}.tgz"
              fi
            done < <(yq e '.dependencies[] | .name + "|" + .version + "|" + .repository' "$chart")
          done
          echo "packages=$(echo $PACKAGES | tr ' ' '\n' | sort -u | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Push subcharts to OCI
        run: |
          cd helm-repo/packages
          SUCCESS=0; SKIP=0; FAIL=0
          for pkg in ${{ steps.deps.outputs.packages }}; do
            if [ -f "$pkg" ]; then
              echo "::group::Pushing $pkg"
              if helm push "$pkg" oci://${{ env.OCI_REGISTRY }}/charts; then
                SUCCESS=$((SUCCESS+1))
              else
                FAIL=$((FAIL+1))
              fi
              echo "::endgroup::"
            else
              echo "::warning::$pkg not found in helm-repo/packages, skipping"
              SKIP=$((SKIP+1))
            fi
          done
          echo "Push complete: $SUCCESS success, $SKIP skipped, $FAIL failed"
          if [ $FAIL -gt 0 ]; then exit 1; fi

  # -------------------------------------------------------------------------
  # Job 2: Build and push umbrella charts (depends on subcharts)
  # -------------------------------------------------------------------------
  push-umbrella:
    name: Build & Push Umbrella Charts to OCI
    needs: push-subcharts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push kweaver-core
        run: |
          helm dependency update deploy/charts/kweaver-core
          helm package deploy/charts/kweaver-core -d /tmp/pkg
          helm push /tmp/pkg/kweaver-core-*.tgz oci://${{ env.OCI_REGISTRY }}

      - name: Build & Push kweaver-dip
        run: |
          helm dependency update deploy/charts/kweaver-dip
          helm package deploy/charts/kweaver-dip -d /tmp/pkg
          helm push /tmp/pkg/kweaver-dip-*.tgz oci://${{ env.OCI_REGISTRY }}
