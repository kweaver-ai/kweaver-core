openapi: 3.0.3
info:
  title: Schema Search 标准接口
  version: 1.0.0
  description: |
    `search_schema` 是新版本标准 Schema Search HTTP 契约。

    该接口用于根据自然语言 query 探索知识网络中的：
    - `object_types`
    - `relation_types`
    - `action_types`

    该接口固定为 Schema-only，不返回实例数据，也不承担实例检索。
servers:
  - url: http://agent-retrieval:30779
    description: agent-retrieval 服务
paths:
  /api/agent-retrieval/in/v1/kn/search_schema:
    post:
      tags:
        - SchemaSearch
      summary: search_schema
      description: |
        统一的 Schema 探索入口。适用于还不确定应该继续调用哪个
        `query_*`、`find_*`、`get_*` 工具时，先通过该接口探索相关 schema 概念。
      parameters:
        - name: x-account-id
          in: header
          required: false
          schema:
            type: string
        - name: x-account-type
          in: header
          required: false
          schema:
            type: string
            enum: [user, app, anonymous]
        - name: x-kn-id
          in: header
          required: false
          schema:
            type: string
          description: 知识网络ID。Header 优先，body `kn_id` 为兼容兜底。
        - name: response_format
          in: query
          required: false
          schema:
            type: string
            enum: [json, toon]
            default: json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchSchemaRequest'
      responses:
        '200':
          description: 成功返回 Schema 探索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchSchemaResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SearchSchemaRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: 用户查询问题或关键词
        kn_id:
          type: string
          description: 知识网络ID。未配置 `x-kn-id` Header 时可在 body 中兜底传入。
        search_scope:
          $ref: '#/components/schemas/SearchScope'
        max_concepts:
          type: integer
          minimum: 1
          default: 10
          description: Schema 候选规模上限
        schema_brief:
          type: boolean
          default: true
          description: 是否返回精简 Schema
        enable_rerank:
          type: boolean
          default: true
          description: 是否启用关系类型 Rerank

    SearchScope:
      type: object
      description: |
        Schema 探索范围。至少需要开启一种概念类型；不传时默认三类全开。
      properties:
        include_object_types:
          type: boolean
          default: true
          description: 是否包含对象类
        include_relation_types:
          type: boolean
          default: true
          description: 是否包含关系类
        include_action_types:
          type: boolean
          default: true
          description: 是否包含动作类

    SearchSchemaResponse:
      type: object
      properties:
        object_types:
          type: array
          description: 对象类型列表
          items:
            type: object
            additionalProperties: true
        relation_types:
          type: array
          description: 关系类型列表
          items:
            type: object
            additionalProperties: true
        action_types:
          type: array
          description: 动作类型列表
          items:
            type: object
            additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        details:
          description: 错误详情
          additionalProperties: true
        solution:
          type: string
        link:
          type: string
