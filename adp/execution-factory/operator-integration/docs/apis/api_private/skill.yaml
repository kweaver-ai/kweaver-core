openapi: "3.0.2"
info:
  title: "Agent Skill 私有接口"
  description: "Agent Skill 私有只读、市场查询与执行接口，用于集群内部服务调用，无需接口认证信息"
  version: "1.0.0"
servers:
  - url: "http://{host}:{port}/api/agent-operator-integration/internal-v1"
    description: "Agent Skill 私有接口地址"
    variables:
      host:
        default: "agent-operator-integration"
        description: "服务地址"
      port:
        default: "9000"
        description: "服务端口"

paths:
  /skills/index/build:
    get:
      summary: "查询 Skill 索引构建任务列表"
      description: "分页查询 Skill 索引构建任务列表，支持按状态、执行类型和创建人过滤。"
      tags:
        - "Skill 索引"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/All"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - "pending"
              - "running"
              - "completed"
              - "failed"
        - name: execute_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - "full"
              - "incremental"
        - name: create_user
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuerySkillIndexBuildTaskListResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: "创建 Skill 索引构建任务"
      description: "创建 Skill 索引全量或增量构建任务，任务创建后由 Asynq worker 异步执行。"
      tags:
        - "Skill 索引"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillIndexBuildTaskReq"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSkillIndexBuildTaskResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: "已有运行中任务"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/index/build/{task_id}:
    get:
      summary: "查询 Skill 索引构建任务"
      description: "根据任务 ID 查询 Skill 索引构建任务状态和统计信息。"
      tags:
        - "Skill 索引"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - name: task_id
          in: path
          description: "任务 ID"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillIndexBuildTaskResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "任务不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/index/build/{task_id}/cancel:
    post:
      summary: "取消 Skill 索引构建任务"
      description: "取消指定的 Skill 索引构建任务。对于 active 任务发送取消信号；对于
        pending/scheduled/retry/archived 任务直接从队列移除。"
      tags:
        - "Skill 索引"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - name: task_id
          in: path
          description: "任务 ID"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSkillIndexBuildTaskResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "任务不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: "任务不可取消"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/index/build/{task_id}/retry:
    post:
      summary: "重试 Skill 索引构建任务"
      description: "仅允许对 failed 任务发起重试。重试会创建一个新的构建任务，不复用原 task_id。"
      tags:
        - "Skill 索引"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - name: task_id
          in: path
          description: "原任务 ID"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrySkillIndexBuildTaskResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "任务不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: "任务不可重试"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/market:
    get:
      summary: "查询 Skill 市场列表"
      description: "分页查询 Skill 市场列表，仅返回 Skill 摘要信息。"
      tags:
        - "Skill 市场"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/All"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
        - name: name
          in: query
          description: "Skill 名称"
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: "Skill 分类"
          required: false
          schema:
            type: string
            enum:
              - "other_category"
              - "system"
        - name: create_user
          in: query
          description: "创建用户"
          required: false
          schema:
            type: string
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuerySkillMarketListResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "无权限"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/market/{skill_id}:
    get:
      summary: "获取 Skill 市场详情"
      description: "根据 Skill ID 获取 Skill 市场详情。"
      tags:
        - "Skill 市场"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillInfoResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "无权限"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/content:
    get:
      summary: "获取 Skill 内容索引"
      description: "根据 Skill ID 获取 SKILL.md 下载地址、文件清单和当前状态。"
      tags:
        - "Skill 读取"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSkillContentResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "无权限"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/files/read:
    post:
      summary: "读取 Skill 文件"
      description: "根据 Skill ID 和相对路径读取指定文件元信息与下载地址。"
      tags:
        - "Skill 读取"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadSkillFileReq"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadSkillFileResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "无权限"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "文件或 Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/execute:
    post:
      summary: "执行 Skill"
      description: "执行工厂通过 Session Pool 获取可用 Sandbox 会话，上传 Skill 压缩包，并在上传接口返回的工作目录中执行入口命令。"
      tags:
        - "Skill 执行"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteSkillReq"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteSkillResp"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "无权限"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: "内部错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/management/content:
    get:
      summary: "获取 Skill 管理态内容"
      description: "读取当前编辑态的 SKILL.md 下载 URL 和文件清单"
      tags:
        - "Skill - Management Read"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
        - name: response_mode
          in: query
          description: "响应模式。url(默认)返回 OSS 预签名 URL；content 返回内联正文；auto 根据注册类型自动选择"
          required: false
          schema:
            type: string
            enum: [url, content, auto]
            default: url
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagementContentResponse"
        "400":
          description: "参数错误"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "权限不足"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/management/files/read:
    post:
      summary: "读取管理态指定文件"
      description: "读取当前编辑态的指定文件内容，返回 OSS 预签名下载 URL"
      tags:
        - "Skill - Management Read"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rel_path
              properties:
                rel_path:
                  type: string
                  description: "文件相对路径"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadSkillFileResp"
        "400":
          description: "参数错误或路径非法"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "权限不足"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "文件或 Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /skills/{skill_id}/management/download:
    get:
      summary: "下载管理态 Skill 包"
      description: "下载当前编辑态的完整 Skill 包（ZIP 格式）"
      tags:
        - "Skill - Management Read"
      parameters:
        - $ref: "#/components/parameters/BusinessDomain"
        - $ref: "#/components/parameters/AccountID"
        - $ref: "#/components/parameters/AccountType"
        - $ref: "#/components/parameters/SkillID"
        - name: response_mode
          in: query
          description: "响应模式。url(默认)返回 OSS 预签名 URL；content 返回内联正文；auto 根据注册类型自动选择"
          required: false
          schema:
            type: string
            enum: [url, content, auto]
            default: url
      responses:
        "200":
          description: "成功"
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "403":
          description: "权限不足"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Skill 不存在"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    BusinessDomain:
      name: x-business-domain
      in: header
      description: "业务域 ID"
      required: true
      schema:
        type: string
    AccountID:
      name: x-account-id
      in: header
      description: "用户 ID"
      required: false
      schema:
        type: string
    AccountType:
      name: x-account-type
      in: header
      description: "用户类型"
      required: false
      schema:
        type: string
    SkillID:
      name: skill_id
      in: path
      description: "Skill ID"
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      description: "页码，从 1 开始，默认 1"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      description: "每页数量，默认 10，最大 100"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    All:
      name: all
      in: query
      description: "是否返回全部"
      required: false
      schema:
        type: boolean
        default: false
    SortBy:
      name: sort_by
      in: query
      description: "排序字段"
      required: false
      schema:
        type: string
        enum:
          - "create_time"
          - "update_time"
          - "name"
        default: "update_time"
    SortOrder:
      name: sort_order
      in: query
      description: "排序方式"
      required: false
      schema:
        type: string
        enum:
          - "asc"
          - "desc"
        default: "desc"

  schemas:
    CreateSkillIndexBuildTaskReq:
      type: object
      required:
        - execute_type
      properties:
        execute_type:
          type: string
          enum:
            - "full"
            - "incremental"

    CreateSkillIndexBuildTaskResp:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              enum:
                - "pending"
                - "running"
                - "completed"
                - "failed"
            execute_type:
              type: string
              enum:
                - "full"
                - "incremental"

    SkillIndexBuildTaskResp:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              enum:
                - "pending"
                - "running"
                - "completed"
                - "failed"
            execute_type:
              type: string
              enum:
                - "full"
                - "incremental"
            queue_state:
              type: string
              enum:
                - "pending"
                - "active"
                - "scheduled"
                - "retry"
                - "archived"
                - "completed"
                - "aggregating"
            total_count:
              type: integer
              format: int64
            success_count:
              type: integer
              format: int64
            delete_count:
              type: integer
              format: int64
            failed_count:
              type: integer
              format: int64
            retry_count:
              type: integer
              format: int64
            max_retry:
              type: integer
              format: int64
            cursor_update_time:
              type: integer
              format: int64
            cursor_skill_id:
              type: string
            error_msg:
              type: string
            create_user:
              type: string
            create_time:
              type: integer
              format: int64
            update_time:
              type: integer
              format: int64
            last_finished_time:
              type: integer
              format: int64

    CancelSkillIndexBuildTaskResp:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            task_id:
              type: string
            action:
              type: string
              enum:
                - "cancel_processing"
                - "delete_queue_task"
            queue_state:
              type: string
              enum:
                - "pending"
                - "active"
                - "scheduled"
                - "retry"
                - "archived"
                - "completed"
                - "aggregating"

    RetrySkillIndexBuildTaskResp:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            source_task_id:
              type: string
            task_id:
              type: string
            status:
              type: string
              enum:
                - "pending"
                - "running"
                - "completed"
                - "failed"
            execute_type:
              type: string
              enum:
                - "full"
                - "incremental"

    QuerySkillIndexBuildTaskListResp:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
            total_pages:
              type: integer
            has_next:
              type: boolean
            has_prev:
              type: boolean
            data:
              type: array
              items:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    enum:
                      - "pending"
                      - "running"
                      - "completed"
                      - "failed"
                  execute_type:
                    type: string
                    enum:
                      - "full"
                      - "incremental"
                  queue_state:
                    type: string
                  total_count:
                    type: integer
                    format: int64
                  success_count:
                    type: integer
                    format: int64
                  delete_count:
                    type: integer
                    format: int64
                  failed_count:
                    type: integer
                    format: int64
                  retry_count:
                    type: integer
                    format: int64
