apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.moduleName }}-cm
  namespace: {{ .Values.namespace }}
data:
  vega-backend-config.yaml: |
    server:
      {{- toYaml .Values.config.server | nindent 6 }}
    log:
      {{- toYaml .Values.config.log | nindent 6 }}
    otel:
      {{- toYaml .Values.config.otel | nindent 6 }}
  {{- if .Values.config.crypto.enabled }}
    crypto:
      {{- toYaml .Values.config.crypto | nindent 6 }}
  {{- end }}
    depServices: 
      {{- toYaml .Values.depServices | nindent 6 }}

  dm_svc.conf: |
    TIME_ZON=(480)
    LANGUAGE=(cn)
    DM=({{ .Values.depServices.rds.host }})
    [DM]
    LOGIN_MODE=(1)
