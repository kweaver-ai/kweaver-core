server:
  runMode: release
  httpPort: 13018
  language: zh-CN
  readTimeOut: 120
  writeTimeOut: 120
  viewDataTimeout: 5m
  defaultSmallModelEnabled: true
  filteredCrossJoinMaxEdgeExpand: 10000
log:
  logLevel: debug
  developMode: false
  maxAge: 100
  maxBackups: 20
  maxSize: 100
otel:
  service_name: "ontology-query"
  environment: "production"
  otlp_endpoint: "otelcol-contrib:4318"
  trace:
    enabled: false
    sampling_rate: 1.0
  log:
    enabled: false
    level: "info"

