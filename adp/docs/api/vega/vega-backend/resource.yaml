paths:
  /resources:
    get:
      consumes:
      - application/json
      description: 'Get a list of resources with pagination and filters. Note: The response does not include sourceMetadata,
        schemaDefinition, and logicDefinition fields.'
      parameters:
      - description: Catalog ID filter
        in: query
        name: catalog_id
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Database filter
        in: query
        name: database
        type: string
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: Limit for pagination
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 20
      - description: Sort field
        enum:
        - name
        - update_time
        in: query
        name: sort
        type: string
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of resources
                items:
                  $ref: resource.yaml#/definitions/interfaces.ResourceListItem
                type: array
              total_count:
                description: Total number of resources
                type: integer
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: List resources
      tags:
      - resources
    post:
      consumes:
      - application/json
      description: Create a new resource
      parameters:
      - description: Resource information
        in: body
        name: resource
        required: true
        schema:
          $ref: resource.yaml#/definitions/interfaces.ResourceRequest
      produces:
      - application/json
      responses:
        '201':
          description: Created
          schema:
            properties:
              id:
                description: Resource ID
                type: string
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Create resource
      tags:
      - resources
  /resources/dataset/{id}/docs:
    post:
      consumes:
      - application/json
      description: Create documents in a dataset
      parameters:
      - description: Dataset ID
        in: path
        name: id
        required: true
        type: string
      - description: Documents to create
        in: body
        name: documents
        required: true
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
      produces:
      - application/json
      responses:
        '201':
          description: Created
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Create dataset documents
      tags:
      - resources
    put:
      consumes:
      - application/json
      description: Update documents in a dataset
      parameters:
      - description: Dataset ID
        in: path
        name: id
        required: true
        type: string
      - description: Documents to update
        in: body
        name: documents
        required: true
        schema:
          items:
            additionalProperties: true
            type: object
          type: array
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Update dataset documents
      tags:
      - resources
  /resources/dataset/{id}/docs/query:
    post:
      consumes:
      - application/json
      description: Delete documents from a dataset by query
      parameters:
      - description: Dataset ID
        in: path
        name: id
        required: true
        type: string
      - description: Delete query
        in: body
        name: query
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Delete dataset documents by query
      tags:
      - resources
  /resources/dataset/{id}/docs/{ids}:
    delete:
      consumes:
      - application/json
      description: Delete documents from a dataset
      parameters:
      - description: Dataset ID
        in: path
        name: id
        required: true
        type: string
      - description: Comma-separated document IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Delete dataset documents
      tags:
      - resources
  /resources/dataset/{id}/{docid}:
    get:
      consumes:
      - application/json
      description: Get a document from a dataset
      parameters:
      - description: Dataset ID
        in: path
        name: id
        required: true
        type: string
      - description: Document ID
        in: path
        name: docid
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Get dataset document
      tags:
      - resources
  /resources/list:
    get:
      consumes:
      - application/json
      description: List resources by type (catalog or resource)
      parameters:
      - description: Resource type filter
        enum:
        - catalog
        - resource
        in: query
        name: resource_type
        required: true
        type: string
      - description: Resource ID filter (only for resource type)
        in: query
        name: id
        type: string
      - description: Keyword filter for search (only for resource type)
        in: query
        name: keyword
        type: string
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: Limit for pagination
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 50
      - description: Sort field
        enum:
        - name
        - update_time
        in: query
        name: sort
        type: string
        default: update_time
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of resources
                items:
                  properties:
                    id:
                      description: Resource ID
                      type: string
                    type:
                      description: Resource type (catalog or resource)
                      type: string
                    name:
                      description: Resource name
                      type: string
                  type: object
                type: array
              total_count:
                description: Total number of resources
                type: integer
            type: object
          example:
            entries:
            - id: d6iiqvm0r29s7n7udqg0
              type: catalog
              name: mysql_172_17_200_241
            - id: d70up3m0r29lf36jl8ug
              type: catalog
              name: postgresql_172_17_200_241
            - id: d6l8krm0r29m570j6mj0
              type: catalog
              name: opensearch_172_17_200_241
            - id: d6l3mtu0r29tps46mleg
              type: catalog
              name: mariadb_172_17_200_241
            total_count: 4
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: List resources by type
      tags:
      - resources
  /resources/query:
    post:
      consumes:
      - application/json
      description: Execute a query with any resource
      parameters:
      - description: Query parameters
        in: body
        name: query
        required: true
        schema:
          $ref: resource.yaml#/definitions/interfaces.SQLQueryRequest
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: resource.yaml#/definitions/interfaces.SQLQueryResponse
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Execute query
      tags:
      - query
  /resources/{ids}:
    delete:
      consumes:
      - application/json
      description: Delete resources by IDs
      parameters:
      - description: Comma-separated resource IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Delete resources
      tags:
      - resources
    get:
      consumes:
      - application/json
      description: Get resources by IDs
      parameters:
      - description: Comma-separated resource IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of resources
                items:
                  $ref: resource.yaml#/definitions/interfaces.Resource
                type: array
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Get resources
      tags:
      - resources
  /resources/{id}:
    put:
      consumes:
      - application/json
      description: Update a resource by ID
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Resource information
        in: body
        name: resource
        required: true
        schema:
          $ref: resource.yaml#/definitions/interfaces.ResourceRequest
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Update resource
      tags:
      - resources
  /resources/{id}/data:
    post:
      consumes:
      - application/json
      description: Query data from a resource
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Query parameters
        in: body
        name: query
        required: true
        schema:
          $ref: resource.yaml#/definitions/interfaces.ResourceDataQueryParams
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Query resource data
      tags:
      - resources
definitions:
  interfaces.ResourceDataQueryParams:
    properties:
      filter_condition: {}
      limit:
        description: 返回结果的最大数量。对于AnyShare知识库类资源，limit不能大于100
        type: integer
      need_total:
        description: 是否返回总数。对于AnyShare知识库类资源，只有第一页(offset=0)会返回
        type: boolean
      offset:
        type: integer
      output_fields:
        description: 指定输出的字段列表
        items:
          type: string
        type: array
      sort:
        items:
          $ref: common.yaml#/definitions/interfaces.SortField
        type: array
    type: object
  interfaces.ResourceRequest:
    properties:
      catalog_id:
        description: 所属catalog ID，最大40字符
        type: string
      category:
        description: 数据资源类型，table表示表，file表示文件，fileset表示文件集，api表示API服务，metric表示时序数据，topic表示消息队列主题，index表示索引，logicview表示逻辑视图，dataset表示数据集
        enum:
        - table
        - file
        - fileset
        - api
        - metric
        - topic
        - index
        - logicview
        - dataset
        type: string
      database:
        description: 所属数据库名称（实例级Catalog时使用），最大128字符
        type: string
      description:
        maxLength: 1000
        description: 数据资源描述，最大1000字符
        type: string
      name:
        maxLength: 255
        minLength: 1
        description: 数据资源名称，catalog下唯一，最大255字符
        type: string
      schema_definition:
        description: Schema定义（JSON数组格式，包含所有字段信息），每个字段包含name、type、description、type_config等属性
        items:
          $ref: common.yaml#/definitions/interfaces.Property
        type: array
      source_identifier:
        description: 源端标识（表名/文件路径/索引名等），最大500字符
        type: string
      status:
        description: 数据资源状态，active表示活跃，disabled表示已禁用，deprecated表示已废弃，stale表示已过期
        enum:
        - active
        - disabled
        - deprecated
        - stale
        type: string
      tags:
        items:
          maxLength: 40
          minLength: 1
          type: string
        maxItems: 5
        description: 标签列表，JSON数组格式，用于分类和检索，最多5个，每个标签最大40字符
        type: array
      logic_definition:
        description: 逻辑定义（JSON数组格式，仅在category为logicview时使用）
        items:
          $ref: resource.yaml#/definitions/interfaces.LogicDefinitionNode
        type: array
    required:
    - catalog_id
    - name
    - category
    type: object
  interfaces.Resource:
    properties:
      id:
        description: resource唯一标识，最大40字符
        type: string
      catalog_id:
        description: 所属catalog ID，最大40字符
        type: string
      name:
        description: 数据资源名称，catalog下唯一，最大255字符
        type: string
      tags:
        description: 标签，JSON数组格式，用于分类和检索，最大255字符
        items:
          type: string
        type: array
      description:
        description: 数据资源描述，最大1000字符
        type: string
      category:
        description: 数据资源类型，table表示表，file表示文件，fileset表示文件集，api表示API服务，metric表示时序数据，topic表示消息队列主题，index表示索引，logicview表示逻辑视图，dataset表示数据集
        enum:
        - table
        - file
        - fileset
        - api
        - metric
        - topic
        - index
        - logicview
        - dataset
        type: string
      status:
        description: 数据资源状态，active表示活跃，disabled表示已禁用，deprecated表示已废弃，stale表示已过期
        enum:
        - active
        - disabled
        - deprecated
        - stale
        type: string
      status_message:
        description: 状态说明，最大500字符
        type: string
      database:
        description: 所属数据库名称（实例级连接时使用），最大128字符
        type: string
      source_identifier:
        description: 源端标识（表名/文件路径/索引名等），最大500字符
        type: string
      source_metadata:
        description: 源端元数据（JSON格式），包含源端配置信息
        type: object
      schema_definition:
        description: Schema定义（JSON数组格式，包含所有字段信息），每个字段包含name、type、description、type_config、source_name、source_type、is_native、is_primary、is_nullable、default_value、ordinal_position等属性
        items:
          $ref: common.yaml#/definitions/interfaces.Property
        type: array
      creator:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 创建者信息，包含id、type、name
      create_time:
        description: 创建时间，Unix时间戳（毫秒）
        type: integer
      updater:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 更新者信息，包含id、type、name
      update_time:
        description: 最后更新时间，Unix时间戳（毫秒）
        type: integer
      operations:
        description: 可执行的操作列表，如["read", "write", "delete"]
        items:
          type: string
        type: array
      logic_type:
        description: 逻辑类型，derived表示衍生，composite表示复合
        enum:
        - derived
        - composite
        type: string
      logic_definition:
        description: 逻辑定义
        items:
          $ref: resource.yaml#/definitions/interfaces.LogicDefinitionNode
        type: array
    type: object
  interfaces.ResourceListItem:
    properties:
      id:
        description: resource唯一标识，最大40字符
        type: string
      catalog_id:
        description: 所属catalog ID，最大40字符
        type: string
      name:
        description: 数据资源名称，catalog下唯一，最大255字符
        type: string
      tags:
        description: 标签，JSON数组格式，用于分类和检索，最大255字符
        items:
          type: string
        type: array
      description:
        description: 数据资源描述，最大1000字符
        type: string
      category:
        description: 数据资源类型，table表示表，file表示文件，fileset表示文件集，api表示API服务，metric表示时序数据，topic表示消息队列主题，index表示索引，logicview表示逻辑视图，dataset表示数据集
        enum:
        - table
        - file
        - fileset
        - api
        - metric
        - topic
        - index
        - logicview
        - dataset
        type: string
      status:
        description: 数据资源状态，active表示活跃，disabled表示已禁用，deprecated表示已废弃，stale表示已过期
        enum:
        - active
        - disabled
        - deprecated
        - stale
        type: string
      status_message:
        description: 状态说明，最大500字符
        type: string
      database:
        description: 所属数据库名称（实例级连接时使用），最大128字符
        type: string
      source_identifier:
        description: 源端标识（表名/文件路径/索引名等），最大500字符
        type: string
      creator:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 创建者信息，包含id、type、name
      create_time:
        description: 创建时间，Unix时间戳（毫秒）
        type: integer
      updater:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 更新者信息，包含id、type、name
      update_time:
        description: 最后更新时间，Unix时间戳（毫秒）
        type: integer
      operations:
        description: 可执行的操作列表，如["read", "write", "delete"]
        items:
          type: string
        type: array
      logic_type:
        description: 逻辑类型，derived表示衍生，composite表示复合
        enum:
        - derived
        - composite
        type: string
    type: object
  interfaces.SQLQueryRequest:
    properties:
      query:
        description: 查询语句，与query_id不能同时存在，sql类查询为string，opensearch查询为object
        minLength: 1
        type: any
      resource_type:
        description: 必填，数据源类型
        enum:
        - mariadb
        - mysql
        - opensearch
        - postgresql
        minLength: 1
        type: string
      resource_id:
        description: 查询opensearch数据源必填参数，其他数据源不填
        minLength: 1
        type: string
      query_type:
        description: 非必填，查询类型，不填则默认为标准查询
        enum:
        - standard
        - stream
        minLength: 1
        type: string
      query_id:
        description: SQL类流式查询必填参数，首次请求不需要，从第二次请求开始往后每次请求都必须填写
        minLength: 1
        type: string
      query_timeout:
        description: 单位：秒。超时后可以选择是否继续等待，如果继续等待，根据响应中的query_id发起下一次请求
        maximum: 3600
        minimum: 1
        type: integer
      stream_size:
        description: 流式查询指定每批次返回的记录数，默认值10000
        maximum: 10000
        minimum: 100
        type: integer
    required:
    - resource_type
    type: object
  interfaces.SQLQueryResponse:
    properties:
      columns:
        description: 查询结果列信息
        items:
          properties:
            name:
              description: 列名
              type: string
            type:
              description: 列类型
              type: string
          type: object
        type: array
      entries:
        description: 查询结果数据，每条记录为一个对象，key为列名，value为列值
        items:
          type: object
        type: array
      total_count:
        description: 查询结果总条数
        type: integer
      stats:
        description: 查询统计信息
        properties:
          is_timeout:
            description: 查询是否超时
            type: boolean
          query_id:
            description: 查询ID，用于流式查询时获取下一批数据
            type: string
          has_more:
            description: 是否还有更多数据（流式查询时使用）
            type: boolean
          search_after:
            description: OpenSearch流式查询的search_after值，用于获取下一批数据
            items:
              type: object
            type: array
          offset:
            description: 已获取到的数据总数（流式查询模式）
            type: integer
        type: object
    type: object
  interfaces.TableInQuery:
    properties:
      resource_id:
        type: string
      alias:
        type: string
    type: object
  interfaces.JoinSpec:
    properties:
      type:
        description: inner, left, right, full
        enum:
        - inner
        - left
        - right
        - full
        type: string
      left_table_alias:
        minLength: 1
        type: string
      right_table_alias:
        minLength: 1
        type: string
      true:
        description: JOIN ON 条件
