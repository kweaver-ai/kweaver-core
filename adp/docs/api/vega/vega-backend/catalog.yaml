paths:
  /catalogs:
    get:
      consumes:
      - application/json
      description: Get a list of catalogs with pagination and filters
      parameters:
      - description: Tag filter
        in: query
        maxLength: 40
        name: tag
        type: string
      - description: Type filter
        in: query
        name: type
        type: string
      - description: Health check status filter
        in: query
        name: health_check_status
        type: string
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: Limit for pagination
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 20
      - description: Sort field
        enum:
        - name
        - update_time
        in: query
        name: sort
        type: string
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of catalogs
                items:
                  $ref: catalog.yaml#/definitions/interfaces.Catalog
                type: array
              total_count:
                description: Total number of catalogs
                type: integer
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: List catalogs
      tags:
      - catalogs
    post:
      consumes:
      - application/json
      description: Create a new catalog
      parameters:
      - description: Catalog information
        in: body
        name: catalog
        required: true
        schema:
          $ref: catalog.yaml#/definitions/interfaces.CatalogRequest
      produces:
      - application/json
      responses:
        '201':
          description: Created
          schema:
            properties:
              id:
                description: Catalog ID
                type: string
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Create catalog
      tags:
      - catalogs
  /catalogs/scheduled-discover:
    get:
      consumes:
      - application/json
      description: 查询定时发现任务列表，支持按目录ID和任务状态过滤
      parameters:
      - description: 目录ID，如果为空则查询所有目录的定时发现任务
        in: query
        name: id
        required: false
        type: string
      - description: 任务状态过滤，"true"表示只返回已启用的任务，"false"表示只返回已禁用的任务
        in: query
        name: enabled
        required: false
        type: string
      - description: 分页偏移量，默认值由系统定义
        in: query
        name: offset
        required: false
        type: integer
      - description: 每页返回数量，默认值由系统定义
        in: query
        name: limit
        required: false
        type: integer
      - description: 排序字段，默认为"create_time"
        in: query
        name: sort
        required: false
        type: string
      - description: 排序方向，默认为"desc"
        in: query
        name: direction
        required: false
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: 定时发现任务列表
                items:
                  $ref: catalog.yaml#/definitions/interfaces.ScheduledDiscoverTask
                type: array
              total_count:
                description: 总数
                type: integer
            type: object
        '400':
          description: Bad Request - 请求参数无效
          schema:
            type: object
        '404':
          description: Not Found - 目录不存在（当提供目录ID时）
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: 查询定时发现任务列表
      tags:
      - catalogs
  /catalogs/{ids}:
    delete:
      consumes:
      - application/json
      description: Delete catalogs by IDs
      parameters:
      - description: Comma-separated catalog IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Delete catalogs
      tags:
      - catalogs
    get:
      consumes:
      - application/json
      description: Get catalogs by IDs
      parameters:
      - description: Comma-separated catalog IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of catalogs
                items:
                  $ref: catalog.yaml#/definitions/interfaces.Catalog
                type: array
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Get catalogs
      tags:
      - catalogs
  /catalogs/{ids}/health-status:
    get:
      consumes:
      - application/json
      description: Get health status of a catalog
      parameters:
      - description: Catalog ID
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              id:
                description: Catalog ID
                type: string
              health_check_status:
                description: Health check status
                enum:
                - healthy
                - degraded
                - unhealthy
                - offline
                - disabled
                type: string
              last_check_time:
                description: Last check time (timestamp)
                type: integer
              health_check_result:
                description: Health check result details
                type: string
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Get catalog health status
      tags:
      - catalogs
  /catalogs/{ids}/resources:
    get:
      consumes:
      - application/json
      description: 'Get a list of resources in a catalog. Note: The response does not include sourceMetadata, schemaDefinition,
        and logicDefinition fields.'
      parameters:
      - description: Catalog ID
        in: path
        name: ids
        required: true
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Database filter
        in: query
        name: database
        type: string
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: Limit for pagination
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 20
      - description: Sort field
        enum:
        - name
        - update_time
        in: query
        name: sort
        type: string
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                description: List of resources
                items:
                  $ref: resource.yaml#/definitions/interfaces.ResourceListItem
                type: array
              total_count:
                description: Total number of resources
                type: integer
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: List catalog resources
      tags:
      - catalogs
  /catalogs/{id}:
    put:
      consumes:
      - application/json
      description: Update a catalog by ID
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      - description: Catalog information
        in: body
        name: catalog
        required: true
        schema:
          $ref: catalog.yaml#/definitions/interfaces.CatalogRequest
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Update catalog
      tags:
      - catalogs
  /catalogs/{id}/discover:
    post:
      consumes:
      - application/json
      description: Trigger discovery of resources in a catalog
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              id:
                description: Discovery task ID
                type: string
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Discover catalog resources
      tags:
      - catalogs
  /catalogs/{id}/scheduled-discover:
    post:
      consumes:
      - application/json
      description: 创建一个新的定时发现任务，用于定期发现指定目录中的资源
      parameters:
      - description: 目录ID
        in: path
        name: id
        required: true
        type: string
      - description: 定时发现任务配置
        in: body
        name: scheduled_discover
        required: true
        schema:
          $ref: catalog.yaml#/definitions/interfaces.ScheduledDiscoverRequest
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              task_id:
                description: 定时发现任务ID
                type: string
              message:
                description: 响应消息
                type: string
            type: object
        '400':
          description: Bad Request - 请求参数无效，如cron表达式格式错误
          schema:
            type: object
        '404':
          description: Not Found - 目录不存在
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: 创建定时发现任务
      tags:
      - catalogs
  /catalogs/{id}/scheduled-discover/{task_id}:
    put:
      consumes:
      - application/json
      description: 更新一个已存在的定时发现任务的配置
      parameters:
      - description: 目录ID
        in: path
        name: id
        required: true
        type: string
      - description: 定时发现任务ID
        in: path
        name: task_id
        required: true
        type: string
      - description: 定时发现任务配置
        in: body
        name: scheduled_discover
        required: true
        schema:
          $ref: catalog.yaml#/definitions/interfaces.ScheduledDiscoverRequest
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              task_id:
                description: 定时发现任务ID
                type: string
              message:
                description: 响应消息
                type: string
            type: object
        '400':
          description: Bad Request - 请求参数无效，如cron表达式格式错误或任务不属于指定目录
          schema:
            type: object
        '404':
          description: Not Found - 目录或任务不存在
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: 更新定时发现任务
      tags:
      - catalogs
  /catalogs/{id}/scheduled-discover/{task_id}/start:
    post:
      consumes:
      - application/json
      description: 启动一个已存在的定时发现任务
      parameters:
      - description: 目录ID
        in: path
        name: id
        required: true
        type: string
      - description: 定时发现任务ID
        in: path
        name: task_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              task_id:
                description: 定时发现任务ID
                type: string
              message:
                description: 响应消息
                type: string
            type: object
        '400':
          description: Bad Request - 请求参数无效，如任务已启用或任务不属于指定目录
          schema:
            type: object
        '404':
          description: Not Found - 目录或任务不存在
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: 启动定时发现任务
      tags:
      - catalogs
  /catalogs/{id}/scheduled-discover/{task_id}/stop:
    post:
      consumes:
      - application/json
      description: 停止一个正在运行的定时发现任务
      parameters:
      - description: 目录ID
        in: path
        name: id
        required: true
        type: string
      - description: 定时发现任务ID
        in: path
        name: task_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              task_id:
                description: 定时发现任务ID
                type: string
              message:
                description: 响应消息
                type: string
            type: object
        '400':
          description: Bad Request - 请求参数无效，如任务不属于指定目录
          schema:
            type: object
        '404':
          description: Not Found - 目录或任务不存在
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: 停止定时发现任务
      tags:
      - catalogs
  /catalogs/{id}/test-connection:
    post:
      consumes:
      - application/json
      description: Test connection to a catalog
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              success:
                description: Connection test result
                type: boolean
              message:
                description: Test result message
                type: string
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Test catalog connection
      tags:
      - catalogs
  /discover-tasks:
    get:
      consumes:
      - application/json
      description: 获取发现任务列表，支持按目录ID、状态和触发类型过滤，支持分页
      parameters:
      - description: 目录ID，用于过滤特定目录的任务
        in: query
        name: catalog_id
        type: string
      - description: 任务状态，可选值：pending/running/completed/failed
        enum:
        - pending
        - running
        - completed
        - failed
        in: query
        name: status
        type: string
      - description: 触发类型，可选值：manual/scheduled
        enum:
        - manual
        - scheduled
        in: query
        name: trigger_type
        type: string
      - description: 偏移量，用于分页
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: 每页数量，默认10
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 10
      - description: 排序字段
        enum:
        - create_time
        - start_time
        - finish_time
        in: query
        name: sort
        type: string
      - description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              items:
                items:
                  $ref: catalog.yaml#/definitions/interfaces.DiscoverTask
                type: array
              total:
                type: integer
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Catalog Not Found
          schema:
            type: object
        '500':
          description: Internal Error
          schema:
            type: object
      summary: 获取发现任务列表
      tags:
      - discover-tasks
  /discover-tasks/by-id/{id}:
    get:
      consumes:
      - application/json
      description: 根据任务ID获取单个发现任务的详细信息
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: catalog.yaml#/definitions/interfaces.DiscoverTask
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Task Not Found
          schema:
            type: object
        '500':
          description: Internal Error
          schema:
            type: object
      summary: 通过ID获取发现任务
      tags:
      - discover-tasks
  /discover-tasks/by-schedule/{scheduleId}:
    get:
      consumes:
      - application/json
      description: 根据调度ID获取与该调度关联的所有发现任务列表
      parameters:
      - description: 调度ID
        in: path
        name: scheduleId
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            properties:
              entries:
                items:
                  $ref: catalog.yaml#/definitions/interfaces.DiscoverTask
                type: array
              total_count:
                type: integer
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Task Not Found
          schema:
            type: object
        '500':
          description: Internal Error
          schema:
            type: object
      summary: 通过调度ID获取发现任务列表
      tags:
      - discover-tasks
definitions:
  interfaces.CatalogRequest:
    properties:
      connector_config:
        $ref: connector.yaml#/definitions/interfaces.ConnectorConfig
        description: 加密存储的连接配置（JSON格式），根据connector_type包含不同的连接参数
      connector_type:
        type: string
        description: 数据源类型，如mysql, mariadb, opensearch等
      description:
        type: string
        maxLength: 1000
        description: 目录描述，最大1000字符
      name:
        type: string
        maxLength: 255
        minLength: 1
        description: 目录名称，系统一级命名空间，catalog下唯一，最大255字符
      tags:
        items:
          type: string
          maxLength: 40
          minLength: 1
        maxItems: 5
        type: array
        description: 标签列表，用于分类和检索，最多5个，每个标签最大40字符
    required:
    - name
    - connector_type
    type: object
  interfaces.Catalog:
    properties:
      id:
        description: catalog唯一标识，最大40字符
        type: string
      name:
        description: 目录名称，系统一级命名空间，catalog下唯一，最大255字符
        type: string
      tags:
        description: 标签，逗号分隔，用于分类和检索，最大255字符
        items:
          type: string
        type: array
      description:
        description: 目录描述，最大1000字符
        type: string
      type:
        description: 目录类型，physical表示物理目录（连接真实数据源），logical表示逻辑目录
        enum:
        - physical
        - logical
        type: string
      enabled:
        description: 是否启用，true表示启用，false表示禁用
        type: boolean
      connector_type:
        description: 数据源类型，如mysql, mariadb, opensearch, kafka, elasticsearch, api, prometheus等
        type: string
      connector_config:
        $ref: connector.yaml#/definitions/interfaces.ConnectorConfig
      metadata:
        description: 自动发现的元数据（JSON格式），如数据库版本等
        type: object
      health_check_enabled:
        description: 是否启用健康检查，true表示启用，false表示禁用
        type: boolean
      health_check_status:
        description: 连接状态，healthy表示健康，degraded表示降级，unhealthy表示不健康，offline表示离线，disabled表示已禁用
        enum:
        - healthy
        - degraded
        - unhealthy
        - offline
        - disabled
        type: string
      last_check_time:
        description: 最后健康检查时间，Unix时间戳（毫秒）
        type: integer
      health_check_result:
        description: 健康检查结果详情，包含检查过程中的具体信息
        type: string
      creator:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 创建者信息，包含id、type、name
      create_time:
        description: 创建时间，Unix时间戳（毫秒）
        type: integer
      updater:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
        description: 更新者信息，包含id、type、name
      update_time:
        description: 最后更新时间，Unix时间戳（毫秒）
        type: integer
      operations:
        description: 可执行的操作列表，如["read", "write", "delete"]
        items:
          type: string
        type: array
    type: object
  interfaces.DiscoverResult:
    properties:
      catalog_id:
        type: string
      message:
        type: string
      new_count:
        type: integer
      stale_count:
        type: integer
      unchanged_count:
        type: integer
    type: object
  interfaces.DiscoverTask:
    properties:
      catalog_id:
        type: string
      create_time:
        type: integer
      creator:
        $ref: common.yaml#/definitions/interfaces.AccountInfo
      finish_time:
        description: 完成时间
        type: integer
      id:
        type: string
      message:
        type: string
      progress:
        description: 0-100
        type: integer
      result:
        $ref: catalog.yaml#/definitions/interfaces.DiscoverResult
      scheduled_id:
        description: 调度ID
        type: string
      start_time:
        description: 开始执行时间
        type: integer
      status:
        description: pending/running/completed/failed
        type: string
      strategies:
        description: 发现策略，可选值：["insert", "delete", "update"] 或空数组表示全部
        items:
          type: string
        type: array
      trigger_type:
        description: manual/scheduled
        type: string
    type: object
  interfaces.ScheduledDiscoverRequest:
    properties:
      cron_expr:
        description: Cron表达式（五位），用于定义任务执行的时间计划
        type: string
