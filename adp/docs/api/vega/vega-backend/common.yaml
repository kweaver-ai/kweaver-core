  interfaces.JoinSpec:
    $ref: ./resource.yaml#/definitions/interfaces.JoinSpec
  interfaces.JoinOnCond:
    $ref: ./resource.yaml#/definitions/interfaces.JoinOnCond
  interfaces.LogicDefinitionNode:
    $ref: ./resource.yaml#/definitions/interfaces.LogicDefinitionNode
  interfaces.ViewProperty:
    $ref: ./resource.yaml#/definitions/interfaces.ViewProperty
  interfaces.OutputFieldRef:
    $ref: ./resource.yaml#/definitions/interfaces.OutputFieldRef
  interfaces.ResourceNodeCfg:
    $ref: ./resource.yaml#/definitions/interfaces.ResourceNodeCfg
  interfaces.JoinNodeCfg:
    $ref: ./resource.yaml#/definitions/interfaces.JoinNodeCfg
  interfaces.JoinOn:
