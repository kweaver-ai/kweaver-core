  interfaces.ScheduledDiscoverTask:
    $ref: ./catalog.yaml#/definitions/interfaces.ScheduledDiscoverTask
  interfaces.ConnectorConfig:
    $ref: ./connector.yaml#/definitions/interfaces.ConnectorConfig
  interfaces.ConnectorTypeReq:
    $ref: ./connector.yaml#/definitions/interfaces.ConnectorTypeReq
  interfaces.ResourceDataQueryParams:
    $ref: ./resource.yaml#/definitions/interfaces.ResourceDataQueryParams
  interfaces.ResourceRequest:
    $ref: ./resource.yaml#/definitions/interfaces.ResourceRequest
  interfaces.Resource:
    $ref: ./resource.yaml#/definitions/interfaces.Resource
  interfaces.ResourceListItem:
    $ref: ./resource.yaml#/definitions/interfaces.ResourceListItem
  interfaces.SQLQueryRequest:
    $ref: ./resource.yaml#/definitions/interfaces.SQLQueryRequest
  interfaces.SQLQueryResponse:
    $ref: ./resource.yaml#/definitions/interfaces.SQLQueryResponse
  interfaces.TableInQuery:
