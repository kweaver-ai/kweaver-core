swagger: '2.0'
info:
  contact:
    name: kweaver.ai
    url: https://kweaver.ai
  description: VEGA Backend API Documentation
  title: VEGA Backend API
  version: '1.0'
basePath: /api/vega-backend/v1
schemes:
- http
- https
tags:
- description: Catalog management APIs
  name: catalogs
- description: Resource management APIs
  name: resources
- description: Connector type management APIs
  name: connector-types
- description: Query APIs
  name: query
- description: Discover task management APIs
  name: discover-tasks
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Health check endpoint to verify server status
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
  /catalogs:
    $ref: ./catalog.yaml#/paths/~1catalogs
  /catalogs/scheduled-discover:
    $ref: ./catalog.yaml#/paths/~1catalogs~1scheduled-discover
  /catalogs/{ids}:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{ids}
  /catalogs/{ids}/health-status:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{ids}~1health-status
  /catalogs/{ids}/resources:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{ids}~1resources
  /catalogs/{id}:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}
  /catalogs/{id}/discover:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1discover
  /catalogs/{id}/scheduled-discover:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1scheduled-discover
  /catalogs/{id}/scheduled-discover/{task_id}:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1scheduled-discover~1{task_id}
  /catalogs/{id}/scheduled-discover/{task_id}/start:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1scheduled-discover~1{task_id}~1start
  /catalogs/{id}/scheduled-discover/{task_id}/stop:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1scheduled-discover~1{task_id}~1stop
  /catalogs/{id}/test-connection:
    $ref: ./catalog.yaml#/paths/~1catalogs~1{id}~1test-connection
  /discover-tasks:
    $ref: ./catalog.yaml#/paths/~1discover-tasks
  /discover-tasks/by-id/{id}:
    $ref: ./catalog.yaml#/paths/~1discover-tasks~1by-id~1{id}
  /discover-tasks/by-schedule/{scheduleId}:
    $ref: ./catalog.yaml#/paths/~1discover-tasks~1by-schedule~1{scheduleId}
  /connector-types:
    $ref: ./connector.yaml#/paths/~1connector-types
  /connector-types/{type}:
    $ref: ./connector.yaml#/paths/~1connector-types~1{type}
  /connector-types/{type}/enabled:
    $ref: ./connector.yaml#/paths/~1connector-types~1{type}~1enabled
  /resources:
    $ref: ./resource.yaml#/paths/~1resources
  /resources/dataset/{id}/docs:
    $ref: ./resource.yaml#/paths/~1resources~1dataset~1{id}~1docs
  /resources/dataset/{id}/docs/query:
    $ref: ./resource.yaml#/paths/~1resources~1dataset~1{id}~1docs~1query
  /resources/dataset/{id}/docs/{ids}:
    $ref: ./resource.yaml#/paths/~1resources~1dataset~1{id}~1docs~1{ids}
  /resources/dataset/{id}/{docid}:
    $ref: ./resource.yaml#/paths/~1resources~1dataset~1{id}~1{docid}
  /resources/list:
    $ref: ./resource.yaml#/paths/~1resources~1list
  /resources/query:
    $ref: ./resource.yaml#/paths/~1resources~1query
  /resources/{ids}:
    $ref: ./resource.yaml#/paths/~1resources~1{ids}
  /resources/{id}:
    $ref: ./resource.yaml#/paths/~1resources~1{id}
  /resources/{id}/data:
    $ref: ./resource.yaml#/paths/~1resources~1{id}~1data
definitions:
  interfaces.AccountInfo:
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  interfaces.Property:
    properties:
      description:
        type: string
      display_name:
        type: string
      features:
        items:
          $ref: '#/definitions/interfaces.PropertyFeature'
        type: array
      name:
        type: string
      original_name:
        type: string
      type:
        type: string
    type: object
  interfaces.PropertyFeature:
    properties:
      config:
        type: object
      description:
        type: string
      display_name:
        type: string
      feature_type:
        description: 特性类型：keyword, fulltext, vector
        type: string
      is_default:
        type: boolean
      is_native:
        type: boolean
      name:
        type: string
      ref_property:
        type: string
    type: object
  interfaces.SortField:
    properties:
      direction:
        type: string
      field:
        type: string
    type: object
  interfaces.CatalogRequest:
    $ref: ./catalog.yaml#/definitions/interfaces.CatalogRequest
  interfaces.Catalog:
    $ref: ./catalog.yaml#/definitions/interfaces.Catalog
  interfaces.DiscoverResult:
