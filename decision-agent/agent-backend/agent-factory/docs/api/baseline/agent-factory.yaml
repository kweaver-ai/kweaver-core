components:
    parameters:
        IDInt:
            description: ID (int)
            in: path
            name: id
            schema:
                type: integer
        KEY:
            description: 对象的标识（key）
            in: path
            name: key
            schema:
                type: string
        PathAppKey:
            description: agent app key(通用agent传入 agent id/agent key，超级助手传入字符串:super_assistant)
            in: path
            name: app_key
            schema:
                type: string
        TplID:
            description: 模板ID
            in: path
            name: id
            schema:
                type: integer
        agentCreatedType:
            description: |
                - agent创建类型
                - create: 手动创建
                - copy: 从其他Agent复制
            in: query
            name: agent_created_type
            schema:
                enum:
                    - create
                    - copy
                type: string
        agentIDRequiredPath:
            description: agent ID
            in: path
            name: agent_id
            schema:
                type: string
        agentTplCreatedType:
            description: |
                - agent模板创建类型
                - copy_from_agent: 从agent复制
                - copy_from_tpl: 从模板复制
            in: query
            name: agent_tpl_created_type
            schema:
                enum:
                    - copy_from_agent
                    - copy_from_tpl
                type: string
        categoryID:
            description: 分类ID
            in: query
            name: category_id
            schema:
                type: string
        name:
            description: 根据名称模糊查询
            in: query
            name: name
            schema:
                type: string
        page:
            description: 分页页码
            in: query
            name: page
            schema:
                default: 1
                type: integer
        pageLimit:
            description: 每页返回条数
            in: query
            name: size
            schema:
                default: 10
                type: integer
        pageOffset:
            description: 分页页码
            in: query
            name: page
            schema:
                default: 1
                type: integer
        publishStatus:
            description: 发布状态("unpublished", "published")
            in: query
            name: publish_status
            schema:
                type: string
        toBeFlag:
            description: 发布为标识("api_agent", "web_sdk_agent", "skill_agent", "data_flow_agent")
            in: query
            name: publish_to_be
            schema:
                enum:
                    - api_agent
                    - web_sdk_agent
                    - skill_agent
                    - data_flow_agent
                type: string
    responses:
        "400":
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: 错误的请求
        "401":
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: 认证失败
        "403":
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: 请求被拒绝
        "404":
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: 资源不存在
        "500":
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: 内部错误
        BadRequestError:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/BadRequestError'
            description: 请求参数错误
        InternalServerError:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/InternalServerError'
            description: 服务器内部错误
        NotFoundError:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/NotFoundError'
            description: 资源未找到
    schemas:
        APIChatRequest:
            example:
                agent_key: agent_123
                agent_version: v1
                chat_mode: deep_thinking
                confirm_plan: true
                conversation_id: conv_123
                conversation_session_id: conv_session_123
                custom_querys:
                    query1: value1
                    query2: value2
                    query3:
                        key1: value3
                        key2: value4
                inc_stream: true
                interrupted_assistant_message_id: msg_123
                query: 如何使用这个功能？
                regenerate_assistant_message_id: msg_456
                regenerate_user_message_id: msg_123
                stream: true
                temp_files:
                    - id: "789"
                      name: 技术文档
                      type: doc
                temporary_area_id: temp_456
                tool:
                    session_id: session_123
                    tool_args:
                        - key: key_123
                          value: value_123
                    tool_name: tool_123
            properties:
                agent_key:
                    description: agent key
                    type: string
                agent_version:
                    description: agent_version，可以指定版本，默认值为latest
                    type: string
                chat_mode:
                    description: 聊天模式，deep_thinking 深度思考，normal 正常
                    type: string
                chat_option:
                    $ref: '#/components/schemas/ChatOption'
                conversation_id:
                    description: 对话ID
                    type: string
                custom_querys:
                    description: 输入配置中的自定义输入变量，map[string]any
                    type: object
                history:
                    description: 历史消息, 可以传入用户自己维护的历史消息，若不传，则根据conversation_id查询历史消息，若conversation_id为空，则为新对话，历史记录为空
                    items:
                        $ref: '#/components/schemas/LLMHistory'
                    type: array
                inc_stream:
                    description: 是否增量流式返回，仅在stream为true时有效
                    type: boolean
                interrupted_assistant_message_id:
                    description: 中断的助手信息ID
                    type: string
                query:
                    description: 用户提问问题
                    type: string
                regenerate_assistant_message_id:
                    description: 重新生成时，助手消息ID，不可以同时传入regenerate_user_message_id
                    type: string
                regenerate_user_message_id:
                    description: 编辑问题时，用户消息ID，不可以同时传入regenerate_assistant_message_id
                    type: string
                stream:
                    description: 是否流式返回
                    type: boolean
                temp_files:
                    description: 临时文件，输入配置中配置了文件变量，可以传入临时文件
                    items:
                        properties:
                            id:
                                description: 文档ID
                                type: string
                            name:
                                description: 文档名称
                                type: string
                        type: object
                    type: array
                temporary_area_id:
                    description: 临时区域ID
                    type: string
                tool:
                    $ref: '#/components/schemas/AskTool'
            required:
                - query
                - agent_key
                - stream
            type: object
        Agent:
            properties:
                avatar:
                    description: 头像URL
                    type: string
                avatar_type:
                    description: 头像类型
                    type: integer
                category_id:
                    description: 分类ID
                    type: string
                category_name:
                    description: 分类名称
                    type: string
                config:
                    description: Agent配置信息
                    type: object
                id:
                    description: Agent ID
                    type: string
                is_built_in:
                    description: 是否为内置Agent
                    type: integer
                key:
                    description: Agent Key
                    type: string
                name:
                    description: Agent名称
                    type: string
                product_id:
                    description: 产品ID
                    type: integer
                product_name:
                    description: 产品名称
                    type: string
                profile:
                    description: Agent简介
                    type: string
                publish_info:
                    $ref: '#/components/schemas/PublishInfo'
                version:
                    description: Agent版本
                    type: string
            type: object
        AgentAppResponse:
            properties:
                agents:
                    description: 应用的Agents
                    items:
                        description: 应用的Agent
                        type: object
                    type: array
                id:
                    description: 应用ID
                    type: string
                main_agent_id:
                    description: 主AgentID
                    type: string
                temp_zone_config:
                    $ref: '#/components/schemas/TempZoneConfig'
            type: object
        AgentInfo:
            properties:
                agent_id:
                    description: Agent ID
                    type: string
                agent_name:
                    description: Agent Name
                    type: string
                agent_status:
                    description: Agent Status
                    type: string
                agent_version:
                    description: Agent Version
                    type: string
            type: object
        AgentMarketAgentInfoResp:
            properties:
                avatar:
                    description: |
                        - 头像信息
                          - 当头像类型为1时，为内置头像标识(如1-10等)
                          - 当头像类型为2时，为头像存储信息
                          - 当头像类型为3时，为头像存储信息
                    example: "1"
                    type: string
                avatar_type:
                    description: |
                        - 头像类型
                          - 1: 内置头像
                          - 2: 用户上传头像
                          - 3: AI生成头像
                    example: 1
                    type: integer
                category_id:
                    description: 分类ID
                    type: string
                categroy_name:
                    description: 分类名称
                    type: string
                config:
                    $ref: '#/components/schemas/config'
                description:
                    description: 发布描述
                    example: agent1 description
                    type: string
                id:
                    description: agent id
                    example: xxx
                    type: string
                is_built_in:
                    description: |
                        - 是否内置
                          - 0: 否
                          - 1: 是
                    enum:
                        - 0
                        - 1
                    example: 0
                    type: integer
                key:
                    description: agent 标识
                    example: xxx
                    type: string
                latest_version:
                    description: agent最新版本
                    type: string
                name:
                    description: 名字
                    example: agent1
                    type: string
                product_key:
                    description: 所属产品标识
                    example: dip
                    type: string
                product_name:
                    description: 所属产品名称
                    example: DIP
                    type: string
                profile:
                    description: agent 简介
                    example: agent1 profile
                    type: string
                publish_info:
                    $ref: '#/components/schemas/list_publish_info'
                publish_time:
                    description: 发布时间（时间戳，单位：ms）
                    type: integer
                publish_user_info:
                    description: 发布者信息
                    properties:
                        user_id:
                            description: 用户id
                            example: xxx
                            type: string
                        username:
                            description: 用户显示名
                            example: xxx
                            type: string
                    type: object
                version:
                    description: agent版本
                    type: string
            type: object
        AgentObservabilityReq:
            properties:
                agent_version:
                    description: Agent版本
                    type: string
                end_time:
                    description: 结束时间戳，单位到毫秒，例如:1646360670123
                    format: int64
                    type: integer
                include_config:
                    default: false
                    description: 是否包含agent配置信息，默认值为false
                    type: boolean
                start_time:
                    description: 开始时间戳，单位到毫秒，例如:1646360670123
                    format: int64
                    type: integer
            required:
                - agent_version
                - start_time
                - end_time
            type: object
        AgentObservabilityResp:
            properties:
                agent:
                    $ref: '#/components/schemas/Agent'
                avg_execute_duration:
                    description: 平均执行时长
                    type: integer
                avg_session_rounds:
                    description: 平均会话轮次
                    type: integer
                avg_ttft_duration:
                    description: 平均首token响应时间
                    type: integer
                run_success_rate:
                    description: Run成功率
                    format: float
                    type: number
                tool_success_rate:
                    description: 工具调用成功率
                    format: float
                    type: number
                total_requests:
                    description: 总请求数
                    type: integer
                total_sessions:
                    description: 总会话数
                    type: integer
            type: object
        Answer:
            properties:
                ask:
                    nullable: true
                    type: object
                cites:
                    nullable: true
                    type: object
                text:
                    type: string
            type: object
        Arg:
            properties:
                name:
                    description: 参数名称
                    type: string
                value:
                    description: 参数值
                    type: string
            type: object
        AskTool:
            description: 工具调用信息
            properties:
                session_id:
                    type: string
                tool_args:
                    items:
                        properties:
                            key:
                                type: string
                            value:
                                type: string
                        type: object
                    type: array
                tool_name:
                    type: string
            type: object
        BadRequestError:
            allOf:
                - $ref: '#/components/schemas/error_Error'
            example:
                description: Invalid Parameter
                error_code: AgentApp.InvalidParameter
                error_detail: some text
                error_link: some text
                solution: some text
        CategoryResp:
            description: 分类
            properties:
                category_id:
                    description: 分类ID
                    type: string
                description:
                    description: 分类描述
                    type: string
                name:
                    description: 分类名称
                    type: string
            required:
                - category_id
                - categroy_name
            type: object
        ChatOption:
            properties:
                enable_dependency_cache:
                    $ref: '#/components/schemas/enable_dependency_cache'
                is_need_doc_retrival_post_process:
                    default: false
                    description: |
                        - 是否需要文档检索后处理
                        - 为true时，会对检索到的文档进行后处理（如生成前端展示用的格式等）
                    type: boolean
                is_need_history:
                    default: false
                    description: |
                        - 是否需要历史上下文
                        - 场景：
                          - 当每次都是独立运行，不需要多轮对话（或理解成不需要之前的历史信息作为上下文）时，可以设置为false
                    type: boolean
                is_need_progress:
                    $ref: '#/components/schemas/is_need_progress'
            type: object
        ChatRequest:
            example:
                agent_run_id: run_123
                chat_mode: deep_thinking
                confirm_plan: true
                conversation_id: conv_123
                conversation_session_id: conv_session_123
                custom_querys:
                    query1: value1
                    query2: value2
                    query3:
                        key1: value3
                        key2: value4
                interrupted_assistant_message_id: msg_123
                query: 如何使用这个功能？
                regenerate_assistant_message_id: msg_456
                regenerate_user_message_id: msg_123
                resume_interrupt_info:
                    action: confirm
                    modified_args:
                        - key: arg1
                          value: value1
                    resume_handle:
                        current_block: 0
                        frame_id: frame_123
                        interrupt_type: tool
                        restart_block: false
                        resume_token: token_123
                        snapshot_id: snapshot_123
                temp_files:
                    - id: "789"
                      name: 技术文档
                      type: doc
                temporary_area_id: temp_456
            properties:
                agent_id:
                    description: agent ID
                    type: string
                agent_run_id:
                    description: agent运行id（中断恢复时必填，由executor在首次执行时返回）
                    type: string
                agent_version:
                    description: agent_version，可以指定版本，默认值为latest
                    type: string
                chat_mode:
                    description: |-
                        聊天模式，deep_thinking 深度思考，normal 正常
                        选择deep_thinking 模式 要求大模型配置中包含rlm模型，否则会返回错误
                    enum:
                        - deep_thinking
                        - normal
                    type: string
                chat_option:
                    $ref: '#/components/schemas/ChatOption'
                conversation_id:
                    description: 对话ID - 如果conversation_id不为空，则对话时会获取当前对话的下文进行多轮对话 - 如果conversation_id为空，则默认开启一个新对话
                    type: string
                custom_querys:
                    description: 输入配置中的自定义输入变量，map[string]any
                    type: object
                history:
                    description: 历史消息, 可以传入用户自己维护的历史消息，若不传，则根据conversation_id查询历史对话消息，若conversation_id为空，则为新对话，历史记录为空
                    items:
                        $ref: '#/components/schemas/LLMHistory'
                    type: array
                inc_stream:
                    description: 是否增量流式返回，仅在stream为true时有效
                    type: boolean
                interrupted_assistant_message_id:
                    description: 中断的助手信息ID
                    type: string
                query:
                    description: 用户提问问题
                    type: string
                regenerate_assistant_message_id:
                    description: 重新生成时，助手消息ID，不可以同时传入regenerate_user_message_id
                    type: string
                regenerate_user_message_id:
                    description: 编辑问题时，用户消息ID，不可以同时传入regenerate_assistant_message_id
                    type: string
                resume_interrupt_info:
                    $ref: '#/components/schemas/resume_interrupt_info'
                stream:
                    description: 是否流式返回
                    type: boolean
                temp_files:
                    description: 临时文件，输入配置中配置了文件变量，可以传入临时文件
                    items:
                        properties:
                            id:
                                description: 文档ID
                                type: string
                            name:
                                description: 文档名称
                                type: string
                        type: object
                    type: array
                temporary_area_id:
                    description: 临时区域ID
                    type: string
            required:
                - query
                - agent_id
                - stream
            type: object
        ChatResponse:
            properties:
                agent_run_id:
                    description: agent运行id
                    type: string
                assistant_message_id:
                    description: 助手消息ID
                    type: string
                conversation_id:
                    description: 对话ID
                    type: string
                message:
                    $ref: '#/components/schemas/Message'
                user_message_id:
                    description: 用户消息ID
                    type: string
            type: object
        Cite:
            properties:
                content:
                    description: 文档内容
                    type: string
                doc_id:
                    description: 文档ID，gns:// 开头
                    type: string
                doc_lib_type:
                    description: 文档库类型
                    type: string
                doc_name:
                    description: 文档名称
                    type: string
                ext_type:
                    description: 文档扩展名 带.
                    type: string
                object_id:
                    description: 文档对象ID gns最后一段
                    type: string
                parent_path:
                    description: 文档父路径
                    type: string
                size:
                    description: 文档大小，单位：字节
                    type: integer
                slices:
                    items:
                        properties:
                            content:
                                description: 文档内容
                                type: string
                            id:
                                description: 文档ID
                                type: string
                            "no":
                                description: 文档页码
                                type: integer
                            pages:
                                items:
                                    description: 文档页码
                                    type: integer
                                type: array
                        type: object
                    type: array
                space_id:
                    description: 空间ID
                    type: string
            type: object
        Content:
            properties:
                final_answer:
                    $ref: '#/components/schemas/FinalAnswer'
                middle_answer:
                    items:
                        $ref: '#/components/schemas/MiddleAnswer'
                    type: array
            type: object
        ConversationDetail:
            description: 对话详情
            properties:
                create_time:
                    description: 创建时间
                    type: integer
                id:
                    description: 对话ID
                    type: string
                message_index:
                    description: 最新对话消息下标
                    type: integer
                messages:
                    description: 对话消息列表
                    items:
                        $ref: '#/components/schemas/ConversationMessage'
                    type: array
                read_message_index:
                    description: 最新已读的对话消息下标
                    type: integer
                title:
                    description: 对话标题
                    type: string
                update_time:
                    description: 更新时间
                    type: integer
            required:
                - id
                - title
            type: object
        ConversationInitResponse:
            example:
                id: xxxx
            properties:
                id:
                    description: 对话ID
                    type: string
            type: object
        ConversationListItem:
            description: 对话简介
            example:
                create_time: 1744167890000000000
                id: conv_123
                message_index: 5
                read_message_index: 3
                title: 示例对话
                update_time: 1744167890000000000
            properties:
                create_time:
                    description: 创建时间
                    type: integer
                id:
                    description: 对话ID
                    type: string
                message_index:
                    description: 最新对话消息下标
                    type: integer
                read_message_index:
                    description: 最新已读的对话消息下标
                    type: integer
                title:
                    description: 对话标题
                    type: string
                update_time:
                    description: 更新时间
                    type: integer
            required:
                - id
                - title
            type: object
        ConversationListObservabilityReq:
            properties:
                agent_id:
                    description: Agent id
                    type: string
                agent_version:
                    description: Agent版本
                    type: string
                end_time:
                    description: 结束时间戳，单位精确到毫秒。例如:1646360670123
                    format: int64
                    type: integer
                page:
                    default: 1
                    description: 分页页码
                    type: integer
                size:
                    default: 10
                    description: 分页大小
                    type: integer
                start_time:
                    description: 开始时间戳，单位精确到毫秒。例如:1646360670123
                    format: int64
                    type: integer
                title:
                    description: 对话标题，默认为空查询全部，支持模糊查询
                    type: string
            required:
                - agent_id
                - agent_version
                - start_time
                - end_time
            type: object
        ConversationListObservabilityResp:
            properties:
                entries:
                    description: 对话列表
                    items:
                        $ref: '#/components/schemas/conversation_detail_ConversationDetail'
                    type: array
                total_count:
                    description: 总数量
                    type: integer
            type: object
        ConversationListResponse:
            example:
                entries:
                    - create_time: 1744167890000000000
                      id: conv_123
                      message_index: 5
                      read_message_index: 3
                      title: 示例对话
                      update_time: 1744167890000000000
                    - create_time: 1744167891000000000
                      id: conv_456
                      message_index: 10
                      read_message_index: 8
                      title: 另一个对话
                      update_time: 1744167891000000000
                total_count: 2
            properties:
                entries:
                    description: 对话列表
                    items:
                        $ref: '#/components/schemas/ConversationListItem'
                    type: array
                total_count:
                    description: 结果总数
                    type: integer
            required:
                - total_count
                - entries
            type: object
        ConversationMessage:
            description: 对话消息
            properties:
                agent_info:
                    description: agent信息
                    properties:
                        agent_id:
                            description: agent ID
                            type: string
                        agent_version:
                            description: agent版本
                            type: string
                    type: object
                content(when origin=assistant):
                    description: 消息内容
                    properties:
                        final_answer:
                            description: 最终返回结果
                            type: object
                        middle_answer:
                            description: 中间输出结果
                            type: object
                    type: object
                content(when origin=user):
                    description: 消息内容
                    properties:
                        temp_files:
                            items:
                                description: 临时文件信息
                                type: object
                            type: array
                        text:
                            description: 文本内容
                            type: string
                    type: object
                content_type:
                    description: "消息内容类型\n- origin=user时，content type固定为text, 文本 \n- origin=assistant时， content type为prompt, explore, other 之一\n"
                    enum:
                        - text
                        - prompt
                        - explore
                        - other
                    type: string
                conversation_id:
                    description: 对话ID
                    type: string
                create_time:
                    description: 创建时间
                    type: integer
                id:
                    description: 消息ID
                    type: string
                index:
                    description: 消息下标
                    example: 0
                    type: integer
                origin:
                    description: 消息角色(user： 用户;assitant： 助手)
                    type: string
                reply_id:
                    description: 回复消息ID,用于关联问答消息
                    type: integer
                status:
                    description: '消息状态,当角色为 User时，有以下消息状态：received :  已接收(消息成功接收并持久化， 初始状态)；当角色为 Assistant时，有以下消息状态：processing： 生成中（消息正在生成中 ， 初始状态）;succeded： 生成成功（消息处理完成，返回成功）;failed： 生成失败（消息生成失败）;cancelled: 取消生成（用户、系统终止对话）'
                    type: string
                update_time:
                    description: 更新时间
                    type: integer
            required:
                - id
                - conversation_id
                - agent_info
                - index
                - origin
            type: object
        ConversationSessionManageRequest:
            example:
                action: get_info_or_create
                agent_id: agent_456
                agent_version: v1
            properties:
                action:
                    description: |
                        - get_info_or_create: 获取对话session信息或创建新的对话session
                          - 逻辑：
                            - 如果conversation_session_id对应的session存在(redis中)，则返回session信息
                            - 如果conversation_session_id对应的session不存在，则创建session并返回session信息
                        - recover_lifetime_or_create: 恢复对话session的有效期或创建新的对话session
                          - 逻辑：
                            - 如果conversation_session_id对应的session存在(redis中)，则恢复session的有效期并返回session信息
                            - 如果conversation_session_id对应的session不存在，则创建session并返回session信息
                    enum:
                        - get_info_or_create
                        - recover_lifetime_or_create
                    title: 操作类型
                    type: string
                agent_id:
                    description: agent ID
                    type: string
                agent_version:
                    description: agent版本，当agent_id提供时，此字段为required
                    type: string
            required:
                - action
                - agent_id
                - agent_version
            type: object
        ConversationSessionManageResponse:
            example:
