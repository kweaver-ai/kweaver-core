                    items:
                        properties:
                            key:
                                description: 参数名称
                                example: database_name
                                type: string
                            value:
                                description: 参数值
                                example: test_db
                                oneOf:
                                    - type: string
                                    - type: number
                                    - type: boolean
                                    - items: {}
                                      type: array
                                    - type: object
                                    - {}
                        required:
                            - key
                            - value
                        type: object
                    type: array
                tool_description:
                    description: 工具描述
                    example: 删除指定的数据库
