        interrupt_handle:
            description: |
                恢复句柄对象
                • 包含恢复执行所需的所有信息
                • 上层应用应完整保存此对象
                • 调用 /v1/agent/resume 时传递
            properties:
                current_block:
                    description: 当前代码块索引
                    example: 3
                    type: integer
                frame_id:
                    description: 执行帧ID，标识当前执行的帧
                    example: frame_abc123
                    type: string
                interrupt_type:
                    description: 中断类型（tool_confirmation）
                    example: tool_confirmation
                    type: string
                restart_block:
                    description: 是否重启代码块
                    example: false
                    type: boolean
                resume_token:
                    description: 恢复令牌，用于验证恢复请求
                    example: token_def456
                    type: string
                snapshot_id:
                    description: 快照ID，指向保存的执行快照
                    example: snap_xyz789
                    type: string
            required:
                - frame_id
                - snapshot_id
                - resume_token
                - interrupt_type
                - current_block
                - restart_block
            type: object
        interrupt_info:
            description: |
