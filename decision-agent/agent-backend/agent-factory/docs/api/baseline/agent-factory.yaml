                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 获取指定对话的session列表
            tags:
                - 可观测性
    /api/agent-factory/v1/observability/agent/{agent_id}/conversation/{conversation_id}/session/{session_id}/detail:
        parameters:
            - in: path
              name: agent_id
              schema:
                type: string
            - in: path
              name: conversation_id
              schema:
                type: string
            - in: path
              name: session_id
              schema:
                type: string
        post:
            description: 获取指定session的详情信息，包含多个指标
            operationId: getSessionDetail
            parameters:
                - description: agent_id
                  in: path
                  name: agent_id
                  schema:
                    type: string
                - description: conversation_id
                  in: path
                  name: conversation_id
                  schema:
                    type: string
                - description: session_id
                  in: path
                  name: session_id
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SessionDetailObservabilityReq'
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionDetailObservabilityResp'
