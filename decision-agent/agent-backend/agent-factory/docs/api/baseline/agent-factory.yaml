            tags:
                - 对话session管理
    /api/agent-factory/v1/observability/agent/{agent_id}/conversation/{conversation_id}/session:
        parameters:
            - in: path
              name: agent_id
              schema:
                type: string
            - in: path
              name: conversation_id
              schema:
                type: string
        post:
            description: 获取指定对话的session列表，包含session的详细信息
            operationId: getSessionList
            parameters:
                - description: agent_id
                  in: path
