                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 查询Agent下的所有对话列表
            tags:
                - 可观测性
    /api/agent-factory/v3/agent:
        get:
            description: '- Agent列表（供模型工厂做 Agent 的 Benchmarch 使用） - 只提供`内部接口`'
            parameters:
                - $ref: '#/components/parameters/page'
                - $ref: '#/components/parameters/pageLimit'
                - $ref: '#/components/parameters/name'
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agent_list_for_benchmark'
                    description: 成功
                "400":
                    $ref: '#/components/responses/400'
                "401":
                    $ref: '#/components/responses/401'
                "403":
                    $ref: '#/components/responses/403'
                "500":
                    $ref: '#/components/responses/500'
            summary: Agent列表（benchmarch）
            tags:
                - agent-ignore
        post:
            description: 创建一个新的 Agent 配置
            requestBody:
                content:
