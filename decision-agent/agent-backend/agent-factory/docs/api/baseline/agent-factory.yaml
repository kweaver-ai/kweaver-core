            responses:
                "204":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 标记对话已读
            tags:
                - 对话管理
    /api/agent-factory/v1/app/{app_key}/debug/completion:
        parameters:
