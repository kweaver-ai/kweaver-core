                    description: 是否重启代码块
                    type: boolean
                resume_token:
                    description: 恢复令牌
                    type: string
                snapshot_id:
                    description: 快照ID
                    type: string
            type: object
        v2agentexecutordto.ModifiedArg:
            properties:
                key:
                    description: 参数名称
                    type: string
                value:
                    description: 参数值
            type: object
        v2agentexecutordto.ToolArg:
            properties:
                key:
                    description: 参数名称
                    type: string
                value:
                    description: 参数值
            type: object
        v2agentexecutordto.ToolInterruptInfo:
            properties:
                data:
                    allOf:
                        - $ref: '#/components/schemas/v2agentexecutordto.InterruptData'
                    description: 中断详情
                handle:
                    allOf:
                        - $ref: '#/components/schemas/v2agentexecutordto.InterruptHandle'
                    description: 恢复句柄
            type: object
        valueobject.AgentInfo:
            properties:
                agent_id:
                    type: string
                agent_name:
                    type: string
                agent_status:
                    type: string
                agent_version:
                    type: string
            type: object
        valueobject.TempFile:
            properties:
                details: {}
                id:
                    type: string
                name:
                    type: string
            type: object
    securitySchemes:
        ApiKeyAuth:
            bearerFormat: JWT
            description: HTTP Bearer token, formatted as `Bearer ACCESS_TOKEN`
            scheme: bearer
            type: http
info:
    contact:
        email: support@swagger.io
