            tags:
                - 对话
    /api/agent-factory/v1/conversation/session/{conversation_id}:
        parameters:
            - in: path
              name: conversation_id
              schema:
                type: string
        put:
            description: 管理指定的对话会话状态
            parameters:
                - description: 会话 ID
                  in: path
                  name: conversation_id
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
