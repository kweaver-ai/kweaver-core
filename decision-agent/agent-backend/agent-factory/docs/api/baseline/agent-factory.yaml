        field:
            description: agent参数（字段）
            properties:
                desc:
                    description: 参数描述
                    example: ""
                    type: string
                name:
                    description: 参数（字段）名
                    example: query
                    type: string
            required:
                - name
            type: object
        input:
            description: 输入参数
            properties:
                augment:
                    description: query增强
                    nullable: true
                    properties:
                        data_source:
                            description: 图谱数据源配置
                            properties:
                                kg:
                                    description: 图谱类型数据源
                                    items:
                                        $ref: '#/components/schemas/kg_source'
                                    maxItems: 1
                                    type: array
                            type: object
                        enable:
                            description: 是否启用
                            type: boolean
                    required:
                        - enable
                        - data_source
                    type: object
                fields:
                    description: 参数列表
                    items:
                        $ref: '#/components/schemas/field'
                    type: array
                is_temp_zone_enabled:
                    description: |
                        - 是否启用临时区
                          - 配置时，前端不需要传此字段。后端根据fields中是否包含file类型字段自动判断
                    enum:
                        - 0
                        - 1
                    example: 0
                    type: integer
                rewrite:
                    description: query重写
                    nullable: true
                    properties:
                        enable:
                            description: 是否启用
                            type: boolean
                        llm_config:
                            $ref: '#/components/schemas/llm_config'
                    required:
                        - enable
                        - llm_config
                    type: object
                temp_zone_config:
                    description: |
                        - 临时区配置
                          - 当使用临时区时（fields中包含file类型字段），此配置必需
                    properties:
                        allowed_file_categories:
                            description: |
                                - 允许的文件大类型，如：["video", "image"]
                                - 当support_data_type包含file时，此配置有效
                                - 目前有：
                                  - document: 文档
                                  - spreadsheet: 工作表
                                  - presentation: 演示文稿
                                  - pdf: PDF
                                  - text: 文本
                                  - audio: 音频
                                  - video: 视频
                                  - wikidoc: wikidoc
                                  - faq:   faq
                                  - other: 其他
                            items:
                                enum:
                                    - document
                                    - spreadsheet
                                    - presentation
                                    - pdf
                                    - text
                                    - audio
                                    - other
                                    - video
                                    - wikidoc
                                    - faq
                                example: video
                                type: string
                            type: array
                        allowed_file_types:
                            description: |
                                - 允许的文件类型，如：["mp4", "jpg"]
                                - 当support_data_type包含file时，此配置有效
                                - 在创建和编辑时，不需要传递此字段。会根据allowed_file_categories自动生成
                            items:
                                example: mp4
                                type: string
                            type: array
                        max_file_count:
                            description: |
                                - 临时区最大文件数量（目前最多50个文件）
                                - 默认：50
                            example: 50
                            type: integer
                        name:
                            description: |
                                - 区域名称
                                  - 默认：临时区
                            example: 临时区
                            type: string
                        single_chat_max_select_file_count:
                            description: |
                                - 单次对话中支持选择的文件个数（目前最多5个文件）
                                - 默认：5
                            example: 5
                            type: integer
                        single_file_size_limit:
                            description: |
                                - 单文件大小限制
                                - 目前的限制是最大100MB
                            example: 100
                            type: integer
                        single_file_size_limit_unit:
                            description: 单文件大小限制单位
                            enum:
                                - KB
                                - MB
                                - GB
                            example: MB
                            type: string
                        support_data_type:
                            description: |
                                - 支持的数据类型
                                  - file: 文件 （目前支持文件，后面可能会增加新的类型，比如af的相关数据等）
                                - 默认：["file"]
                            items:
                                enum:
                                    - file
                                example: file
                                type: string
                            type: array
                        tmp_file_use_type:
                            description: |
                                - 临时文件使用类型
                                  - upload: 直接上传
                                  - select_from_temp_zone: 从临时区选择
                            example: select_from_temp_zone
                            type: string
                    required:
                        - tmp_file_use_type
                        - single_file_size_limit
                        - single_file_size_limit_unit
                        - support_data_type
                        - allowed_file_categories
                    type: object
            required:
                - fields
            type: object
        interrupt_data:
