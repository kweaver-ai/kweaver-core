    description: |-
        API to access DIP

        如有任何疑问，可到开发者社区提问：https://developers.aishu.cn
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    termsOfService: http://swagger.io/terms/
    title: Agent-Factory API
    version: 1.0.0
openapi: 3.0.2
paths:
    /api/agent-factory/v1/app/{app_key}/api/chat/completion:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: APIChat
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/APIChatRequest'
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatResponse'
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: APIChat
            tags:
                - 对话
                - 对话-internal
    /api/agent-factory/v1/app/{app_key}/api/doc:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: 获取Agent Api文档
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                agent_id:
                                    description: agent id
                                    type: string
                                agent_version:
                                    description: agent version
                                    type: string
                            type: object
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                description: 返回结果:open api文档
                                type: object
                    description: 成功
            summary: 获取Agent Api文档
            tags:
                - 对话
    /api/agent-factory/v1/app/{app_key}/chat/completion:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: 与 Agent 进行对话交互，支持流式响应
            parameters:
                - description: 应用 Key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/swagger.ChatReq'
                description: 对话请求
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/swagger.ChatResp'
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 对话
            tags:
                - 对话
                - 对话-internal
    /api/agent-factory/v1/app/{app_key}/chat/resume:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: 恢复之前的对话会话
            parameters:
                - description: 应用 Key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/swagger.ResumeReq'
                description: 恢复请求
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatResponse'
                    description: OK
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 对话恢复
            tags:
                - 对话
    /api/agent-factory/v1/app/{app_key}/chat/termination:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: 终止对话
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                agent_run_id:
                                    description: agent运行id
                                    type: string
                                conversation_id:
                                    description: conversation_id
                                    type: string
                                interrupted_assistant_message_id:
                                    description: |
                                        - 中断的助手信息ID
                                          - 当中断触发，但未执行继续或跳过等操作，此时进行终止操作时需要传入
                                    type: string
                            required:
                                - conversation_id
                                - agent_run_id
                            type: object
                description: 请求体
                x-originalParamName: request
            responses:
                "204":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 终止对话
            tags:
                - 对话
    /api/agent-factory/v1/app/{app_key}/conversation:
        delete:
            description: 删除所有对话
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
            responses:
                "204":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: 所有对话删除成功
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/responses-InternalServerError'
                    description: 服务器内部错误
            summary: 删除所有对话
            tags:
                - 对话管理
        get:
            description: 获取指定应用的会话列表，支持分页
            parameters:
                - description: 应用 Key
                  in: path
                  name: app_key
                  schema:
                    type: string
                - description: 页码，默认1
                  in: query
                  name: page
                  schema:
                    default: 1
                    type: integer
                - description: 每页数量，默认10
                  in: query
                  name: size
                  schema:
                    default: 10
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConversationListResponse'
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 获取对话列表
            tags:
                - 对话管理
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
        post:
            description: 创建一个新的会话会话
            parameters:
                - description: 应用 Key
                  in: path
                  name: app_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/conversationreq.InitReq'
                description: 初始化请求
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConversationInitResponse'
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 初始化对话
            tags:
                - 对话管理
    /api/agent-factory/v1/app/{app_key}/conversation/{id}:
        delete:
            description: 删除对话
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
                - description: id
                  in: path
                  name: id
                  schema:
                    type: string
            responses:
                "204":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: 删除成功
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 删除对话
            tags:
                - 对话管理
        get:
            description: 根据会话 ID 获取会话详细信息
            parameters:
                - description: 应用 Key
                  in: path
                  name: app_key
                  schema:
                    type: string
                - description: 会话 ID
                  in: path
                  name: id
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConversationDetail'
                    description: 成功
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 获取对话详情
            tags:
                - 对话管理
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
            - in: path
              name: id
              schema:
                type: string
        put:
            description: 编辑对话(修改标题)
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
                - description: id
                  in: path
                  name: id
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                title:
                                    description: 对话标题
                                    type: string
                            required:
                                - title
                            type: object
                description: 请求体
                x-originalParamName: request
            responses:
                "204":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: 成功
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 编辑对话(修改标题)
            tags:
                - 对话管理
    /api/agent-factory/v1/app/{app_key}/conversation/{id}/mark_read:
        parameters:
            - in: path
              name: app_key
              schema:
                type: string
            - in: path
              name: id
              schema:
                type: string
        put:
            description: 标记对话已读
            parameters:
                - description: app_key
                  in: path
                  name: app_key
                  schema:
                    type: string
                - description: id
                  in: path
                  name: id
                  schema:
                    type: string
            requestBody:
                content:
