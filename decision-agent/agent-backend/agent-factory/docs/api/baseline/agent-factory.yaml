    /api/agent-factory/v3/agent-inout/import:
        post:
            description: '- 从导出的JSON文件中导入data agent数据 - 支持批量导入多个agent - agent标识（key）不可与已存在的重复 - 如果重复，需要先删除已存在的agent，再导入 - 重复时，会返回重复的agent列表（包括agent_id、agent_key和agent_name） - 只能导入到\"我的个人空间\"中'
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                    multipart/form-data:
                        encoding:
                            file:
                                contentType: application/json
                        schema:
                            properties:
                                file:
                                    description: 导入的JSON文件
                                    format: binary
                                    type: string
                                import_type:
                                    description: |
                                        - 导入类型
                                        - upsert: 如果agent_key存在则更新，否则创建
                                        - create: 只能创建，如果agent_key存在则失败
                                    enum:
                                        - upsert
                                        - create
                                    example: upsert
                                    type: string
                            required:
                                - file
                                - import_type
                            type: object
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            examples:
                                failure:
                                    description: 部分agent导入失败，包含各种错误信息
                                    summary: 导入失败
                                    value:
                                        agent_key_conflict:
                                            - agent_key: duplicate_agent_001
                                              agent_name: 重复的智能体
                                        biz_domain_conflict:
                                            - agent_key: duplicate_agent_002
                                              agent_name: 重复的智能体
                                        config_invalid:
                                            - agent_key: invalid_agent_001
                                              agent_name: 配置错误的智能体
                                        is_success: false
                                        no_create_system_agent_pms:
                                            - agent_key: system_agent_001
                                              agent_name: 系统智能体示例
                                success:
                                    description: 所有agent都成功导入
                                    summary: 导入成功
                                    value:
                                        agent_key_conflict: []
                                        config_invalid: []
                                        is_success: true
                                        no_create_system_agent_pms: []
                            schema:
                                properties:
                                    agent_key_conflict:
                                        description: |
                                            - agent标识冲突的agent列表
                                              - 当import_type为upsert时，判断agent_key对应agent是否是当前导入者的agent。如果不是，导入失败，将agent_key和agent_name添加到此列表
                                              - 当import_type为create时，如果agent_key存在则失败，将agent_key和agent_name添加到此列表
                                        items:
                                            properties:
                                                agent_key:
                                                    description: agent标识
                                                    type: string
                                                agent_name:
                                                    description: agent名称
                                                    type: string
                                            type: object
                                        type: array
                                    biz_domain_conflict:
                                        description: |
                                            - 在更新模式下，agent标识因业务域冲突的agent列表
                                              - 如果导入的agent_key对应的agent不是当前业务域的，则导入失败，将agent_key和agent_name添加到此列表
                                              - 原因：导入的有其他业务域的agent，在当前业务域下没法更新其他业务域的agent
                                            - 创建模式下没有这个问题，因为是创建新的agent（agent_key会新生成）
                                        items:
                                            properties:
                                                agent_key:
                                                    description: agent标识
                                                    type: string
                                                agent_name:
                                                    description: agent名称
                                                    type: string
                                            type: object
                                        type: array
                                    config_invalid:
                                        description: 配置无效的agent列表
                                        items:
                                            properties:
                                                agent_key:
                                                    description: agent标识
                                                    type: string
                                                agent_name:
                                                    description: agent名称
                                                    type: string
                                            type: object
                                        type: array
                                    is_success:
                                        description: 是否导入成功
                                        type: boolean
                                    no_create_system_agent_pms:
                                        description: |
                                            - 需要"创建系统agent权限"的agent列表
                                              - 如果导入的agent为系统agent，会判断当前导入者是否有"创建系统agent权限"。如果没有，导入失败，将agent_key和agent_name添加到此列表
                                            - 细节说明：
                                              - 对于更新模式（upsert），虽然对于已存在的agent，不会修改"是否是系统Agent"的状态，但对于不存在的agent，会根据导入的agent的"是否是系统Agent"字段来进行创建。这里会统一进行判断是否有"创建系统agent权限"，不再详细区分某个Agent是创建还是更新。
                                        items:
                                            properties:
                                                agent_key:
                                                    description: agent标识
                                                    type: string
                                                agent_name:
                                                    description: agent名称
                                                    type: string
                                            type: object
                                        type: array
                                type: object
                    description: 导入结果
                "400":
                    $ref: '#/components/responses/400'
                "401":
                    $ref: '#/components/responses/401'
                "403":
                    $ref: '#/components/responses/403'
                "500":
                    $ref: '#/components/responses/500'
            summary: 导入数据
            tags:
                - 其他
