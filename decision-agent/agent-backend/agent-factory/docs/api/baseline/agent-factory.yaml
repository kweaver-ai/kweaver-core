            operationId: getAgentObservability
            parameters:
                - description: agent_id
                  in: path
                  name: agent_id
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AgentObservabilityReq'
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AgentObservabilityResp'
                    description: 成功返回Agent可观测信息
                "400":
                    $ref: '#/components/responses/BadRequestError'
                "404":
                    $ref: '#/components/responses/NotFoundError'
                "500":
                    $ref: '#/components/responses/InternalServerError'
            summary: 查询指定Agent的可观测信息
            tags:
                - 可观测性
    /api/agent-factory/v1/observability/agent/{agent_key}/conversation:
        parameters:
            - in: path
              name: agent_key
              schema:
                type: string
        post:
            description: 查询Agent下的所有对话列表，支持分页和根据对话title模糊查询
            operationId: getConversationList
            parameters:
                - description: agent_key
                  in: path
                  name: agent_key
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ConversationListObservabilityReq'
                description: 请求体
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ConversationListObservabilityResp'
