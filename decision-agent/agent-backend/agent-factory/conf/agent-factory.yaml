
switch_fields:
    # 是否保留老的APP路径
    keep_legacy_app_path: false

    # 是否禁用权限检查（本地开发时建议设置为true）
    disable_pms_check: true

    # 是否全局禁用业务域（开启后优先级高于 disable_biz_domain_init）
    disable_biz_domain: false

    # 是否禁用业务域初始化（本地开发时建议设置为true）
    disable_biz_domain_init: true



    # 是否禁用审计日志初始化（本地开发时建议设置为true）
    disable_audit_init: true

    mock:
        # 是否使用Mock MQ客户端（本地开发时建议设置为true）
        mock_mq_client: true

        # 是否使用Mock Sandbox Platform（本地开发时建议设置为true）
        mock_sandbox_platform: false

        # 是否使用Mock Hydra（本地开发时建议设置为true）
        mock_hydra: true

        # 是否使用Mock AuthZ（本地开发时建议设置为true）
        mock_authz: true

        # 是否使用Mock BizDomain（本地开发时建议设置为true）
        mock_biz_domain: true

        # Mock Hydra 返回的用户 ID
        mock_user_id: "mock-user-id"

