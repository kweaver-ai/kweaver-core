paths:
  /connector-types:
    get:
      consumes:
      - application/json
      description: Get a list of connector types with pagination and filters
      parameters:
      - description: Tag filter
        in: query
        maxLength: 40
        name: tag
        type: string
      - description: Enabled filter
        in: query
        name: enabled
        type: boolean
      - description: Mode filter
        in: query
        name: mode
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
        default: 0
      - description: Limit for pagination
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
        default: 20
      - description: Sort field
        enum:
        - name
        - update_time
        in: query
        name: sort
        type: string
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: direction
        type: string
        default: desc
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: List connector types
      tags:
      - connector-types
    post:
      consumes:
      - application/json
      description: Register a new connector type
      parameters:
      - description: Connector type information
        in: body
        name: connector_type
        required: true
        schema:
          $ref: connector.yaml#/definitions/interfaces.ConnectorTypeReq
      produces:
      - application/json
      responses:
        '201':
          description: Created
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Register connector type
      tags:
      - connector-types
  /connector-types/{type}:
    get:
      consumes:
      - application/json
      description: Get a connector type by type
      parameters:
      - description: Connector type
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Get connector type
      tags:
      - connector-types
    put:
      consumes:
      - application/json
      description: Update a connector type by type
      parameters:
      - description: Connector type
        in: path
        name: type
        required: true
        type: string
      - description: Connector type information
        in: body
        name: connector_type
        required: true
        schema:
          $ref: connector.yaml#/definitions/interfaces.ConnectorTypeReq
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '409':
          description: Conflict
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Update connector type
      tags:
      - connector-types
    delete:
      consumes:
      - application/json
      description: Delete a connector type by type
      parameters:
      - description: Connector type
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Delete connector type
      tags:
      - connector-types
  /connector-types/{type}/enabled:
    post:
      consumes:
      - application/json
      description: Set connector type enabled status
      parameters:
      - description: Connector type
        in: path
        name: type
        required: true
        type: string
      - description: Enabled status
        in: body
        name: enabled
        required: true
        schema:
          type: object
          properties:
            enabled:
              type: boolean
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            type: object
        '404':
          description: Not Found
          schema:
            type: object
        '500':
          description: Internal Server Error
          schema:
            type: object
      summary: Set connector type enabled
      tags:
      - connector-types
definitions:
  interfaces.ConnectorConfig:
    additionalProperties: {}
    type: object
    description: 'Connector configuration varies by data source type. Below are the parameters for each type:


      **MySQL:**

      - host (string, required): MySQL服务器主机地址

      - port (integer, required): MySQL服务器端口，范围1-65535

      - username (string, required): 数据库用户名

      - password (string, required): 数据库密码

      - databases (array, optional): 数据库名称列表，每个数据库名最大64字符。如果为空，则连接到实例级别

      - options (object, optional): 连接参数，如charset、timeout等


      **MariaDB:**

      - host (string, required): MariaDB服务器主机地址

      - port (integer, required): MariaDB服务器端口，范围1-65535

      - username (string, required): 数据库用户名

      - password (string, required): 数据库密码

      - databases (array, optional): 数据库名称列表，每个数据库名最大64字符。如果为空，则连接到实例级别

      - options (object, optional): 连接参数，如charset、timeout等


      **PostgreSQL:**

      - host (string, required): PostgreSQL服务器主机地址

      - port (integer, required): PostgreSQL服务器端口，范围1-65535

      - username (string, required): 数据库用户名

      - password (string, required): 数据库密码

      - database (string, required): 要连接的数据库名称，数据库名最大63字符

      - schemas (array, optional): 模式名称列表，每个模式名最大63字符。如果为空，则连接到实例级别

      - options (object, optional): 连接参数，如sslmode、connect_timeout、applicati


      **OpenSearch:**

      - host (string, required): OpenSearch服务器主机地址

      - port (integer, required): OpenSearch服务器端口

      - username (string, optional): 认证用户名

      - password (string, optional): 认证密码

      - index_pattern (string, optional): 索引匹配模式，如log-*


      **AnyShare:**

      - protocol (string, required): 连接协议，http 或 https

      - host (string, required): AnyShare服务主机地址

      - port (integer, required): 服务端口，范围1-65535

      - auth_type (integer, required): 认证方式，1=访问令牌(Token)，2=AppID/AppSecret

      - token (string, optional): 访问令牌，auth_type=1时必填，加密存储

      - app_id (string, optional): 应用账户ID，auth_type=2时必填

      - app_secret (string, optional): 应用密钥，auth_type=2时必填，加密存储

      - doc_lib_type (integer, required): 文档库类型，1=知识库

      - paths (array, optional): 路径列表，按文档库名称路径解析起点，空则按文档库类型枚举

      '
  interfaces.ConnectorTypeReq:
    properties:
      type:
        description: connector类型，唯一标识，最大40字符
        type: string
      name:
        maxLength: 255
        minLength: 1
        description: 类型名称，如mysql, postgresql, kafka等，最大255字符
        type: string
      description:
        maxLength: 1000
        description: 类型描述，最大1000字符
        type: string
      category:
        description: 分类，table表示关系型数据库，index表示搜索引擎，topic表示消息队列，file表示文件，fileset表示文件集，metric表示时序数据库，api表示API服务
        enum:
        - table
        - index
        - topic
        - file
        - fileset
        - metric
        - api
        type: string
      mode:
        description: 模式，local表示内置在vega-backend进程内运行，remote表示作为独立服务运行，通过HTTP调用
        enum:
        - local
        - remote
        type: string
      enabled:
        description: 是否启用，true表示启用，false表示禁用
        type: boolean
      connector_config_schema:
        description: 字段配置列表（JSON数组格式，定义连接配置的结构），每个字段包含name、type、description、required、encrypted等属性
        type: object
      tags:
        items:
          maxLength: 40
          minLength: 1
          type: string
        maxItems: 5
        description: 标签，JSON数组格式，用于分类和检索，最多5个，每个标签最大40字符
        type: array
    required:
    - type
    - name
    - category
    - mode
    type: object
