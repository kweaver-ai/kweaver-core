# 查询类测试套件：mdl-uniquery 模块

feature: mdl-uniquery
story: query_data
switch: y
tags:
  - query
  - regression

cases:
  - name: 查询视图数据_带过滤条件
    url: 查询视图数据
    path_params: '{"ids": "${view_id}"}'
    header_params: '{"x-http-method-override": "GET"}'
    body_params: '{"start": ${start_ts}, "end": ${end_ts}, "sort": [{"field": "@timestamp", "direction": "desc"}], "offset": 0, "limit": 5, "need_total": true, "use_search_after": false, "filters": {"operation": "and", "sub_conditions": [{"field": "labels.host", "display_name": "labels.host", "operation": "in", "value_from": "const", "value": ["10.2.12.23", "10.21.2.3"]}, {"field": "labels.job", "display_name": "labels.job", "operation": "=", "value_from": "const", "value": "prometheus"}]}}'
    code_check: "500"
    description: 对齐原 pytest 用例中的过滤查询场景
    tags:
      - query

  - name: 查询不存在视图数据
    url: 查询视图数据
    path_params: '{"ids": "${invalid_view_id}"}'
    header_params: '{"x-http-method-override": "GET"}'
    body_params: '{"start": ${start_ts}, "end": ${end_ts}, "sort": [{"field": "@timestamp", "direction": "asc"}], "offset": 0, "limit": 2, "need_total": true, "use_search_after": false}'
    code_check: "500"
    description: 对齐原负向场景：不存在视图
    tags:
      - query
      - negative

  - name: 查询视图数据_参数错误
    url: 查询视图数据
    path_params: '{"ids": "${view_id}"}'
    header_params: '{"x-http-method-override": "GET"}'
    body_params: '{"start": "invalid_start", "end": "invalid_end"}'
    code_check: "400"
    description: 对齐原负向场景：时间参数类型错误
    tags:
      - query
      - negative

  - name: 内部查询视图数据
    url: 内部查询视图数据
    path_params: '{"ids": "${view_id}"}'
    header_params: '{"x-http-method-override": "GET"}'
    body_params: '{"start": ${start_ts}, "end": ${end_ts}, "sort": [{"field": "@timestamp", "direction": "asc"}], "offset": 0, "limit": 2, "need_total": true, "use_search_after": false}'
    code_check: "200"
    description: 对齐原内部接口查询用例（原测试允许 200/400/500，这里固定 200 用于稳定冒烟）
    tags:
      - query
      - internal
