# API 列表：vega-gateway-pro 模块

- name: 获取高级配置
  url: /api/vega-gateway-pro/v1/config
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新高级配置
  url: /api/vega-gateway-pro/v1/config
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

