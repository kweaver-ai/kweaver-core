# 冒烟测试套件：vega-backend 模块

feature: vega-backend
story: smoke_test
switch: y
tags:
  - smoke

cases:
  - name: 健康检查
    url: 健康检查
    code_check: "200"
    description: 验证服务健康检查接口（仅校验 HTTP 状态；响应体可能非 JSON）
    tags:
      - smoke
      - health

  - name: 获取资源列表
    url: 获取资源列表
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证资源列表接口可用
    tags:
      - smoke

  - name: 执行查询
    url: 执行查询
    body_params: '{"query": "SELECT * FROM test LIMIT 10"}'
    code_check: "200"
    description: 验证查询执行接口可用
    tags:
      - smoke
      - query
