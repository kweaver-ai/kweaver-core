# API 列表：vega-backend 模块

- name: 执行查询
  url: /api/vega-backend/v1/query/execute
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询会话状态
  url: /api/vega-backend/v1/query/session/${query_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取下一页数据
  url: /api/vega-backend/v1/query/session/${query_id}/next
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 关闭查询会话
  url: /api/vega-backend/v1/query/session/${query_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取资源列表
  url: /api/vega-backend/v1/resources
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 创建资源
  url: /api/vega-backend/v1/resources
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新资源
  url: /api/vega-backend/v1/resources/${id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除资源
  url: /api/vega-backend/v1/resources/${id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询权限
  url: /api/vega-backend/v1/permission/check
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取用户信息
  url: /api/vega-backend/v1/user/info
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 健康检查
  url: /api/vega-backend/v1/health
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
