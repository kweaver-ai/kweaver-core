# API 列表：vega-backend 模块

- name: 健康检查
  url: /api/vega-backend/v1/health
  method: GET
  headers: >-
    {
      "Accept": "application/json"
    }
  resp_schema:
    200: >-
      {
        "status": "ok"
      }

- name: 获取目录列表
  url: /api/vega-backend/v1/catalogs
  method: GET
  headers: >-
    {
      "Accept": "application/json"
    }
  resp_schema:
    200: >-
      {
        "entries": [],
        "total_count": 0
      }
    400: >-
      {
        "code": "bad_request",
        "message": "请求参数无效"
      }
    401: >-
      {
        "code": "unauthorized",
        "message": "未授权"
      }
    500: >-
      {
        "code": "internal_error",
        "message": "服务器内部错误"
      }

