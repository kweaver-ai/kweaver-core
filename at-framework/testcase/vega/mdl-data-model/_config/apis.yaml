# API 列表：mdl-data-model 模块

- name: 查询数据视图分组列表
  url: /api/mdl-data-model/v1/data-view-groups
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 创建数据视图分组
  url: /api/mdl-data-model/v1/data-view-groups
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新数据视图分组
  url: /api/mdl-data-model/v1/data-view-groups/${group_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除数据视图分组
  url: /api/mdl-data-model/v1/data-view-groups/${group_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 导出分组数据视图
  url: /api/mdl-data-model/v1/data-view-groups/${group_id}/data-views
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 创建行列权限规则
  url: /api/mdl-data-model/v1/data-view-row-column-rules
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询行列权限规则列表
  url: /api/mdl-data-model/v1/data-view-row-column-rules
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询行列权限规则详情
  url: /api/mdl-data-model/v1/data-view-row-column-rules/${rule_ids}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新行列权限规则
  url: /api/mdl-data-model/v1/data-view-row-column-rules/${rule_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除行列权限规则
  url: /api/mdl-data-model/v1/data-view-row-column-rules/${rule_ids}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询指标模型分组列表
  url: /api/mdl-data-model/v1/metric-model-groups
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 创建指标模型分组
  url: /api/mdl-data-model/v1/metric-model-groups
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新指标模型分组
  url: /api/mdl-data-model/v1/metric-model-groups/${group_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除指标模型分组
  url: /api/mdl-data-model/v1/metric-model-groups/${group_id}?force=${force}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 查询指标模型列表
  url: /api/mdl-data-model/v1/metric-models
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 创建指标模型
  url: /api/mdl-data-model/v1/metric-models
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除单个指标模型
  url: /api/mdl-data-model/v1/metric-models/${metric_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 批量删除指标模型
  url: /api/mdl-data-model/v1/metric-models/${metric_ids}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
