- name: 查询数据模型列表
  url: /api/mdl-data-model/v1/models
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 创建数据模型
  url: /api/mdl-data-model/v1/models
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 查询数据模型详情
  url: /api/mdl-data-model/v1/models/${id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 更新数据模型
  url: /api/mdl-data-model/v1/models/${id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 删除数据模型
  url: /api/mdl-data-model/v1/models/${id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 查询模型字段列表
  url: /api/mdl-data-model/v1/models/${id}/fields
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 添加模型字段
  url: /api/mdl-data-model/v1/models/${id}/fields
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 更新模型字段
  url: /api/mdl-data-model/v1/models/${id}/fields/${field_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 删除模型字段
  url: /api/mdl-data-model/v1/models/${id}/fields/${field_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 发布数据模型
  url: /api/mdl-data-model/v1/models/${id}/publish
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 撤销发布
  url: /api/mdl-data-model/v1/models/${id}/unpublish
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 查询模型版本历史
  url: /api/mdl-data-model/v1/models/${id}/versions
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 模型导入
  url: /api/mdl-data-model/v1/models/import
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
- name: 模型导出
  url: /api/mdl-data-model/v1/models/${id}/export
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'
