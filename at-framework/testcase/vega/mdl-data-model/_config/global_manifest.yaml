variables:
  - name: view_id
    description: 用于行列权限规则的视图ID
    type: string
    example: "test_view_id"
    required: true
  - name: group_id_non_existent
    description: 不存在的数据视图分组ID
    type: string
    example: "non_existent_group"
    required: true
  - name: rule_id_non_existent
    description: 不存在的行列权限规则ID
    type: string
    example: "non_existent_rule"
    required: true
  - name: metric_group_id_non_existent
    description: 不存在的指标模型分组ID
    type: string
    example: "999999999"
    required: true
  - name: metric_model_id_non_existent
    description: 不存在的指标模型ID
    type: string
    example: "999999999"
    required: true
  - name: force_true
    description: 强制删除标记
    type: string
    example: "true"
    required: true
  - name: force_false
    description: 非强制删除标记
    type: string
    example: "false"
    required: true
