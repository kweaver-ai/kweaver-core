variables:
- name: model_id
  description: 数据模型 ID
  type: string
  example: mdl-xxx-xxx-xxx
  required: true
- name: model_name
  description: 数据模型名称
  type: string
  example: test-model
  required: true
- name: field_id
  description: 模型字段 ID
  type: string
  example: field-xxx-xxx-xxx
  required: false
- name: field_name
  description: ????
  type: string
  example: test_field
  required: false
- name: version_id
  description: ???? ID
  type: string
  example: ver-xxx-xxx-xxx
  required: false
- name: model_status
  description: ????
  type: string
  example: published
  required: false
- name: group_id
  description: metric/data-view group id
  ref: ${group_id}
- name: force
  description: delete force flag
  ref: ${force}
- name: ids
  description: comma separated metric ids
  ref: ${ids}
- name: rule_id
  description: row column rule id
  ref: ${rule_id}
- name: rule_ids
  description: comma separated rule ids
  ref: ${rule_ids}
