cases:
  - case_id: "metric_legacy_001"
    suite: "metric_model 迁移套件"
    switch: n
    name: "查询指标模型分组列表"
    description: "迁移自 test_metric_model/test_group_list.py"
    api_name: "list_metric_groups"
    tags:
      - metric
      - group
      - legacy
    expect:
      status_code: 200

  - case_id: "metric_legacy_002"
    suite: "metric_model 迁移套件"
    switch: n
    name: "创建指标模型分组"
    description: "迁移自 test_metric_model/test_group_create.py"
    api_name: "create_metric_group"
    tags:
      - metric
      - group
      - legacy
    body:
      name: "迁移分组_${timestamp}"
      comment: "legacy migration case"
    expect:
      status_code: 201
      extract:
        - type: json_path
          source: "$.id"
          var_name: "group_id"

  - case_id: "metric_legacy_003"
    suite: "metric_model 迁移套件"
    switch: n
    name: "更新指标模型分组"
    description: "迁移自 test_metric_model/test_group_update.py"
    api_name: "update_metric_group"
    tags:
      - metric
      - group
      - legacy
    body:
      name: "迁移分组更新_${timestamp}"
      comment: "legacy update"
    expect:
      status_code: 204

  - case_id: "metric_legacy_004"
    suite: "metric_model 迁移套件"
    switch: n
    name: "创建指标模型"
    description: "迁移自 test_metric_model/test_model_create.py"
    api_name: "create_metric_model"
    tags:
      - metric
      - model
      - legacy
    body:
      name: "迁移指标_${timestamp}"
      group_id: "${group_id}"
      model_type: "data_view"
      description: "legacy migration case"
    expect:
      status_code: 201
      extract:
        - type: json_path
          source: "$.id"
          var_name: "id"

  - case_id: "metric_legacy_005"
    suite: "metric_model 迁移套件"
    switch: n
    name: "查询指标模型列表"
    description: "迁移自 test_metric_model/test_model_list.py"
    api_name: "list_metric_models"
    tags:
      - metric
      - model
      - legacy
    expect:
      status_code: 200

  - case_id: "metric_legacy_006"
    suite: "metric_model 迁移套件"
    switch: n
    name: "删除指标模型"
    description: "迁移自 test_metric_model/test_model_delete.py"
    api_name: "delete_metric_model"
    tags:
      - metric
      - model
      - cleanup
      - legacy
    expect:
      status_code: 204

  - case_id: "metric_legacy_007"
    suite: "metric_model 迁移套件"
    switch: n
    name: "删除指标模型分组"
    description: "迁移自 test_metric_model/test_group_delete.py"
    api_name: "delete_metric_group"
    tags:
      - metric
      - group
      - cleanup
      - legacy
    setup:
      - type: set_var
        var_name: "force"
        value: "true"
    expect:
      status_code: 204
