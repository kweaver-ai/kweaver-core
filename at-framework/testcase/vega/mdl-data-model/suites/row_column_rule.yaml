feature: mdl-data-model
story: row_column_rule
switch: y
tags:
  - row-column-rule
  - regression

cases:
  - name: 创建行列权限规则_单条
    url: 创建行列权限规则
    body_params: '[{"name":"规则_${ts_uuid}","view_id":"${view_id}","tags":["test"],"comment":"测试权限规则","fields":["field1","field2"]}]'
    code_check: "201"
    resp_values: '{"created_rule_id":"$[0].id"}'

  - name: 创建行列权限规则_空名称
    url: 创建行列权限规则
    body_params: '[{"name":"","view_id":"${view_id}","tags":["test"],"comment":"测试权限规则","fields":["field1","field2"]}]'
    code_check: "400"
    tags: [negative]

  - name: 查询行列权限规则列表_默认
    url: 查询行列权限规则列表
    query_params: '{"offset":0,"limit":10,"sort":"update_time","direction":"desc"}'
    code_check: "200"

  - name: 查询行列权限规则列表_按视图过滤
    url: 查询行列权限规则列表
    query_params: '{"offset":0,"limit":20,"sort":"name","direction":"desc","view_id":"${view_id}"}'
    code_check: "200"

  - name: 查询行列权限规则详情_单个
    url: 查询行列权限规则详情
    prev_case: 创建行列权限规则_单条
    path_params: '{"rule_ids":"${created_rule_id}"}'
    code_check: "200"

  - name: 查询行列权限规则详情_不存在
    url: 查询行列权限规则详情
    path_params: '{"rule_ids":"${rule_id_non_existent}"}'
    code_check: "404"
    tags: [negative]

  - name: 更新行列权限规则_正常
    url: 更新行列权限规则
    prev_case: 创建行列权限规则_单条
    path_params: '{"rule_id":"${created_rule_id}"}'
    body_params: '{"name":"更新后规则_${ts_uuid}","comment":"更新备注","fields":["field1","field2"]}'
    code_check: "204"

  - name: 删除行列权限规则_正常
    url: 删除行列权限规则
    prev_case: 创建行列权限规则_单条
    path_params: '{"rule_ids":"${created_rule_id}"}'
    code_check: "204"

  - name: 删除行列权限规则_不存在
    url: 删除行列权限规则
    path_params: '{"rule_ids":"${rule_id_non_existent}"}'
    code_check: "404"
    tags: [negative]
