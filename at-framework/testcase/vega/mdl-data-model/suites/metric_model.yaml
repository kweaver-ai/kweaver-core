feature: mdl-data-model
story: metric_model
switch: y
tags:
  - metric-model
  - regression

cases:
  - name: 准备指标分组_用于模型测试
    url: 创建指标模型分组
    body_params: '{"name":"指标测试分组_${ts_uuid}","comment":"用于模型测试"}'
    code_check: "201"
    resp_values: '{"metric_group_for_model":"$.id"}'

  - name: 创建指标模型_promql
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"测试PromQL指标_${ts_uuid}","id":"测试PromQL指标_${ts_uuid}","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "201"
    resp_values: '{"created_metric_id":"$[0].id"}'

  - name: 创建指标模型_dsl
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"测试DSL指标_${ts_uuid}","id":"测试DSL指标_${ts_uuid}","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"dsl","formula":"{\"size\":0,\"query\":{\"match_all\":{}}}","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"timeUnit","unit":"ms"}]'
    code_check: "201"

  - name: 创建指标模型_带持久化任务
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
