    code_check: "201"

  - name: 创建指标模型_带标签
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"带标签指标_${ts_uuid}","id":"带标签指标_${ts_uuid}","tags":["监控","CPU"],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "201"

  - name: 创建指标模型_空名称
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"","id":"","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "400"
    tags: [negative]

  - name: 创建指标模型_重复名称
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"重复指标名称_${ts_uuid}","id":"重复指标名称_${ts_uuid}","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "201"
    resp_values: '{"duplicate_metric_id":"$[0].id"}'

  - name: 创建指标模型_重复名称再次创建
    url: 创建指标模型
    prev_case: 创建指标模型_重复名称
    body_params: '[{"name":"重复指标名称_${ts_uuid}","id":"重复指标名称_${ts_uuid}","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "400"
    tags: [negative]

  - name: 创建指标模型_无效指标类型
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"无效类型指标_${ts_uuid}","id":"无效类型指标_${ts_uuid}","tags":[],"comment":"","metric_type":"invalid_type","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"promql","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "400"
    tags: [negative]

  - name: 创建指标模型_无效查询类型
    url: 创建指标模型
    prev_case: 准备指标分组_用于模型测试
    body_params: '[{"name":"无效查询类型指标_${ts_uuid}","id":"无效查询类型指标_${ts_uuid}","tags":[],"comment":"","metric_type":"atomic","group_id":"${metric_group_for_model}","data_source":{"type":"DSL","id":"__isf_audit_log"},"query_type":"invalid_query","formula":"100","date_field":"@timestamp","date_format":"epoch_millis","measure_field":"value","unit_type":"numUnit","unit":"none"}]'
    code_check: "400"
    tags: [negative]

  - name: 查询指标模型列表_默认
    url: 查询指标模型列表
    query_params: '{"sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_按名称模糊
    url: 查询指标模型列表
    query_params: '{"name_pattern":"测试","sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_按指标类型
    url: 查询指标模型列表
    query_params: '{"metric_type":"atomic","sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_按查询类型
    url: 查询指标模型列表
    query_params: '{"query_type":"promql","sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_按分组ID
    url: 查询指标模型列表
    prev_case: 准备指标分组_用于模型测试
    query_params: '{"group_id":"${metric_group_for_model}","sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_按标签
    url: 查询指标模型列表
    query_params: '{"tag":"监控","sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_简单信息
    url: 查询指标模型列表
    query_params: '{"simple_info":true,"sort":"update_time","direction":"desc","offset":0,"limit":10}'
    code_check: "200"

  - name: 查询指标模型列表_分页
    url: 查询指标模型列表
    query_params: '{"sort":"update_time","direction":"desc","offset":5,"limit":20}'
    code_check: "200"

  - name: 查询指标模型列表_name与name_pattern并存
    url: 查询指标模型列表
    query_params: '{"name":"测试","name_pattern":"测试"}'
    code_check: "400"
    tags: [negative]

  - name: 查询指标模型列表_无效指标类型
    url: 查询指标模型列表
    query_params: '{"metric_type":"invalid_type"}'
    code_check: "200"
    tags: [negative]

  - name: 查询指标模型列表_无效查询类型
    url: 查询指标模型列表
    query_params: '{"query_type":"invalid_query"}'
    code_check: "200"
    tags: [negative]

  - name: 查询指标模型列表_负数偏移
    url: 查询指标模型列表
    query_params: '{"offset":-1}'
    code_check: "400"
    tags: [negative]

  - name: 删除单个指标模型
    url: 删除单个指标模型
    prev_case: 创建指标模型_promql
    path_params: '{"metric_id":"${created_metric_id}"}'
    code_check: "204"

  - name: 删除不存在指标模型
    url: 删除单个指标模型
    path_params: '{"metric_id":"${metric_model_id_non_existent}"}'
    code_check: "404"
    tags: [negative]

  - name: 批量删除指标模型_单个ID
    url: 批量删除指标模型
    prev_case: 创建指标模型_promql
    path_params: '{"metric_ids":"${created_metric_id}"}'
    code_check: "204"

  - name: 批量删除指标模型_空列表映射
    url: 批量删除指标模型
    path_params: '{"metric_ids":""}'
    code_check: "404"
    tags: [negative]

  - name: 清理指标测试分组
    url: 删除指标模型分组
    prev_case: 准备指标分组_用于模型测试
    path_params: '{"group_id":"${metric_group_for_model}","force":"${force_true}"}'
    code_check: "204"
