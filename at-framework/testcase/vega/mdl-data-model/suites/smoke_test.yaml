# 冒烟测试套件：mdl-data-model 模块

cases:
  - case_id: "smoke_001"
    suite: "mdl-data-model 冒烟测试"
    switch: y
    name: "查询数据模型列表"
    description: "验证模型列表接口可用"
    api_name: "查询数据模型列表"
    tags:
      - smoke
    expect:
      status_code: 200
      response_checks:
        - type: json_path
          path: "$.code"
          expected: 0

  - case_id: "smoke_002"
    suite: "mdl-data-model 冒烟测试"
    switch: y
    name: "创建数据模型"
    description: "验证创建模型接口可用"
    api_name: "创建数据模型"
    tags:
      - smoke
    body:
      name: "test-model-smoke"
      description: "冒烟测试模型"
    expect:
      status_code: 200
      response_checks:
        - type: json_path
          path: "$.code"
          expected: 0

  - case_id: "smoke_003"
    suite: "mdl-data-model 冒烟测试"
    switch: y
    name: "查询模型字段列表"
    description: "验证字段列表接口可用"
    api_name: "查询模型字段列表"
    tags:
      - smoke
    expect:
      status_code: 200
