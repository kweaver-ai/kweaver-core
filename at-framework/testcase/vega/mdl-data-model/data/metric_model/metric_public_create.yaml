# 指标模型 YAML 用例数据

# 正向测试用例
- case_name: "指标模型-正常创建-名称-中文名称"
  metric_id: "${ts_uuid}"
  metric_name: "${fake_cn_name}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-名称-英文名称"
  metric_id: "${ts_uuid}"
  metric_name: "${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-名称-纯数字"
  metric_id: "${ts_uuid}"
  metric_name: "${random_int}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-名称-混合"
  metric_id: "${ts_uuid}"
  metric_name: "${fake_cn_name}${random_int}${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-id-id为空"
  metric_id: ""
  metric_name: "id-为空${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-id-小写字母"
  metric_id: "${random_str}"
  metric_name: "id-小写字母${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-id-下划线"
  metric_id: "${random_str}_"
  metric_name: "id-下划线${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-id-最短id"
  metric_id: "${random_str(1)}"
  metric_name: "id-最短id${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true

- case_name: "指标模型-正常创建-id-特殊字符"
  metric_id: "${ts_uuid}_special"
  metric_name: "id-特殊字符${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true









# 异常测试用例
- case_name: "指标模型-异常创建-名称-超长"
  metric_id: "${ts_uuid}"
  metric_name: "${random_str(256)}"
  test_type: "negative"
  expected_status: 400
  expected_res: "指标模型名称长度超出限制"
  should_exist_in_db: true

- case_name: "指标模型-异常创建-id-无效字符"
  metric_id: "invalid@~!@#$%^&*(Z)"
  metric_name: "${random_str}"
  test_type: "negative"
  expected_status: 400
  expected_res: "指标模型名称长度超出限制"
  should_exist_in_db: true