# 指标模型分组更新测试数据

# 正向测试用例
- case_name: 正常更新指标模型分组
  group_id: "{group_id}"  # 这里会通过fixture注入
  name: 更新后的测试分组
  comment: 更新后的注释
  expected_status: 204
  test_type: positive

# 负向测试用例
- case_name: 更新不存在的分组
  group_id: non_existent_group
  name: 测试分组
  comment: 测试注释
  expected_status: 404
  test_type: negative

- case_name: 空名称更新分组
  group_id: "{group_id}"  # 这里会通过fixture注入
  name: ""
  comment: 测试注释
  expected_status: 400
  test_type: negative