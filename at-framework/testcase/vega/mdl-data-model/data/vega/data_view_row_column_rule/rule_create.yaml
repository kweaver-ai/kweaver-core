# 数据视图行列权限创建测试数据

# 正向测试用例
- case_name: 正常创建数据视图行列权限
  rules:
    - name: 规则_${ts_uuid}
      view_id: test_view_id
      tags: ["test"]
      comment: 这是一个测试权限规则
      fields: ["field1", "field2"]
  expected_status: 400
  should_exist_in_db: false
  test_type: negative

- case_name: 创建带过滤条件的权限规则
  rules:
    - name: 过滤规则_${ts_uuid}
      view_id: test_view_id
      tags: ["filter"]
      comment: 带有过滤条件的权限规则
      fields: ["field1", "field2", "field3"]
      row_filters:
        field: "status"
        display_name: "status"
        operation: "=="
        value_from: "const"
        value: "active"
  expected_status: 400
  should_exist_in_db: false
  test_type: negative

