# 正向测试用例 - PromQL原子指标
- case_name: 创建PromQL原子指标
  name: 测试PromQL指标_${ts_uuid}
  metric_type: atomic
  query_type: promql
  formula: "avg(irate(node_cpu_seconds_total{name=~\"node-14-35\",mode=\"system\"}[5m]))by(name)"
  data_source_id: "__isf_audit_log"
  data_source_type: DSL
  date_field: "@timestamp"
  date_format: epoch_millis
  measure_field: value
  unit_type: numUnit
  unit: none
  group_name: 测试分组_${ts_uuid}
  expected_status: 201
  test_type: positive

# 正向测试用例 - DSL原子指标
- case_name: 创建DSL原子指标
  name: 测试DSL指标_${ts_uuid}
  metric_type: atomic
  query_type: dsl
  formula: "{\"size\":0,\"query\":{\"bool\":{\"filter\":[{\"range\":{\"metrics.node_cpu_seconds_total\":{\"gte\":0}}}]}},\"aggs\":{\"ip\":{\"terms\":{\"field\":\"labels.mode.keyword\",\"size\":10000},\"aggs\":{\"time\":{\"date_histogram\":{\"field\":\"@timestamp\",\"fixed_interval\":\"{{__interval}}\",\"min_doc_count\":1,\"order\":{\"_key\":\"asc\"}},\"aggs\":{\"value\":{\"avg\":{\"field\":\"metrics.node_cpu_seconds_total\"}}}}}}}}"
  data_source_id: "__isf_audit_log"
  data_source_type: DSL
  date_field: "@timestamp"
  date_format: epoch_millis
  measure_field: value
  unit_type: timeUnit
  unit: ms
  group_name: 测试分组_${ts_uuid}
  expected_status: 201
  test_type: positive

# 正向测试用例 - 带持久化任务的指标
- case_name: 创建带持久化任务的指标
  name: 带任务指标_${ts_uuid}
  metric_type: atomic
  query_type: promql
  formula: "100"
  data_source_id: "__isf_audit_log"
  data_source_type: DSL
  unit_type: numUnit
  unit: none
  group_name: 测试分组_${ts_uuid}
  task:
    name: 测试任务_${ts_uuid}
    schedule:
      type: FIX_RATE
      expression: "5m"
    steps:
      - "5m"
    index_base: "isf_audit_log"
    retrace_duration: "10d"
  expected_status: 201
  test_type: positive

