# 正向测试用例
- case_name: 查询分组列表默认参数
  sort: group_name
  direction: asc
  offset: 0
  limit: 10
  expected_status: 200
  test_type: positive

- case_name: 查询分组列表降序
  sort: group_name
  direction: desc
  offset: 0
  limit: 10
  expected_status: 200
  test_type: positive

- case_name: 查询分组列表分页
  sort: group_name
  direction: asc
  offset: 5
  limit: 20
  expected_status: 200
  test_type: positive

- case_name: 查询分组列表不分页
  sort: group_name
  direction: asc
  offset: 0
  limit: -1
  expected_status: 200
  test_type: positive

- case_name: 查询分组列表最大分页
  sort: group_name
  direction: asc
  offset: 0
  limit: 1000
  expected_status: 200
  test_type: positive

# 负向测试用例
- case_name: 无效的排序字段
  sort: invalid_field
  direction: asc
  offset: 0
  limit: 10
  expected_status: 400
  test_type: negative

- case_name: 无效的排序方向
  sort: group_name
  direction: invalid
  offset: 0
  limit: 10
  expected_status: 400
  test_type: negative

- case_name: 负数偏移量
  sort: group_name
  direction: asc
  offset: -1
  limit: 10
  expected_status: 400
  test_type: negative

- case_name: 超出范围的分页大小
  sort: group_name
  direction: asc
  offset: 0
  limit: 1001
  expected_status: 400
  test_type: negative