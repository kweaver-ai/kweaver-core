# 冒烟测试套件：vega-gateway 模块

feature: vega-gateway
story: smoke_test
switch: y
tags:
  - smoke

cases:
  - name: 健康检查
    url: 健康检查
    code_check: "200"
    description: 验证网关健康检查接口（仅校验 HTTP 状态；响应体可能非 JSON）
    tags:
      - smoke
      - health

  - name: 获取路由列表
    url: 获取路由列表
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证路由列表接口可用
    tags:
      - smoke

  - name: 获取网关配置
    url: 获取网关配置
    code_check: "200"
    description: 验证网关配置接口可用
    tags:
      - smoke
