# OpenSearch 元数据测试套件：data-connection 模块
# 测试 OpenSearch 元数据获取和字段映射功能

feature: data-connection
story: opensearch_metadata
switch: y
tags:
  - opensearch
  - metadata

cases:
  - name: 获取 OpenSearch 索引列表
    url: 查询 OpenSearch 索引
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证获取索引列表接口；原用例另校验 $.data 为数组，框架单条 resp_check 未逐类型断言，见集成环境再加强
    tags:
      - opensearch
      - metadata

  - name: 获取索引字段映射
    url: 获取 OpenSearch 字段映射
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证获取索引 mapping 返回字段信息；index_name 使用 global.yaml 的 index_name（默认 test-index）
    tags:
      - opensearch
      - metadata
      - mapping

  - name: 验证 keyword 字段特征
    url: 获取 OpenSearch 字段映射
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证 text 类型字段的 keyword 子字段配置（原用例对 $.data.properties 等做类型级校验）
    tags:
      - opensearch
      - field-feature
      - keyword

  - name: 验证 ignore_above 配置
    url: 获取 OpenSearch 字段映射
    code_check: "200"
    description: 验证 keyword 字段的 ignore_above 参数（默认 256）
    tags:
      - opensearch
      - field-feature
      - keyword

  - name: 验证 analyzer 分词器配置
    url: 获取 OpenSearch 字段映射
    code_check: "200"
    description: 验证 text 字段的 analyzer 配置
    tags:
      - opensearch
      - field-feature
      - analyzer

  - name: 验证 mappingConfig 完整结构
    url: 获取 OpenSearch 字段映射
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证返回的 mappingConfig 包含完整的字段特征配置（原用例对 $.data.properties.*.mappingConfig 做 object 类型校验）
    tags:
      - opensearch
      - field-feature
      - mapping-config
