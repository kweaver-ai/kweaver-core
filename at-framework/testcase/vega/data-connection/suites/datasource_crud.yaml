# 数据源 CRUD 测试套件：data-connection 模块

feature: data-connection
story: datasource_crud
switch: y
tags:
  - datasource

cases:
  - name: 创建 OpenSearch 数据源
    url: 新增数据源
    body_params: '{"name": "test-opensearch-${ts_s}", "type": "opensearch", "host": "${datasource_host}", "port": 9200, "account": "admin", "password": "test123", "connectProtocol": "http"}'
    code_check: "200"
    resp_check: '{"$.code": 0}'
    resp_values: '{"created_datasource_id": "$.data.id"}'
    description: 创建 OpenSearch 类型数据源；原用例另校验 $.data.id 为 string（由提取链路保证）
    tags:
      - datasource
      - opensearch

  - name: 查询数据源列表
    url: 查询数据源列表
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证创建的数据源在列表中；原用例另校验 $.data.list 为 array
    tags:
      - datasource

  - name: 查询数据源详情
    url: 查询数据源详情
    prev_case: 创建 OpenSearch 数据源
    path_params: '{"id": "${created_datasource_id}"}'
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 验证数据源详情正确；原用例校验 data.name 包含 test-opensearch，此处保留业务码与成功态，名称子串校验需环境与稳定命名时再补
    tags:
      - datasource

  - name: 测试数据源连接
    url: 测试数据源连接
    prev_case: 查询数据源详情
    body_params: '{"datasourceId": "${created_datasource_id}"}'
    code_check: "200"
    resp_check: '{"$.code": 0, "$.data.connected": true}'
    description: 验证数据源连接正常
    tags:
      - datasource
      - connection

  - name: 更新数据源
    url: 更新数据源
    prev_case: 测试数据源连接
    path_params: '{"id": "${created_datasource_id}"}'
    body_params: '{"name": "test-opensearch-updated", "host": "${datasource_host}", "port": 9200}'
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 更新数据源配置
    tags:
      - datasource

  - name: 删除数据源
    url: 删除数据源
    prev_case: 更新数据源
    path_params: '{"id": "${created_datasource_id}"}'
    code_check: "200"
    resp_check: '{"$.code": 0}'
    description: 清理测试数据源
    tags:
      - datasource
      - cleanup
