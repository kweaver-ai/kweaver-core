# 冒烟测试套件：data-connection 模块
# 验证基础功能正常

cases:
  - case_id: "smoke_001"
    suite: "data-connection 冒烟测试"
    switch: y
    name: "查询数据源列表"
    description: "验证数据源列表接口可用"
    api_name: "查询数据源列表"
    tags:
      - smoke
      - datasource
    expect:
      status_code: 200
      response_checks:
        - type: json_path
          path: "$.code"
          expected: 0

