# 数据源 CRUD 测试套件：data-connection 模块

feature: data-connection
story: datasource_crud
switch: y
tags:
  - datasource

cases:
  - name: 创建 OpenSearch 数据源
    url: 新增数据源
    body_params: '{"name":"test-opensearch-${ts_s}","bin_data":{"connect_protocol":"http","host":"${datasource_host}","port":${datasource_port},"account":"${datasource_account}","password":"${datasource_password}"},"comment":"","type":"opensearch"}'
    code_check: "200"
    resp_values: '{"created_datasource_id": "$.id", "created_datasource_name": "$.name"}'
    description: 创建 OpenSearch 类型数据源；校验直出 id/name 并提取 created_datasource_id
    tags:
      - datasource
      - opensearch

  - name: 查询数据源列表
    url: 查询数据源列表
    code_check: "200"
    resp_check: '{"$.entries": "type(''array'')", "$.total_count": ">0"}'
    description: 校验列表响应结构 entries/total_count
    tags:
      - datasource

  - name: 查询数据源详情
    url: 查询数据源详情
    # prev_case: 创建 OpenSearch 数据源
    path_params: '{"id": "${created_datasource_id}"}'
    code_check: "200"
    resp_check: '{"$.id": "exists", "$.name": "contains(''test-opensearch-'')", "$.type": "opensearch", "$.bin_data.connect_protocol": "http", "$.bin_data.host": "${datasource_host}", "$.bin_data.port": ${datasource_port}}'
    description: 校验数据源详情直出结构与关键字段
    tags:
      - datasource

  - name: 测试数据源连接
    url: 测试数据源连接
    # prev_case: 查询数据源详情
    body_params: '{"bin_data":{"connect_protocol":"http","host":"${datasource_host}","port":${datasource_port},"account":"${datasource_account}","password":"${datasource_password}"},"type":"opensearch"}'
    code_check: "200"
    resp_check: '{"$.status": true}'
    description: 验证数据源连接正常
    tags:
      - datasource
      - connection

  - name: 更新数据源
    url: 更新数据源
    # prev_case: 测试数据源连接
    path_params: '{"id": "${created_datasource_id}"}'
    body_params: '{"name":"test-opensearch-updated-new","bin_data":{"connect_protocol":"http","host":"${datasource_host}","port":${datasource_port},"account":"${datasource_account}","password":"${datasource_password}"},"comment":"","type":"opensearch"}'
    code_check: "200"
    resp_values: '{"created_datasource_id": "$.id", "created_datasource_name": "$.name"}'
    description: 更新数据源配置
    tags:
      - datasource

  - name: 删除数据源
    url: 删除数据源
    prev_case: 更新数据源
    path_params: '{"id": "${created_datasource_id}"}'
    code_check: "200"
    resp_values: '{"created_datasource_id": "$.id", "created_datasource_name": "$.name"}'
    description: 清理测试数据源
    tags:
      - datasource
      - cleanup
