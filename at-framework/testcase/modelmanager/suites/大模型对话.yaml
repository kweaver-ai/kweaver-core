feature: 大模型管理
story: 大模型对话
switch: y
cases:
- name: 非流式调用大模型成功--role为user
  url: modelmanager_llm_chat
  prepare_models: llm
  body_params: "{
  \"model\": \"${llm_config_name}\",
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": \"Hello\"
    }
  ],
  \"stream\": false,
  \"temperature\": 0.7,
  \"max_tokens\": 1024
}"
  code_check: '200'
  description: 测试非流式调用大模型，role为user

- name: 非流式调用大模型成功--role为system
  url: modelmanager_llm_chat
  prepare_models: llm
  body_params: "{
  \"model\": \"${llm_config_name}\",
  \"messages\": [
    {
      \"role\": \"system\",
      \"content\": \"You are a helpful assistant\"
    }
  ],
  \"stream\": false,
  \"temperature\": 0.7,
  \"max_tokens\": 1024
}"
  code_check: '200'
  description: 测试非流式调用大模型，role为system

