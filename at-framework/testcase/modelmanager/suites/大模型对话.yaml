- name: 调用大模型失败--model类型不合法
  url: modelmanager_llm_chat
  body_params: "{
  \"model\": 123,
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": \"Hello\"
    }
  ]
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.Router.ParamError.FormatError\",
  \"$.detail\": \"str type expected\"
}"
  description: 测试model传整数类型

- name: 调用大模型失败--model不存在
  url: modelmanager_llm_chat
  body_params: "{
  \"model\": \"不存在的model\",
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": \"Hello\"
    }
  ]
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.Used.NameNotExist\",
  \"$.detail\": \"模型名称或者模型id不存在\"
}"
  description: 测试model不存在

- name: 调用大模型失败--top_p类型不合法
  url: modelmanager_llm_chat
  prepare_models: llm
  body_params: "{
  \"model\": \"${llm_config_name}\",
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": \"Hello\"
    }
  ],
  \"top_p\": \"string\"
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.Router.ParamError.FormatError\"
}"
  description: 测试top_p传字符串类型

- name: 调用大模型失败--top_p取值不合法
  url: modelmanager_llm_chat
  prepare_models: llm
  body_params: "{
  \"model\": \"${llm_config_name}\",
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": \"Hello\"
    }
  ],
  \"top_p\": 1.3
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.Router.ParamError.FormatError\",
  \"$.detail\": \"top_p must be an float and the range of values is 0 < top_p ≤ 1\"
}"
  description: 测试top_p取值超出0-1范围

