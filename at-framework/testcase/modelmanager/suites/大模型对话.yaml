- name: 前置用例--新增视觉理解模型成功
  url: modelmanager_llm_add
  body_params: "{
  \"model_name\": \"${vu_model_name}\",
  \"model_series\": \"${vu_model_series}\",
  \"model_config\": {
    \"api_url\": \"${vu_api_url}\",
    \"api_model\": \"${vu_model}\",
    \"api_key\": \"${vu_api_key}\"
  },
  \"max_model_len\": ${vu_max_model_len},
  \"model_type\": \"vu\",
  \"quota\": false
  }"
  code_check: '200'
  resp_check: "{\n  \"$.status\": \"ok\"\n}"
  resp_values: "{\"vu_model_id\": \"$.id\"}"
  description: 测试新增视觉理解模型功能

- name: 多模态调用大模型成功--理解图片
  url: modelmanager_llm_chat
  body_params: "{
  \"model\": \"${vu_model_name}\",
  \"temperature\": 1,
  \"top_p\": 1,
  \"presence_penalty\": 0,
  \"frequency_penalty\": 0,
  \"max_tokens\": 200,
  \"messages\": [
    {
      \"role\": \"user\",
      \"content\": [
        {
          \"type\": \"image_url\",
          \"image_url\": {
            \"url\": \"https://help-static-aliyun-doc.aliyuncs.com/file-manage-files/zh-CN/20241022/emyrja/dog_and_girl.jpeg\"
          }
        },
        {
          \"type\": \"image_url\",
          \"image_url\": {
            \"url\": \"https://dashscope.oss-cn-beijing.aliyuncs.com/images/tiger.png\"
          }
        },
        {
          \"type\": \"text\",
          \"text\": \"这些图描绘了什么内容？\"
        }
      ]
    }
  ],
  \"stream\": false
}"
  code_check: '200'
  description: 测试多模态大模型理解图片

- name: 多模态调用大模型成功--理解视频
  url: modelmanager_llm_chat
  body_params: "{
  \"model\": \"${vu_model_name}\",
  \"temperature\": 1,
  \"top_p\": 1,
  \"presence_penalty\": 0,
  \"frequency_penalty\": 0,
  \"max_tokens\": 200,
  \"messages\": [
    {
      \"role\": \"system\",
      \"content\": [
        {
          \"type\": \"text\",
          \"text\": \"You are a helpful assistant.\"
        }
      ]
    },
    {
      \"role\": \"user\",
      \"content\": [
        {
          \"type\": \"video_url\",
          \"video_url\": {
            \"url\": \"https://help-static-aliyun-doc.aliyuncs.com/file-manage-files/zh-CN/20241115/cqqkru/1.mp4\"
          }
        },
        {
          \"type\": \"text\",
          \"text\": \"这段视频的内容是什么?\"
        }
      ]
    }
  ],
  \"stream\": false
}"
  code_check: '200'
  description: 测试多模态大模型理解视频
