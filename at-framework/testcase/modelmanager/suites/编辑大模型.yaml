}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ConnectController.LLMEdit.ParameterError\",
  \"$.detail\": \"该模型不存在\"
}"
  description: 测试model_id传空

- name: 编辑大模型失败--模型名称超过50字符
  url: modelmanager_llm_edit
  prepare_models: llm
  body_params: "{
  \"model_id\": \"${llm_config_id}\",
  \"model_name\": \"我需要一个模型名称这个模型名称需要超过50个字符为了验证模型名称最大长度的场景我写完这句化就差不多了我去数一下看看\",
  \"model_series\": \"${llm_model_series}\",
  \"model_config\": {
    \"api_url\": \"${llm_api_url}\",
    \"api_model\": \"${llm_model}\",
    \"api_key\": \"${llm_api_key}\"
  },
  \"max_model_len\": ${llm_max_model_len},
  \"model_parameters\": 72,
  \"model_type\": \"llm\",
  \"quota\": \"false\"
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ConnectController.LLMEdit.ParameterError\",
  \"$.detail\": \"当前参数仅支中英文以及键盘上的特殊字符,且不超过50字符\"
}"
  description: 测试模型名称超过50字符

