feature: 大模型管理
story: 编辑大模型
switch: y
cases:
- name: 编辑大模型成功
  url: modelmanager_llm_edit
  prepare_models: llm
  next_case: 删除大模型成功
  body_params: "{
  \"model_id\": \"${llm_config_id}\",
  \"model_name\": \"updated_model_name_${ts_uuid}\",
  \"model_series\": \"${llm_model_series}\",
  \"model_config\": {
    \"api_url\": \"${llm_api_url}\",
    \"api_model\": \"${llm_model}\",
    \"api_key\": \"${llm_api_key}\"
  },
  \"max_model_len\": ${llm_max_model_len},
  \"model_type\": \"llm\",
  \"quota\": \"false\"
}"
  code_check: '200'
  resp_check: "{
  \"$.status\": \"ok\"
}"
  resp_values: "{\"llm_model_id\": \"$.id\"}"
  description: 测试编辑大模型功能

- name: 编辑大模型失败--max_model_len传非整数
  url: modelmanager_llm_edit
  prepare_models: llm
  body_params: "{
  \"model_id\": \"${llm_config_id}\",
  \"model_name\": \"test_model_${ts_uuid}\",
  \"model_series\": \"${llm_model_series}\",
  \"model_config\": {
    \"api_url\": \"${llm_api_url}\",
    \"api_model\": \"${llm_model}\",
    \"api_key\": \"${llm_api_key}\"
  },
  \"max_model_len\": 33.0,
  \"model_parameters\": 72,
  \"model_type\": \"llm\",
  \"quota\": \"false\"
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ConnectController.LLMEdit.ParameterError\",
  \"$.detail\": \"max_model_len必须为int类型且大于0\"
}"
  description: 测试max_model_len传非整数

- name: 编辑大模型失败--model_parameters传非整数
  url: modelmanager_llm_edit
  prepare_models: llm
  body_params: "{
  \"model_id\": \"${llm_config_id}\",
  \"model_name\": \"test_model_${ts_uuid}\",
  \"model_series\": \"${llm_model_series}\",
  \"model_config\": {
    \"api_url\": \"${llm_api_url}\",
    \"api_model\": \"${llm_model}\",
    \"api_key\": \"${llm_api_key}\"
  },
  \"max_model_len\": ${llm_max_model_len},
  \"model_parameters\": 70.0,
  \"model_type\": \"llm\",
  \"quota\": \"false\"
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ConnectController.LLMEdit.ParameterError\",
  \"$.detail\": \"model_parameters必须为int类型且大于0\"
}"
  description: 测试model_parameters传非整数

- name: 编辑大模型失败--model_id传空
  url: modelmanager_llm_edit
  body_params: "{
