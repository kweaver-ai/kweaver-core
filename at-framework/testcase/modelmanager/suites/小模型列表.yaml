feature: 小模型列表
story: 小模型列表查询
switch: y
cases:
- name: 获取小模型列表成功--按page\size筛选
  url: modelmanager_small_model_getList
  query_params: "{\"page\": 1, \"size\": 10}"
  code_check: '200'
  resp_check: "{
  \"$.data\": \"type('array')\"
}"
  description: 测试获取小模型列表功能

- name: 获取小模型列表成功--按模型名称筛选
  url: modelmanager_small_model_getList
  prepare_models: embedding
  query_params: "{\"model_name\": \"${embedding_config_name}\"}"
  code_check: '200'
  resp_check: "{
  \"$.count\": \">=1\"
}"
  description: 测试按模型名称筛选小模型列表

- name: 获取小模型列表失败--参数不合法--page非整数
  url: modelmanager_small_model_getList
  query_params: "{\"page\": \"abc\"}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.Router.ParamError.FormatError\"
}"
  description: 测试参数不合法--page非整数

- name: 获取小模型列表成功--模型名称不存在
  url: modelmanager_small_model_getList
  query_params: "{\"model_name\": \"不存在的模型名称\"}"
  code_check: '200'
  resp_check: "{
  \"$.count\": 0
}"
  description: 测试模型名称不存在时返回空列表
