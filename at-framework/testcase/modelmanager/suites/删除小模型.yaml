feature: 小模型管理
story: 删除小模型
switch: y
cases:
- name: 前置用例--新增embedding小模型成功
  url: modelmanager_small_model_add
  body_params: "{
  \"model_name\": \"test_embedding_${ts_uuid}\",
  \"model_type\": \"embedding\",
  \"model_config\": {
    \"api_url\": \"${embedding_url}\",
    \"api_model\": \"${embedding_model}\"
  },
  \"embedding_dim\": ${embedding_dim},
  \"max_tokens\": ${embedding_max_tokens},
  \"batch_size\": ${embedding_batch_size}
}"
  code_check: '200'
  resp_check: "{
  \"$.status\": \"ok\"
}"
  resp_values: "{\"small_model_id\": \"$.id\"}"
  description: 测试新增embedding类型小模型

- name: 删除小模型成功
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": [\"${small_model_id}\"]
}"
  code_check: '200'
  resp_check: "{
  \"$.status\": \"ok\"
}"
  description: 测试删除小模型功能

- name: 删除小模型失败--model_ids不存在
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": [\"9999999999999999999999999999999999\"]
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.GetInfo.IdNotExist\",
  \"$.detail\": \"部分配置id不存在\"
}"
  description: 测试model_ids不存在

- name: 删除小模型失败--model_ids传字符串
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": \"123\"
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.UnknownError\"
}"
  description: 测试model_ids传字符串

- name: 删除小模型失败--model_ids传整数
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": 123
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.UnknownError\"
}"
  description: 测试model_ids传整数

- name: 删除小模型失败--model_ids传null
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": null
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.UnknownError\"
}"
  description: 测试model_ids传null

- name: 删除小模型失败--model_ids传浮点数
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": 12.23
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.UnknownError\"
}"
  description: 测试model_ids传浮点数

- name: 删除小模型失败--model_ids传布尔值
  url: modelmanager_small_model_delete
  body_params: "{
  \"model_ids\": true
}"
  code_check: '400'
  resp_check: "{
  \"$.code\": \"ModelFactory.ExternalSmallModel.UnknownError\"
}"
  description: 测试model_ids传布尔值

