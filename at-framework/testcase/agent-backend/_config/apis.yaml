# API 列表：agent-backend 模块
# 包含 Agent Factory API 和 Agent Backend API

# ==================== Agent CRUD ====================
- name: 创建Agent
  url: /api/agent-factory/v3/agent
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取Agent列表
  url: /api/agent-factory/v3/agent
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取Agent详情
  url: /api/agent-factory/v3/agent/${agent_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 更新Agent
  url: /api/agent-factory/v3/agent/${agent_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 删除Agent
  url: /api/agent-factory/v3/agent/${agent_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 根据Key获取Agent详情
  url: /api/agent-factory/v3/agent/by-key/${agent_key}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 复制Agent
  url: /api/agent-factory/v3/agent/${agent_id}/copy
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 复制Agent为模板
  url: /api/agent-factory/v3/agent/${agent_id}/copy2tpl
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 复制Agent为模板并发布
  url: /api/agent-factory/v3/agent/${agent_id}/copy2tpl-and-publish
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取SELF_CONFIG字段结构
  url: /api/agent-factory/v3/agent-self-config-fields
