  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 批量获取数据处理状态
  url: /api/agent-factory/v3/agent/batch-check-index-status
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取内置头像
  url: /api/agent-factory/v3/agent/avatar/built-in/${avatar_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 获取内置头像列表
  url: /api/agent-factory/v3/agent/avatar/built-in
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 导出数据
  url: /api/agent-factory/v3/agent-inout/export
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json", "x-business-domain": "bd_public"}'

- name: 导入数据
