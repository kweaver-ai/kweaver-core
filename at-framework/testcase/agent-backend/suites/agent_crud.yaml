  description: '清理：删除创建的模板'

- name: Cleanup_删除用于模板测试的Agent
  switch: n
  url: 删除Agent
  path_params: |
    {
      "agent_id": "${tpl_source_agent_id}"
    }
  code_check: '204'
  prev_case: Cleanup_删除创建的模板
  description: '清理：删除源Agent'

