# ==================== 其他接口 ====================
- name: Positive_获取SELF_CONFIG字段结构_请求成功
  url: 获取SELF_CONFIG字段结构
  code_check: '200'
  description: 'from pytest: test_get_self_config_fields'

- name: Positive_获取内置头像列表_请求成功
  url: 获取内置头像列表
  code_check: '200'
  description: 'from pytest: test_get_built_in_avatars'

- name: Positive_获取文件扩展名映射_请求成功
  url: 获取文件扩展名映射
