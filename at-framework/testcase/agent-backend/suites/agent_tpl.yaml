feature: Agent Factory API
story: 模板相关
switch: y
cases:
# ==================== 创建用于模板测试的Agent ====================
- name: Setup_创建模板测试Agent
  url: 创建Agent
  body_params: |
    {
      "name": "{{ '模板测试智能体_%s' | format(random_string(6, 8)) }}",
      "profile": "${agent_profile}",
      "key": "{{ 'tpl-test-agent-%s' | format(random_string(6, 8)) }}",
      "avatar_type": ${agent_avatar_type},
      "avatar": "${agent_avatar}",
      "product_key": "${agent_product_key}",
      "config": {
        "input": {"fields": [{"name": "query", "type": "string"}]},
        "system_prompt": "${agent_config_system_prompt}",
        "llms": [{"is_default": true, "llm_config": {"name": "gpt-4", "temperature": 1}}],
        "output": {"default_format": "${agent_config_output_format}"}
      }
    }
  code_check: '201'
  resp_values: |
    {
      "tpl_test_agent_id": "$.id"
    }
  description: '创建用于模板测试的Agent'

# ==================== 复制Agent为模板 ====================
- name: Positive_复制Agent为模板_请求成功
  url: 复制Agent为模板
  path_params: |
    {
      "agent_id": "${tpl_test_agent_id}"
    }
  code_check: '201'
  resp_values: |
    {
      "created_tpl_id": "$.id"
    }
  prev_case: Setup_创建模板测试Agent
  description: 'from pytest: test_copy_agent_to_tpl'

# ==================== 获取Agent模板详情 ====================
- name: Positive_获取Agent模板详情_请求成功
  url: 获取Agent模板详情
  path_params: |
    {
      "tpl_id": "${created_tpl_id}"
    }
  code_check: '200'
  prev_case: Positive_复制Agent为模板_请求成功
  description: 'from pytest: test_get_tpl_detail'

# ==================== 更新Agent模板 ====================
- name: Positive_更新Agent模板_请求成功
  url: 更新Agent模板
  path_params: |
    {
      "tpl_id": "${created_tpl_id}"
    }
  body_params: |
    {
      "name": "{{ '更新后的模板_%s' | format(random_string(6, 8)) }}",
      "profile": "更新后的模板描述",
      "config": {
        "input": {"fields": [{"name": "query", "type": "string"}]},
        "system_prompt": "你是一个测试助手",
        "llms": [{"is_default": true, "llm_config": {"name": "gpt-4", "temperature": 1}}],
        "output": {"default_format": "markdown"}
      }
    }
  code_check: '204'
  prev_case: Positive_复制Agent为模板_请求成功
  description: 'from pytest: test_update_tpl'

# ==================== 清理创建的模板 ====================
- name: Cleanup_删除创建的模板
  switch: n
  url: 删除Agent模板
  path_params: |
    {
      "tpl_id": "${created_tpl_id}"
    }
  code_check: '204'
  prev_case: Positive_更新Agent模板_请求成功
  description: '清理：删除模板'

- name: Cleanup_删除模板测试Agent
  switch: n
  url: 删除Agent
  path_params: |
    {
      "agent_id": "${tpl_test_agent_id}"
    }
  code_check: '204'
  prev_case: Cleanup_删除创建的模板
  description: '清理：删除Agent'

# ==================== Negative用例 ====================
- name: Negative_获取Agent模板详情_不存在_请求失败
  url: 获取Agent模板详情
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  code_check: '404'
  description: 'from pytest: test_get_tpl_detail_not_exists'

- name: Negative_更新Agent模板_不存在_请求失败
  url: 更新Agent模板
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  body_params: |
    {
      "name": "{{ '更新模板_%s' | format(random_string(6, 8)) }}",
      "profile": "更新后的模板描述",
      "config": {
        "input": {"fields": [{"name": "query", "type": "string"}]},
        "system_prompt": "你是一个测试助手",
        "llms": [{"is_default": true, "llm_config": {"name": "gpt-4", "temperature": 1}}],
        "output": {"default_format": "markdown"}
      }
    }
  code_check: '404'
  description: 'from pytest: test_update_tpl_not_exists'

- name: Negative_删除Agent模板_不存在_请求失败
  url: 删除Agent模板
