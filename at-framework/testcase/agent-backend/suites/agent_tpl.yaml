- name: Negative_发布智能体模板_不存在_请求失败
  url: 发布智能体模板
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  body_params: |
    {
      "business_domain_id": "${business_domain_id}",
      "category_id": [],
      "description": "测试发布模板",
      "publish_to_where": ${publish_to_where}
    }
  code_check: '404'
  description: 'from pytest: test_publish_tpl_not_exists'

- name: Negative_取消发布智能体模板_不存在_请求失败
  url: 取消发布智能体模板
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  code_check: '404'
  description: 'from pytest: test_unpublish_tpl_not_exists'

- name: Negative_获取模板发布信息_不存在_请求失败
  url: 获取模板发布信息
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  code_check: '404'
  description: 'from pytest: test_get_tpl_publish_info_not_exists'

- name: Negative_更新模板发布信息_不存在_请求失败
  url: 更新模板发布信息
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  body_params: |
    {
      "business_domain_id": "${business_domain_id}",
      "category_id": [],
      "description": "更新后的模板发布信息"
    }
  code_check: '404'
  description: 'from pytest: test_update_tpl_publish_info_not_exists'

- name: Negative_复制智能体模板_不存在_请求失败
  url: 复制智能体模板
  path_params: |
    {
      "tpl_id": "${test_tpl_id}"
    }
  code_check: '404'
  description: 'from pytest: test_copy_tpl_not_exists'