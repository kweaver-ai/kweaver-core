# API 列表模板：各模块根据实际接口在此填写 name、url、method、headers
# 用例中 url 字段引用此处的 name，加载时合并该 API 的 url、method、headers
# 可由智能体根据 OpenAPI 或代码扫描生成/更新

- name: ""   # 接口唯一名称，用例中 url 与此一致
  url: ""    # 路径，如 /api/xxx/v1/resource，路径参数用 ${id} 等
  method: "" # GET | POST | PUT | DELETE | PATCH 等
  headers: "" # JSON 字符串，如 "{\"Content-Type\": \"application/json\"}"
