# data-operator-hub API接口定义
# 工具箱相关
- name: 创建工具箱
  url: /api/agent-operator-integration/v1/tool-box
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新工具箱
  url: /api/agent-operator-integration/v1/tool-box/${box_id}
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取工具箱信息
  url: /api/agent-operator-integration/v1/tool-box/${box_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除工具箱
  url: /api/agent-operator-integration/v1/tool-box/${box_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取工具箱列表
  url: /api/agent-operator-integration/v1/tool-box/list
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新工具箱状态
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/status
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取市场工具箱列表
  url: /api/agent-operator-integration/v1/tool-box/market
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取市场工具箱信息
  url: /api/agent-operator-integration/v1/tool-box/market/${box_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

# 工具相关
- name: 创建工具
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tool
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新工具
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tool/${tool_id}
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取工具信息
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tool/${tool_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 批量删除工具
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tools/batch-delete
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取工具箱中的工具列表
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tools/list
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 更新工具状态
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tools/status
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取所有工具列表
  url: /api/agent-operator-integration/v1/tool-box/market/tools
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 工具调试
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/tool/${tool_id}/debug
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 工具执行代理
  url: /api/agent-operator-integration/v1/tool-box/${box_id}/proxy/${tool_id}
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取工具箱市场详情
  url: /api/agent-operator-integration/v1/tool-box/market/${box_id}/${fields}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

# 算子相关
- name: 注册算子
