  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 算子转换成工具
  url: /api/agent-operator-integration/v1/operator/convert/tool
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

# MCP相关
- name: 解析SSE MCPServer
  url: /api/agent-operator-integration/v1/mcp/parse/sse
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 添加MCP Server配置
  url: /api/agent-operator-integration/v1/mcp
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 删除MCP Server配置
  url: /api/agent-operator-integration/v1/mcp/${mcp_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取MCP Server列表
  url: /api/agent-operator-integration/v1/mcp/list
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取MCP Server详情
  url: /api/agent-operator-integration/v1/mcp/${mcp_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 编辑MCP Server配置
  url: /api/agent-operator-integration/v1/mcp/${mcp_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: MCP服务发布操作
  url: /api/agent-operator-integration/v1/mcp/${mcp_id}/status
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: MCP工具调试
  url: /api/agent-operator-integration/v1/mcp/${mcp_id}/tool/${name}/debug
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取已发布的MCP列表
  url: /api/agent-operator-integration/v1/mcp/market/list
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取已发布的MCP详情
  url: /api/agent-operator-integration/v1/mcp/market/${mcp_id}
  method: GET
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

