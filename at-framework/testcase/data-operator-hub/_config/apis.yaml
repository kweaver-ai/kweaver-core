  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 算子调试
  url: /api/agent-operator-integration/v1/operator/debug
  method: POST
  headers: '{"Content-Type": "application/json", "Accept": "application/json"}'

- name: 获取算子市场列表
  url: /api/agent-operator-integration/v1/operator/market
