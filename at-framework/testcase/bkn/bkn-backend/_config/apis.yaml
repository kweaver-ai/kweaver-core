# API 列表：bkn/bkn-backend 模块
# 格式：name (接口名称) -> url, method, headers

# ==================== 知识网络 API ====================
- name: 获取知识网络列表
  url: /api/ontology-manager/v1/knowledge-networks
  method: GET
  headers: '{"Content-Type": "application/json", "X-Business-Domain": "${business_domain}"}'

- name: 创建知识网络
  url: /api/ontology-manager/v1/knowledge-networks
  method: POST
  headers: '{"Content-Type": "application/json", "X-Business-Domain": "${business_domain}"}'

- name: 获取知识网络详情
  url: /api/ontology-manager/v1/knowledge-networks/${kn_id}
  method: GET
  headers: '{"Content-Type": "application/json", "X-Business-Domain": "${business_domain}"}'

- name: 更新知识网络
  url: /api/ontology-manager/v1/knowledge-networks/${kn_id}
  method: PUT
  headers: '{"Content-Type": "application/json", "X-Business-Domain": "${business_domain}"}'

- name: 删除知识网络
  url: /api/ontology-manager/v1/knowledge-networks/${kn_id}
  method: DELETE
  headers: '{"Content-Type": "application/json", "X-Business-Domain": "${business_domain}"}'

