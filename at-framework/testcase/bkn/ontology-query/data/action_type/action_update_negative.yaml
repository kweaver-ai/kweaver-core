  action_name: "测试行动类-${random_str}"
  action_type: "add"
  object_type_id: "person"
  comment: "${random_str(256)}"
  expected_status: 400
  note: "comment超过255个字符应该失败"

- case_name: "编辑行动类-参数校验错误-condition格式错误"
  action_id: "existing_action_id"
  action_name: "测试行动类-${random_str}"
  action_type: "add"
  object_type_id: "person"
  condition: "invalid_condition"
  expected_status: 400
  note: "condition格式错误应该失败"


