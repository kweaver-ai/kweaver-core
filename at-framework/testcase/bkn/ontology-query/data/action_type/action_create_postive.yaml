# ==================================================
# 6. condition测试
# ==================================================
- case_name: "行动类-多个条件"
  name: "行动类-多个条件"
  id: "person_actions"
  test_type: "positive"
  action_type: "add"
  object_type_id: "person"
  affect_object_type_id: "comment"
  condition:
    operation: "or"
    sub_conditions:
      - field: "p_firstname"
        object_type_id: "person"
        operation: "=="
        value: "K"
      - field: "p_gender"
        operation: "=="
        object_type_id: "person"
        value: "female"
  is_delete: false



