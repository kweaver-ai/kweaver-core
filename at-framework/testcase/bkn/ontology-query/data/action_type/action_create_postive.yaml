# ==================================================
# 行动类创建 - 正向测试用例
# ==================================================

## 测试文件说明

### 测试目的
# - 验证行动类创建接口对各种有效参数的处理能力
# - 确保接口能够正确创建行动类并返回成功状态
# - 覆盖所有正常使用场景的参数组合

# ### 测试用例分类
# 1. **基本参数测试**：包含必填字段的基本创建场景
# 2. **边界值测试**：参数的最大长度、空值等边界情况
# 3. **可选参数测试**：tags、comment等可选参数的使用
# 4. **完整参数测试**：包含所有可能参数的创建场景
# 5. **不同类型测试**：验证不同action_type的创建场景

# ### 使用说明
# - 所有测试用例均为正向测试,验证接口对有效参数的处理
# - 测试用例按类别分组,便于维护和理解
# - 每个测试用例包含：
#   - case_name：测试用例名称
#   - 相关参数：需要测试的参数
#   - note：测试用例说明


# ==================================================
# 1. 基本参数测试
# ==================================================

- case_name: "创建行动类-基本参数测试-add类型"
  id: ""
  name: "添加操作-${random_str}"
  action_type: "add"
  note: "基本参数测试,包含必填字段,action_type为add"
  is_delete: true

