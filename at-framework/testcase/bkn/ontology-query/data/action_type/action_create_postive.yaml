# ==================================================
# 4. 完整参数测试
# ==================================================

- case_name: "创建行动类-完整参数测试"
  id: ""
  name: "完整参数测试-${random_str}"
  action_type: "add"
  object_type_id: "person"
  tags: ["测试", "完整参数"]
  comment: "这是一个带有完整参数的测试行动类"
  condition:
    operation: "=="
    field: "p_personid"
    object_type_id: "person"
    value: 94
  affect_object_type_id: "comment"
  module_type: "action_type"
  note: "带有完整参数的行动类创建"
  is_delete: true



