# 4. 类型相关参数校验
# ==================================================

## 4.1 type参数校验
- case_name: "创建关系类-type为空"
  id: ""
  name: "type为空"
  source_object_type_id: "object1"
  target_object_type_id: "object2"
  type: ""
  expected_status: 400
  note: "type为空字符串应该失败"

- case_name: "创建关系类-type为无效值"
  id: ""
  name: "type为无效值"
  source_object_type_id: "object1"
  target_object_type_id: "object2"
  type: "invalid_type"
  mapping_rules:
    - relation_table:
        name: "test_relation_table"
      source_property:
        name: "source_id"
      target_property:
        name: "target_id"
  expected_status: 400
  note: "type为invalid_type应该失败"

## 4.2 data_view类型相关测试
- case_name: "创建关系类-type为data_view但缺少数据源"
  id: ""
  name: "缺少数据源"
  source_object_type_id: "object1"
  target_object_type_id: "object2"
  type: "data_view"
  mapping_rules:
    - source_property:
        name: "source_id"
      target_property:
        name: "target_id"
  expected_status: 400
  note: "type为data_view但缺少数据源应该失败"

## 4.3 module_type类型相关测试
- case_name: "创建关系类-module_type为无效值"
  id: ""
  name: "测试关系类"
  module_type: "invalid_module"
  expected_status: 403
  note: "module_type为无效值应该失败"
