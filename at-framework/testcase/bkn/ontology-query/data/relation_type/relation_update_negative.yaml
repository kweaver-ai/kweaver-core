## 3.1 direct类型mapping_rules校验
- case_name: "更新关系类-type为direct但mapping_rules缺少source_property"
  relation_c_name: "缺少source_property"
  relation_id: "${random_str(10)}"
  relation_u_name: "缺少source_property"
  source_object_type_id: "object1"
  target_object_type_id: "object2"
  type: "direct"
  mapping_rules:
    - target_property:
        relation_u_name: "test_string"
  expected_status: 400
  note: "type为direct但mapping_rules缺少source_property应该失败"

- case_name: "更新关系类-type为direct但mapping_rules缺少target_property"
