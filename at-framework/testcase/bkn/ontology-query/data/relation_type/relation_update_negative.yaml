# ==================================================
# 关系类更新 - 负向测试用例
# ==================================================

## 测试文件说明

### 测试目的
# - 验证关系类更新接口对各种异常参数的处理能力
# - 确保接口能够正确返回适当的错误状态码和提示信息
# - 覆盖所有可能的参数校验场景

# ### 测试用例分类
# 1. **基础参数校验**:id、name、tags、comment 等基本参数
# 2. **关联对象参数校验**:source_object_type_id、target_object_type_id 等
# 3. **映射规则参数校验**:mapping_rules、source_property、target_property 等
# 4. **类型相关参数校验**:type 参数、data_view 类型特殊要求
# 5. **排除必传参数校验**:验证不传必传参数的情况

# ### 使用说明
# - 所有测试用例均为负向测试，验证接口对无效参数的处理
# - 测试用例按类别分组，便于维护和理解
# - 每个测试用例包含：
#   - case_name：测试用例名称
#   - relation_id：关系类ID
#   - relation_u_name：更新后的名称（可能无效）
#   - 其他参数：根据测试场景而定
#   - expected_status：期望的HTTP状态码
#   - note：测试用例说明


# ==================================================
# 1. 基础参数校验
# ==================================================


## 1.2 name参数校验
- case_name: "更新关系类-name为空"
  relation_c_name: "name为空"
  relation_id: "${random_str(10)}"
  relation_u_name: ""
  expected_status: 400
  note: "name为空字符串应该失败"

- case_name: "更新关系类-name超过最大长度"
  relation_c_name: "name超过最大长度"
  relation_id: "${random_str(10)}"
  relation_u_name: "${random_str(41)}"
  expected_status: 400
  note: "name超过40个字符应该失败"

## 1.3 tags参数校验
- case_name: "更新关系类-tags超过最大数量"
  relation_c_name: "tags超过最大数量"
  relation_id: "${random_str(10)}"
  relation_u_name: "tags超过最大数量"
  tags: ["tag1", "tag2", "tag3", "tag4", "tag5", "tag6"]
  expected_status: 400
  note: "tags超过5个应该失败"

- case_name: "更新关系类-tag超过最大长度"
  relation_c_name: "tag超过最大长度"
  relation_id: "${random_str(10)}"
  relation_u_name: "tag超过最大长度"
  tags: ["${random_str(41)}"]
  expected_status: 400
  note: "单个tag超过40个字符应该失败"

- case_name: "更新关系类-tag包含特殊字符"
  relation_c_name: "tag包含特殊字符"
  relation_id: "${random_str(10)}"
  relation_u_name: "tag包含特殊字符"
  tags: ["tag@#$"]
  expected_status: 400
  note: "tag包含特殊字符应该失败"

- case_name: "更新关系类-tag名称为空字符串"
  relation_c_name: "tag名称为空字符串"
  relation_id: "${random_str(10)}"
  relation_u_name: "tag名称为空字符串"
  tags: [""]
  expected_status: 400
  note: "tag名称为空字符串应该失败"

## 1.4 comment参数校验
- case_name: "更新关系类-comment超过最大长度"
  relation_c_name: "comment超过最大长度"
  relation_id: "${random_str(10)}"
  relation_u_name: "comment超过最大长度"
  comment: "${random_str(1001)}"
  expected_status: 400
  note: "comment超过1000个字符应该失败"


