# 业务知识网络更新 - 参数校验测试用例

# 必填参数缺失测试
- case_name: "参数校验-更新时缺少name参数"
  kn_c_name: "原始网络-${random_str}"
  kn_u_name: "更新网络-${random_str}"
  kn_id: "${ts_uuid}"
  test_type: "negative"
  exclude_fields: ["name"]
  expected_status: 400
  note: "name是必填参数，不传应该失败"

- case_name: "参数校验-更新时缺少branch参数"
  kn_c_name: "原始网络-${random_str}"
  kn_u_name: "更新网络-${random_str}"
  kn_id: "${ts_uuid}"
  test_type: "positive"
  exclude_fields: ["branch"]
  expected_status: 204

