# 业务知识网络创建 - 参数校验测试用例

# 必填参数缺失测试
- case_name: "参数校验-缺少name参数"
  kn_id: "${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  exclude_fields: ["name"]
  expected_status: 400
  should_exist_in_db: false
  note: "name是必填参数，不传应该失败"



- case_name: "参数校验-缺少多个必填参数"
  kn_id: "${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  exclude_fields: ["name", "branch"]
  expected_status: 400
  should_exist_in_db: false
  note: "同时缺少name和branch参数"

# ID格式校验
- case_name: "参数校验-ID包含大写字母"
  kn_id: "InvalidID_${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID只能包含小写字母、数字、下划线、连字符"

- case_name: "参数校验-ID以下划线开头"
  kn_id: "_${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID不能以下划线开头"

- case_name: "参数校验-ID以连字符开头"
  kn_id: "-${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID不能以连字符开头"

- case_name: "参数校验-ID包含特殊字符"
  kn_id: "test@id#${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID包含特殊字符@和#"

- case_name: "参数校验-ID包含空格"
  kn_id: "test id ${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID包含空格"

- case_name: "参数校验-ID包含中文"
  kn_id: "测试${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "ID包含中文字符"

# 参数类型校验
- case_name: "参数校验-name为空字符串"
  kn_id: "${ts_uuid}"
  kn_name: ""
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "name为空字符串应该失败"

- case_name: "参数校验-branch为空字符串"
  kn_id: "${ts_uuid}"
  kn_name: "测试网络${random_str}"
  test_type: "positive"
  exclude_fields: ["branch"]
  branch_value: ""
  expected_status: 201
  should_exist_in_db: true

# 边界值测试

- case_name: "参数校验-ID为空字符串"
  kn_id: ""
  kn_name: "测试网络${random_str}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true
  note: "ID为空字符串是允许的，系统会自动生成"

# 特殊字符测试
- case_name: "参数校验-name包含特殊字符"
  kn_id: "${ts_uuid}"
