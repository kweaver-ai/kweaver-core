# 边界值测试
- case_name: "参数校验-更新name为超长字符串"
  object_c_name: "原始对象类-${random_str}"
  object_u_name: "name为超长字符串-${random_str(300)}"
  object_id: "${ts_uuid}"
  test_type: "negative"
  expected_status: 400
  note: "name超过最大长度限制"

- case_name: "参数校验-更新name为最短有效字符串"
  object_c_name: "原始对象类-${random_str}"
  object_u_name: "A"
  object_id: "${ts_uuid}"
  test_type: "positive"
  expected_status: 204
  note: "name为单个字符应该成功"

