  data_properties: 4
  expected_status: 400
  note: "name长度超过255字符应该失败"


# ==================================================
# 12. 增量键校验错误测试
# ==================================================

- case_name: "创建对象类-增量键校验错误-类型不匹配"
  object_id: "${ts_uuid}"
  object_name: "增量键校验错误-类型不匹配"
  data_properties: 4
  incremental_key: "incremental_field"
  expected_status: 400
