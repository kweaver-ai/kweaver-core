# 对象类创建 - 参数校验测试用例

# 必填参数缺失测试
- case_name: "参数校验-缺少name参数"
  object_id: "${ts_uuid}"
  object_name: "缺少name参数-${random_str}"
  test_type: "negative"
  exclude_fields: ["name"]
  expected_status: 400
  should_exist_in_db: false
  note: "name是必填参数，不传应该失败"

- case_name: "参数校验-缺少branch参数"
  object_id: "${ts_uuid}"
  object_name: "缺少branch参数-${random_str}"
  test_type: "positive"
  exclude_fields: ["branch"]
  expected_status: 201
  should_exist_in_db: true
  note: "branch是必填参数，不传应该失败"

