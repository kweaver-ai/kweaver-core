# 边界值测试
- case_name: "参数校验-name为超长字符串"
  object_id: "${ts_uuid}"
  object_name: "name为超长字符串${random_str(200)}"
  test_type: "negative"
  expected_status: 400
  should_exist_in_db: false
  note: "name超过最大长度限制"

- case_name: "参数校验-name为最短有效字符串"
  object_id: "${ts_uuid}"
  object_name: "${random_str(1)}"
  test_type: "positive"
  expected_status: 201
  should_exist_in_db: true
  note: "name为单个字符应该成功"

