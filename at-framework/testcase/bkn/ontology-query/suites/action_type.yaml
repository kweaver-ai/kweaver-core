cases:
- case_id: action_type_001
  suite: Action Type (legacy migration)
  switch: n
  name: action_create
  description: 创建动作类型 / Create action type
  api_name: create_action_type
  tags:
  - ontology
  - legacy
  - api:create_action_type
  expect:
    status_code: 200
    response_checks:
    - type: json_path
      path: $.code
      expected: 0
    extract:
    - type: json_path
      source: $.id
      var_name: action_id
  setup:
  - type: set_var
    var_name: kn_id
    value: ${kn_id}
  body:
    name: action_type_${timestamp}
    display_name: ActionType_${timestamp}
    description: auto migrated action type
