  - ontology
  - legacy
  - api:delete_action_type
  expect:
    status_code: 200
    response_checks:
    - type: json_path
      path: $.code
      expected: 0
  setup:
  - type: set_var
    var_name: kn_id
    value: ${kn_id}
  - type: set_var
    var_name: action_id
    value: ${action_id}
