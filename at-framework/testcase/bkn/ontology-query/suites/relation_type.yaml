cases:
- case_id: relation_type_001
  suite: Relation Type (legacy migration)
  switch: n
  name: relation_create
  description: 创建关系类型 / Create relation type
  api_name: create_relation_type
  tags:
  - ontology
  - legacy
  - api:create_relation_type
  expect:
    status_code: 200
    response_checks:
    - type: json_path
      path: $.code
      expected: 0
    extract:
    - type: json_path
      source: $.id
      var_name: id
  setup:
  - type: set_var
    var_name: kn_id
    value: ${kn_id}
  body:
    name: relation_type_${timestamp}
    display_name: RelationType_${timestamp}
    description: auto migrated relation type
