  tags:
  - ontology
  - legacy
  - api:delete_relation_type
  expect:
    status_code: 200
    response_checks:
    - type: json_path
      path: $.code
      expected: 0
  setup:
  - type: set_var
    var_name: kn_id
    value: ${kn_id}
  - type: set_var
    var_name: rt_ids
    value: ${rt_ids}
