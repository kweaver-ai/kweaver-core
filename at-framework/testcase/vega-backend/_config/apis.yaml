# API 列表：vega-backend 模块
# OpenAPI paths 覆盖：
#   GET|POST  /api/vega-backend/v1/catalogs
#   GET|DELETE /api/vega-backend/v1/catalogs/{ids}
#   PUT       /api/vega-backend/v1/catalogs/{id}
#   GET       /api/vega-backend/v1/catalogs/{ids}/health-status
#   POST      /api/vega-backend/v1/catalogs/{id}/test-connection
#   GET|POST  /api/vega-backend/v1/resources
#             GET query: catalog_id, category, status, database, offset, limit, sort, direction
#   GET|DELETE /api/vega-backend/v1/resources/{ids}
#             DELETE query: ignore_missing
#   PUT       /api/vega-backend/v1/resources/{id}
#   GET       /api/vega-backend/v1/discover-tasks
#             (query: catalog_id, schedule_id, status, trigger_type, offset, limit, sort, direction)
#   GET       /api/vega-backend/v1/discover-tasks/{id}
#   DELETE    /api/vega-backend/v1/discover-tasks/{ids}
#             (query: ignore_missing)
#   POST      /api/vega-backend/v1/catalogs/{id}/discover
#   GET|POST  /api/vega-backend/v1/connector-types
#             GET query: tag, mode, category, enabled, offset, limit, sort, direction
#   GET|PUT|DELETE /api/vega-backend/v1/connector-types/{type}
#   POST      /api/vega-backend/v1/connector-types/{type}/enable
#   POST      /api/vega-backend/v1/connector-types/{type}/disable
#   POST|GET  /api/vega-backend/v1/discover-schedules
#             GET query: catalog_id, enabled
#   GET|PUT|DELETE /api/vega-backend/v1/discover-schedules/{id}
#   POST      /api/vega-backend/v1/discover-schedules/{id}/enable
#   POST      /api/vega-backend/v1/discover-schedules/{id}/disable
#   GET|POST  /api/vega-backend/v1/build-tasks
#             GET query: resource_id, catalog_id, status, mode, offset, limit, sort, direction
#   GET       /api/vega-backend/v1/build-tasks/{id}
#   DELETE    /api/vega-backend/v1/build-tasks/{ids}
#             DELETE query: ignore_missing
#   POST      /api/vega-backend/v1/build-tasks/{id}/start
#   POST      /api/vega-backend/v1/build-tasks/{id}/stop



