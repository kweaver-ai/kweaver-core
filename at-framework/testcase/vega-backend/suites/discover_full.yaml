feature: vega-backend
story: discover
switch: y
tags:
    - vega-backend
    - discover
    - full

include:
    - discover_query.case

cases:
    -   name: "Positive_创建catalog_逻辑资源_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_Logical-%s' | format(random_string(6, 8)) }}"
            }
        resp_values: >-
            {
                "catalog_id_logical": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_数据源_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_Physical-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        resp_values: >-
            {
                "catalog_id": "$.id"
            }
        code_check: "201"

    # 及时检索任务相关
    -   name: "Negative_即时检索_逻辑资源_请求失败"
        url: "catalog资源检索"
        path_params: >-
            {
                "id": "${catalog_id_logical}"
            }
        code_check: "400"

    -   name: "Positive_即时检索_数据源_请求成功"
        url: "catalog资源检索"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        resp_values: >-
            {
                "discover_id": "$.id"
            }
        code_check: "200"
        next_wait: 1

    -   name: "Negative_即时检索_参数校验_id不存在"
        url: "catalog资源检索"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    -   name: "Positive_查询检索任务列表_按catalog过滤_请求成功"
        url: "查询检索任务列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.entries[0].id": "${discover_id}"
            }

    -   name: "Positive_查询检索任务列表_参数校验_catalog不存在_请求成功"
        url: "查询检索任务列表"
        query_params: >-
            {
                "catalog_id": "${discover_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.total_count": 0
            }

    -   name: "Positive_查看检索任务详情_请求成功"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.status": "completed"
            }

    -   name: "Negative_查看检索任务详情_参数校验_id不存在"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "404"

    -   name: "Positive_删除检索任务_id重复_请求成功"
        url: "删除检索任务"
        path_params: >-
            {
                "ids": "${discover_id},${discover_id}"
            }
        code_check: "204"

    -   name: "Positive_删除检索任务_请求成功"
        url: "删除检索任务"
        prev_case: "Positive_即时检索_数据源_请求成功"
        path_params: >-
            {
                "ids": "${discover_id}"
            }
        code_check: "204"

    -   name: "Negative_删除检索任务_参数校验_id不存在_请求失败"
        url: "删除检索任务"
        path_params: >-
            {
                "ids": "${catalog_id}"
            }
        code_check: "404"

    -   name: "Negative_删除检索任务_参数校验_id已删除_请求失败"
        url: "删除检索任务"
        path_params: >-
            {
                "ids": "${discover_id}"
            }
        code_check: "404"

    -   name: "Positive_删除检索任务_参数校验_放宽id检查_请求成功"
        url: "删除检索任务"
        path_params: >-
            {
                "ids": "${discover_id}"
            }
        query_params: >-
            {
                "ignore_missing": true
            }
        code_check: "204"

    -   name: "Negative_查看检索任务详情_参数校验_id已删除_请求失败"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    # 定时扫描任务相关
    -   name: "Negative_创建定时任务_逻辑资源_请求失败"
        url: "创建调度任务"
        body_params: >-
            {
                "catalog_id": "${catalog_id_Logical}",
                "cron_expr": "00 08 * * *"
            }
        code_check: "400"

    -   name: "Positive_创建定时任务_每日8点执行_仅必需参数_请求成功"
        url: "创建调度任务"
        body_params: >-
            {
                "catalog_id": "${catalog_id}",
                "cron_expr": "00 08 * * *"
            }
        resp_values: >-
            {
                "scheduler_id": "$.id"
            }
        code_check: "201"

    -   name: "Positive_查看定时任务详情_请求成功"
        url: "查看调度任务详情"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "200"

    -   name: "Negative_查看定时任务详情_参数校验_id不存在"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    -   name: "Positive_启用定时任务_请求成功"
        url: "启用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "204"

    -   name: "Positive_启用定时任务_重复启用_请求成功"
        url: "启用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "204"

    -   name: "Negative_启用定时任务_参数校验_id不存在"
        url: "启用调度任务"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    -   name: "Positive_停用定时任务_请求成功"
        url: "停用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "204"

    -   name: "Positive_停用定时任务_重复停用_请求成功"
        url: "停用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "204"

    -   name: "Negative_停用定时任务_参数校验_id不存在"
        url: "停用调度任务"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    -   name: "Positive_查询定时任务列表_按catalog过滤_请求成功"
        url: "查询调度任务列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}"
            }
        code_check: "200"

    -   name: "Positive_查询定时任务列表_按catalog过滤_id不存在_请求成功"
        url: "查询调度任务列表"
        query_params: >-
            {
                "catalog_id": "${discover_id}"
            }
        code_check: "200"

    -   name: "Positive_删除定时任务_请求成功"
        url: "删除调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "204"

    -   name: "Negative_删除定时任务_参数校验_id不存在"
        url: "删除调度任务"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "404"

    -   name: "Negative_删除定时任务_参数校验_id已删除"
        url: "删除调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "404"

    -   name: "Negative_查看定时任务详情_参数校验_id已删除"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "404"

    -   name: "Negative_启用定时任务_参数校验_id已删除"
        url: "启用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "404"

    -   name: "Negative_停用定时任务_参数校验_id已删除"
        url: "停用调度任务"
        path_params: >-
            {
                "id": "${scheduler_id}"
            }
        code_check: "404"

    -   name: "Positive_删除catalog_请求成功"
        url: "删除catalog"
        path_params: >-
            {
                "ids": "${catalog_id}"
            }
        code_check: "204"

    -   name: "Negative_即时检索_参数校验_id已删除_请求失败"
        url: "catalog资源检索"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "404"

    -   name: "Positive_查询检索任务列表_参数校验_catalog已删除_请求成功"
        url: "查询检索任务列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.total_count": 0
            }

    -   name: "Negative_创建定时任务_参数校验_catalog已删除_请求失败"
        url: "创建调度任务"
        body_params: >-
            {
                "catalog_id": "${catalog_id}",
                "cron_expr": "00 08 * * *"
            }
        code_check: "400"

    -   name: "Positive_查询定时任务列表_按catalog过滤_id已删除_请求成功"
        url: "查询调度任务列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}"
            }
        code_check: "200"