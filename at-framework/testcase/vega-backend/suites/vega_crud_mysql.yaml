feature: vega-backend
story: mysql
switch: y
tags:
    - vega-backend
    - mysql
    - smoke

cases:
    -   name: "Positive_创建catalog_MySQL数据源_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        resp_values: >-
            {
                "catalog_id": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_MySQL数据源_不指定数据库_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        resp_values: >-
            {
                "catalog_id_1": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_MySQL数据源_指定多个数据库_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}", "${mysql_db_2}"]
                }
            }
        resp_values: >-
            {
                "catalog_id_2": "$.id"
            }
        code_check: "201"

    -   name: "Negative_创建catalog_连接类型不匹配_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "postgresql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库地址错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${postgres_host}",
                    "port": ${postgres_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_登录信息错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password_error}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库不存在_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["unknown"]
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库不存在_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}","unknown"]
                }
            }
        code_check: "400"

    -   name: "Positive_创建catalog_数据库重复_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}","${mysql_db_1}"]
                }
            }
        code_check: "201"

    -   name: "Positive_查询catalog列表_全量参数_请求成功"
        url: "查询catalog列表"
        query_params: >-
            {
                "tag": "AT",
                "type": "logical",
                "health_check_status": "healthy",
                "offset": "0",
                "limit": "20",
                "sort": "name",
                "direction": "desc"
            }
        code_check: "200"

    -   name: "Positive_查看catalog详情_MySQL数据源_单个数据源_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id}"
            }
        resp_values: >-
            {
                "catalog_name": "$.entries[0].name"
            }
        code_check: "200"

    -   name: "Positive_查看catalog详情_MySQL数据源_多个数据源_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id_1},${catalog_id_2}"
            }
        code_check: "200"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据源名称_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "{{ '更新catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "204"

    -   name: "Negative_编辑catalog_MySQL数据源_修改数据源类型_请求失败"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "${catalog_name}",
                "connector_type": "mariadb",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据库名称_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_追加数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_1}"
            }
        body_params: >-
            {
                "id": "${catalog_id_1}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_精简数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_2}"
            }
        body_params: >-
            {
                "id": "${catalog_id_2}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_检查catalog状态_MySQL数据源_请求成功"
        url: "检查catalog状态"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.health_check_status": "healthy"
            }

    -   name: "Positive_catalog连接测试_MySQL数据源_请求成功"
        url: "测试目录连接"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.success": "true"
            }

    -   name: "Positive_catalog资源检索_MySQL数据源_请求成功"
        url: "catalog资源检索"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_values: >-
            {
                "discover_id": "$.id"
            }
        next_wait: 10

    -   name: "Positive_查询检索任务列表_全量参数_请求成功"
        url: "查询检索任务列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}",
                "schedule_id": "",
                "status": "completed",
                "trigger_type": "manual",
                "offset": "0",
                "limit": "20",
                "sort": "create_time",
                "direction": "desc"
            }
        code_check: "200"

    -   name: "Positive_检索任务详情_MySQL数据源_请求成功"
        url: "查看检索任务详情"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.status": "completed"
            }

    -   name: "Positive_查询资源列表_全量参数_请求成功"
        url: "查询resource列表"
        query_params: >-
            {
                "catalog_id": "${catalog_id}",
                "category": "table",
                "status": "active",
                "database": "${mysql_db_1}",
                "offset": "0",
                "limit": "20",
                "sort": "update_time",
                "direction": "desc"
            }
        code_check: "200"

    -   name: "Positive_追加table类型资源_MySQL数据源_请求成功"
        url: "创建resource"
        body_params: >-
            {

            }
        code_check: "204"

    -   name: "Positive_追加dataset类型资源_MySQL数据源_请求成功"
        url: "创建resource"
        body_params: >-
            {

            }
        code_check: "204"

    -   name: "Positive_追加logicview类型资源_MySQL数据源_请求成功"
        url: "创建resource"
        body_params: >-
            {

            }
        code_check: "204"

    -   name: "Positive_删除catalog_MySQL数据源_请求成功"
        url: "删除catalog"
        path_params: >-
            {
                "ids": "${catalog_id}"
            }
        code_check: "204"
