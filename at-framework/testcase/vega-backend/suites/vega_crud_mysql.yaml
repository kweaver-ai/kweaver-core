feature: vega-backend
story: mysql
switch: y
tags:
    - vega-backend
    - mysql
    - smoke

cases:
    -   name: "Positive_创建catalog_MySQL数据源_仅必需参数_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        resp_values: >-
            {
                "catalog_id": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_MySQL数据源_全量参数_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "tags": ["AT"],
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"],
                    "options": {
                        "timeout": "300s"
                    }
                }
            }
        resp_values: >-
            {
                "catalog_id_1": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_MySQL数据源_指定多个数据库_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}", "${mysql_db_2}"]
                }
            }
        resp_values: >-
            {
                "catalog_id_2": "$.id"
            }
        code_check: "201"

    -   name: "Negative_创建catalog_连接类型不匹配_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "postgresql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库地址错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "127.0.0.1",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库地址错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": 3000,
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_用户名密码错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "unknown",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_用户名密码错误_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "unknown"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_密码加密_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password_ciphertext}"
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库不存在_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": [
                        "unknown"
                    ]
                }
            }
        code_check: "400"

    -   name: "Negative_创建catalog_数据库不存在_请求失败"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": [
                        "${mysql_db_1}",
                        "unknown"
                    ]
                }
            }
        code_check: "400"

    -   name: "Positive_查看catalog详情_MySQL数据源_单个数据源_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id}"
            }
        resp_values: >-
            {
                "catalog_name": "$.entries[0].name"
            }
        code_check: "200"

    -   name: "Positive_查看catalog详情_MySQL数据源_多个数据源_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id_1},${catalog_id_2}"
            }
        code_check: "200"

    -   name: "Positive_编辑catalog_MySQL数据源_信息无更新_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据源名称_仅必需参数_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "{{ '更新catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据源名称_全量参数_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_1}"
            }
        body_params: >-
            {
                "id": "${catalog_id_1}",
                "name": "{{ '更新catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "tags": ["AT"],
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"],
                    "options": {
                        "timeout": "300s"
                    }
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据源名称_指定多个数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_2}"
            }
        body_params: >-
            {
                "id": "${catalog_id_2}",
                "name": "{{ '更新catalog_MySQL-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "tags": ["AT"],
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}","${mysql_db_2}"],
                    "options": {
                        "timeout": "300s"
                    }
                }
            }
        code_check: "204"

    -   name: "Negative_编辑catalog_MySQL数据源_修改数据源id_请求失败"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "{{ '%s' | format(random_string(20, 10)) }}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "409"

    -   name: "Negative_编辑catalog_MySQL数据源_修改数据源类型_请求失败"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "${catalog_name}",
                "connector_type": "mariadb",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        code_check: "400"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        body_params: >-
            {
                "id": "${catalog_id}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_1}"
            }
        body_params: >-
            {
                "id": "${catalog_id_1}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_编辑catalog_MySQL数据源_修改数据库_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_2}"
            }
        body_params: >-
            {
                "id": "${catalog_id_2}",
                "name": "${catalog_name}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_2}"]
                }
            }
        code_check: "204"

    -   name: "Positive_查询catalog列表_参数缺省_请求成功"
        url: "查询catalog列表"
        code_check: "200"

    -   name: "Positive_检查catalog状态_MySQL数据源_请求成功"
        url: "检查catalog状态"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.health_check_status": "healthy"
            }

    -   name: "Positive_catalog连接测试_MySQL数据源_请求成功"
        url: "测试目录连接"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.success": "true"
            }

    -   name: "Positive_catalog资源检索_MySQL数据源_请求成功"
        url: "catalog资源发现"
        path_params: >-
            {
                "id": "${catalog_id}"
            }
        code_check: "200"
        resp_values: >-
            {
                "discover_id": "$.id"
            }

    -   name: "Positive_检索任务列表_参数缺省_请求成功"
        url: "获取发现任务列表"
        code_check: "200"

    -   name: "Positive_检索任务详情_MySQL数据源_请求成功"
        url: "获取发现任务详情"
        path_params: >-
            {
                "id": "${discover_id}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.status": "completed"
            }

    -   name: "Positive_删除catalog_MySQL数据源_请求成功"
        url: "删除catalog"
        path_params: >-
