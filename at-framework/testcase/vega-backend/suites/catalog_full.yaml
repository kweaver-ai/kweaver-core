feature: vega-backend
story: catalog
switch: y
tags:
    - vega-backend
    - catalog
    - full

# 通过include导入子用例文件，用于接口用例较多时的拆分，方便管理
# 子用例文件后缀.case，防止重复加载
# 考虑到可读性，建议将存在依赖关系的用例写入同一文件
include:
    - catalog_create.case
    - catalog_query.case
    - catalog_update.case

cases:
    -   name: "Positive_创建catalog_仅必需参数_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}"
                }
            }
        resp_values: >-
            {
                "catalog_id_required": "$.id"
            }
        code_check: "201"

    -   name: "Positive_创建catalog_全量参数_请求成功"
        url: "创建catalog"
        body_params: >-
            {
                "name": "{{ '新增catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "tags": ["AT"],
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"],
                    "options": {
                        "timeout": "300s"
                    }
                },
                "extensions": {
                    "k1": "v1",
                    "k2": "v2",
                    "k3": "v3"
                }
            }
        resp_values: >-
            {
                "catalog_id_full": "$.id"
            }
        code_check: "201"

    -   name: "Positive_查看catalog详情_请求成功"
        url: "查看catalog详情"
        prev_case: "Positive_创建catalog_仅必需参数_请求成功"
        path_params: >-
            {
                "ids": "${catalog_id_required}"
            }
        resp_values: >-
            {
                "catalog_name_required": "$.entries[0].name"
            }
        code_check: "200"

    -   name: "Positive_查看catalog详情_查看多个资源_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id_required},${catalog_id_full}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.entries": "len(2)"
            }

    -   name: "Positive_查看catalog详情_查看多个资源_id重复_请求成功"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "${catalog_id_required},${catalog_id_required}"
            }
        code_check: "200"
        resp_check: >-
            {
                "$.entries": "len(1)"
            }

    -   name: "Negative_查看catalog详情_id不存在_请求失败"
        url: "查看catalog详情"
        path_params: >-
            {
                "ids": "00000000000000000000"
            }
        code_check: "404"

    -   name: "Negative_查看catalog详情_id不存在_请求失败"
        url: "查看catalog详情"
        path_params: >-
            {
             "ids": "${catalog_id_required},00000000000000000000"
            }
        code_check: "404"

    -   name: "Positive_检查catalog状态_请求成功"
        url: "检查catalog状态"
        path_params: >-
            {
                "id": "${catalog_id_required}"
            }
        code_check: "200"

    -   name: "Negative_查看catalog状态_id不存在_请求失败"
        url: "检查catalog状态"
        path_params: >-
            {
              "id": "00000000000000000000"
            }
        code_check: "404"

    -   name: "Positive_catalog连接测试_请求成功"
        url: "测试目录连接"
        path_params: >-
            {
                "id": "${catalog_id_required}"
            }
        code_check: "200"

    -   name: "Negative_catalog连接测试_id不存在_请求失败"
        url: "测试目录连接"
        path_params: >-
            {
                "id": "00000000000000000000"
            }
        code_check: "404"

    -   name: "Positive_编辑catalog_信息无更新_请求成功"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_required}"
            }
        body_params: >-
            {
                "id": "${catalog_id_required}",
                "name": "${catalog_name_required}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "204"

    -   name: "Negative_编辑catalog_name名称重复_请求失败"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_full}"
            }
        body_params: >-
            {
                "id": "${catalog_id_full}",
                "name": "${catalog_name_required}",
                "connector_type": "mysql",
                "description": "自动化测试用例",
                "tags": ["AT"],
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"],
                    "options": {
                        "timeout": "300s"
                    }
                },
                "extensions": {
                    "k1": "v1",
                    "k2": "v2",
                    "k3": "v3"
                }
            }
        code_check: "409"

    -   name: "Negative_删除catalog_id不存在_请求失败"
        url: "删除catalog"
        path_params: >-
            {
              "ids": "00000000000000000000"
            }
        code_check: "404"

    -   name: "Negative_删除catalog_id不存在_请求失败"
        url: "删除catalog"
        path_params: >-
            {
             "ids": "${catalog_id_required},00000000000000000000"
            }
        code_check: "404"

    -   name: "Positive_删除catalog_多个资源_请求成功"
        url: "删除catalog"
        path_params: >-
            {
                "ids": "${catalog_id_required},${catalog_id_full}"
            }
        code_check: "204"

    -   name: "Negative_删除catalog_id已删除_请求失败"
        url: "删除catalog"
        path_params: >-
            {
              "ids": "${catalog_id_required}"
            }
        code_check: "404"

    -   name: "Positive_删除catalog_请求成功"
        url: "删除catalog"
        prev_case: "Positive_创建catalog_仅必需参数_请求成功"
        path_params: >-
            {
                "ids": "${catalog_id_required}"
            }
        code_check: "204"

    -   name: "Negative_查看catalog详情_id已删除_请求失败"
        url: "查看catalog详情"
        path_params: >-
            {
              "ids": "${catalog_id_required}"
            }
        code_check: "404"

    -   name: "Negative_查看catalog状态_id已删除_请求失败"
        url: "检查catalog状态"
        path_params: >-
            {
              "id": "${catalog_id_required}"
            }
        code_check: "404"

    -   name: "Negative_catalog连接测试_id已删除_请求失败"
        url: "测试目录连接"
        path_params: >-
            {
                "id": "${catalog_id_required}"
            }
        code_check: "404"

    -   name: "Negative_编辑catalog_id已删除_请求失败"
        url: "编辑catalog"
        path_params: >-
            {
                "id": "${catalog_id_required}"
            }
        body_params: >-
            {
                "id": "${catalog_id_required}",
                "name": "{{ '更新catalog_AutoCase-%s' | format(random_string(6, 8)) }}",
                "connector_type": "mysql",
                "connector_config": {
                    "host": "${mysql_host}",
                    "port": ${mysql_port},
                    "username": "${mysql_user}",
                    "password": "${mysql_password}",
                    "databases": ["${mysql_db_1}"]
                }
            }
        code_check: "404"