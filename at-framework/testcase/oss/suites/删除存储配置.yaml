feature: 存储管理
story: 删除存储配置
switch: y
cases:
- name: 前置用例--创建存储配置成功
  url: 创建存储配置
  body_params: "{
  \"storage_name\": \"${oss_storage_name}_${ts_uuid}\",
  \"vendor_type\": \"OSS\",
  \"endpoint\": \"${oss_endpoint}\",
  \"bucket_name\": \"${oss_bucket_name}\",
  \"access_key_id\": \"${oss_access_key_id}\",
  \"access_key_secret\": \"${oss_access_key_secret}\",
  \"region\": \"${oss_region}\",
  \"is_default\": false,
  \"internal_endpoint\": \"\"
}"
  code_check: '200'
  resp_check: "{\n  \"$.data.id\": \"exists\",\n  \"$.data.status\": \"ok\"\n}"
  resp_values: "{\"storage_id\": \"$.data.id\"}"
  description: 测试创建OSS类型存储配置功能

- name: 删除存储配置成功
  url: 删除存储配置
  path_params: "{
  \"storage_id\": \"${storage_id}\"
}"
  code_check: '200'
  resp_check: "{\n  \"$.data.id\": \"exists\",\n  \"$.data.status\": \"ok\"\n}"
  description: 测试删除存储配置功能

- name: 删除存储配置失败--storage_id不存在
  url: 删除存储配置
  path_params: "{
  \"storage_id\": \"9999999999999999999\"
}"
  code_check: '200'
  resp_check: "{\n  \"$.data.id\": \"exists\",\n  \"$.data.status\": \"ok\"\n}"
  description: 测试storage_id不存在的情况

- name: 删除存储配置失败--storage_id为空
  url: 删除存储配置
  path_params: "{
  \"storage_id\": \"\"
}"
  code_check: '404'
  description: 测试storage_id为空的情况
