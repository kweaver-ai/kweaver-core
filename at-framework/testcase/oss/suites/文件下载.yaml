feature: 文件上传与下载
story: 下载文件
switch: y
cases:
- name: 获取下载URL成功--PUT方式上传单文件
  url: 获取下载 URL
  prev_case: 单文件上传成功--PUT方式
  path_params: "{
  \"storage_id\": \"${storage_config_id}\",
  \"key\": \"test-at/singleUploadByPUT.pdf\"
}"
  code_check: '200'
  resp_check: "{\n  \"$.data.method\": \"GET\",\n  \"$.data.url\": \"exists\"\n}"
  resp_values: "{\"download_method\": \"$.data.method\",\"download_url\": \"$.data.url\", \"download_headers\": \"$.data.headers\"}"
  description: 测试获取下载URL(PUT方式上传单文件)的功能

- name: 下载文件成功--PUT方式上传单文件
  url: 文件下载
  prev_case: 获取下载URL成功--PUT方式上传单文件
  code_check: '200'
  description: 测试下载文件成功(PUT方式上传单文件)的功能

- name: 获取下载URL成功--POST方式上传单文件
  url: 获取下载 URL
  prev_case: 单文件上传成功--POST方式
  path_params: "{
  \"storage_id\": \"${storage_config_id}\",
  \"key\": \"test-at/singleUploadByPOST.pdf\"
}"
  code_check: '200'
  resp_check: "{\n  \"$.data.method\": \"GET\",\n  \"$.data.url\": \"exists\"\n}"
  resp_values: "{\"download_method\": \"$.data.method\",\"download_url\": \"$.data.url\", \"download_headers\": \"$.data.headers\"}"
  description: 测试获取下载URL(POST方式上传单文件)的功能

- name: 下载文件成功--POST方式上传单文件
  url: 文件下载
  prev_case: 获取下载URL成功--POST方式上传单文件
  code_check: '200'
  description: 测试下载文件成功(POST方式上传单文件)的功能

