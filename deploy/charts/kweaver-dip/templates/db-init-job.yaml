{{- if .Values.dbInit.enabled }}
{{- $rds := .Values.global.depServices.rds }}
{{- $registry := .Values.global.image.registry | default "" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-init
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.dbInit.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-db-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for MariaDB at {{ $rds.host }}:{{ $rds.port }}..."
              until nc -z {{ $rds.host }} {{ $rds.port }}; do
                echo "  MariaDB not ready, retrying in 5s..."
                sleep 5
              done
              echo "MariaDB is reachable."
      containers:
        - name: migrate
          image: "{{ if $registry }}{{ $registry }}/{{ end }}{{ .Values.dbInit.image.repository }}:{{ .Values.dbInit.image.tag }}"
          imagePullPolicy: {{ .Values.dbInit.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: DB_HOST
              value: {{ $rds.host | quote }}
            - name: DB_PORT
              value: {{ $rds.port | quote }}
            - name: DB_USER
              value: {{ $rds.user | quote }}
            - name: DB_PASSWORD
              value: {{ $rds.password | quote }}
            - name: DB_NAME
              value: {{ $rds.database | default "adp" | quote }}
            - name: DB_TYPE
              value: {{ $rds.type | default "MariaDB" | quote }}
            - name: MIGRATION_TARGET
              value: "dip"
{{- end }}
