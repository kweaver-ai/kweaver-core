# =============================================================================
# KWeaver Core — Default Values
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings (propagated to all subcharts via Helm globals)
#
# In Umbrella mode, users configure global once; Helm auto-propagates to all
# subcharts. Subchart templates use the "Global + Fallback" pattern described
# in Section 17 of the design doc: prioritize global.xxx, fallback to local.
# ---------------------------------------------------------------------------
global:
  # Image registry
  image:
    registry: ""
  imagePullSecrets: []

  # Basic deployment
  replicaCount: 1
  mode: Community
  storageClass: ""
  ingressClassName: "nginx"

  # Environment
  env:
    language: "en_US.UTF-8"
    timezone: "Asia/Shanghai"

  # Access address (ingress endpoint)
  accessAddress:
    host: ""
    port: 443
    scheme: https
    path: /

  # Flow Automation S3 Config
  flowAutomation:
    s3:
      default: "default"
      connections: []

  # Dependency services (databases, MQ, cache, etc.)
  depServices:
    rds:
      host: ""
      hostRead: ""
      port: 3306
      portRead: 3306
      user: ""
      password: ""
      root_password: ""
      database: "adp"
      admin_key: ""
      source_type: internal
      type: MariaDB

    redis:
      connectType: standalone
      sourceType: internal
      connectInfo:
        host: ""
        port: 6379
        username: "root"
        password: ""
        sentinelHost: ""
        sentinelPort: 26379
        sentinelUsername: ""
        sentinelPassword: ""
        masterGroupName: "mymaster"

    mq:
      mqType: kafka
      mqHost: ""
      mqPort: 9092
      mqLookupdHost: ""
      mqLookupdPort: 0
      auth:
        mechanism: ""
        username: ""
        password: ""

    opensearch:
      distribution: opensearch
      host: ""
      port: 9200
      protocol: http
      user: "admin"
      password: ""
      version: ""

    mongodb:
      source_type: internal
      host: ""
      port: 28000
      user: ""
      password: ""
      replicaSet: ""
      options:
        authSource: admin

    zookeeper:
      host: ""
      port: 2181

# ---------------------------------------------------------------------------
# Module switches — set to false to skip a module group entirely
# ---------------------------------------------------------------------------
modules:
  isf:
    enabled: true
  agentoperator:
    enabled: true
  dataagent:
    enabled: true
  ontology:
    enabled: true
  sandboxruntime:
    enabled: true


# ---------------------------------------------------------------------------
# Database initialization hook
# ---------------------------------------------------------------------------
dbInit:
  enabled: true
  image:
    repository: kweaver/db-migrate
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  backoffLimit: 3

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
storage:
  storageClassName: ""
