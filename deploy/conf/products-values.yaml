# =============================================================================
# KWeaver Products Values — Unified configuration for kweaver-core / kweaver-dip
#
# Usage:
#   helm upgrade --install kweaver-core oci://ghcr.io/kweaver-ai/kweaver-core \
#     --version 0.1.0 -n kweaver --create-namespace \
#     -f products-values.yaml --wait --timeout 30m
#
#   helm upgrade --install kweaver-dip oci://ghcr.io/kweaver-ai/kweaver-dip \
#     --version 0.1.0 -n kweaver --create-namespace \
#     -f products-values.yaml --wait --timeout 30m
# =============================================================================

# ---------------------------------------------------------------------------
# Global Variables (Propagated to all subcharts automatically)
# ---------------------------------------------------------------------------
# In the Open Source Umbrella version, we use Helm's `global` block to pass 
# common configurations down to all 40+ subcharts.
# Subcharts are designed to prioritize `global.xxx` and fallback to their local `.Values.xxx`
# to maintain compatibility with legacy independent commercial deployments.
global:
  # Image overrides
  image:
    registry: "swr.cn-east-3.myhuaweicloud.com/kweaver-ai"
  imagePullSecrets: []
  
  # Basic Deployment
  replicaCount: 1
  mode: Community
  storageClass: "local-path"
  ingressClassName: "nginx"

  # Environment
  env:
    language: en_US.UTF-8
    timezone: Asia/Shanghai

  # Access Address
  accessAddress:
    host: 10.4.175.152
    port: 443
    scheme: https
    path: /

  # Flow Automation S3 Config
  flowAutomation:
    s3:
      default: "default"
      connections:
        - name: default
          endpoint: ""
          region: us-east-1
          accessKeyID: ""
          secretAccessKey: ""
          bucketName: ""
          skipVerify: true
          disableHTTPS: false

  # Dependency Services (Databases, MQ, Cache, etc.)
  depServices:
    mq:
      auth:
        mechanism: 'PLAIN'
        username: 'kafkauser'
        password: ''
      mqHost: 'kafka.resource.svc.cluster.local'
      mqLookupdHost: ""
      mqLookupdPort: 0
      mqPort: 9092
      mqType: kafka
    opensearch:
      distribution: opensearch
      host: 'opensearch-cluster-master.resource.svc.cluster.local'
      user: 'admin'
      password: ''
      port: 9200
      protocol: https
      version: ""
    mongodb:
      source_type: internal
      host: 'mongodb.resource.svc.cluster.local'
      port: 28000
      user: 'admin'
      password: ''
      replicaSet: 'rs0'
      options:
        authSource: 'admin'
    rds:
      admin_key: ''
      host: 'mariadb.resource.svc.cluster.local'
      hostRead: 'mariadb.resource.svc.cluster.local'
      port: 3306
      portRead: 3306
      source_type: internal
      type: MariaDB
      user: 'adp'
      password: ''
      database: 'adp'
    redis:
      connectInfo:
        masterGroupName: mymaster
        password: ''
        sentinelHost: proton-redis-proton-redis-sentinel.resource.svc.cluster.local
        sentinelPassword: ''
        sentinelPort: 26379
        sentinelUsername: root
        username: root
      connectType: sentinel
      sourceType: internal
    structure-extractor:
      privateHost: 127.0.0.1
      privatePort: 8089
      outputDir: /output
      backend: vlm-http-client
      serverUrl: http://127.0.0.1:8089
      fileHost: 127.0.0.1
      filePort: 8090
    class-443:
      ingressClass: nginx


# ---------------------------------------------------------------------------
# Module Switches
# ---------------------------------------------------------------------------
modules:
  isf:
    enabled: true
  agentoperator:
    enabled: true
  dataagent:
    enabled: true
  ontology:
    enabled: true
  sandboxruntime:
    enabled: true
  studio:
    enabled: true
  modelfactory:
    enabled: true

# =============================================================================
# Specific Subchart Overrides (Optional)
# =============================================================================
# Helm injects values under `<subchart-name>:` as the subchart's `.Values.*`.
# You can override ANY field that exists in the subchart's own values.yaml.
#
# How it works:
#   - `global.*`             → Auto-propagated to ALL subcharts as `.Values.global.*`
#   - `<subchart-name>.*`    → Injected into THAT subchart as `.Values.*`
#   - `modules.*`            → NOT propagated, only used by parent chart for condition
#
# Priority (highest → lowest):
#   1. --set agent-backend.replicaCount=5       (CLI)
#   2. This file: agent-backend.replicaCount: 3 (subchart key override)
#   3. Subchart's own values.yaml default        (subchart default)
# =============================================================================

# ---------------------------------------------------------------------------
# Example 1: Override global fields for a specific subchart
# ---------------------------------------------------------------------------
# agent-backend:
#   # Override global.replicaCount (default: 1) for this subchart only
#   replicaCount: 3
#
#   # Override global.image.registry for this subchart only
#   image:
#     registry: "harbor.internal/kweaver"
#
#   # Override global.depServices.rds for this subchart (e.g. dedicated DB)
#   depServices:
#     rds:
#       host: 'agent-dedicated-db.svc.cluster.local'
#       database: 'agent_db'

# ---------------------------------------------------------------------------
# Example 2: Set subchart-specific fields (not in global)
# ---------------------------------------------------------------------------
# These fields exist in the subchart's own values.yaml but are NOT part of
# the global block. You can still set them via the subchart key.
#
# agent-backend:
#   resources:
#     limits:
#       cpu: "4"
#       memory: 8Gi
#     requests:
#       cpu: "1"
#       memory: 2Gi
#   nodeSelector:
#     gpu: "true"
#   tolerations:
#     - key: "gpu"
#       operator: "Exists"
#       effect: "NoSchedule"
#   affinity: {}
#   extraEnv:
#     - name: LOG_LEVEL
#       value: debug
#     - name: CUSTOM_FLAG
#       value: "1"
#   serviceAccount:
#     create: true
#     name: "agent-backend-sa"

# ---------------------------------------------------------------------------
# Example 3: Multiple subcharts with different overrides
# ---------------------------------------------------------------------------
# isfweb:
#   replicaCount: 2
#   resources:
#     limits:
#       cpu: "2"
#       memory: 4Gi
#
# dataflow:
#   depServices:
#     rds:
#       host: 'dataflow-dedicated-db.svc.cluster.local'
#       database: 'dataflow'
#   extraEnv:
#     - name: WORKER_COUNT
#       value: "8"

