# =============================================================================
# KWeaver Products Values — Unified configuration for kweaver-core / kweaver-dip
#
# Usage:
#   helm upgrade --install kweaver-core oci://ghcr.io/kweaver-ai/kweaver-core \
#     --version 0.1.0 -n kweaver --create-namespace \
#     -f products-values.yaml --wait --timeout 30m
#
#   helm upgrade --install kweaver-dip oci://ghcr.io/kweaver-ai/kweaver-dip \
#     --version 0.1.0 -n kweaver --create-namespace \
#     -f products-values.yaml --wait --timeout 30m
# =============================================================================

# ---------------------------------------------------------------------------
# Global Variables (Propagated to all subcharts automatically)
# ---------------------------------------------------------------------------
# In the Open Source Umbrella version, we use Helm's `global` block to pass 
# common configurations down to all 40+ subcharts.
# Subcharts are designed to prioritize `global.xxx` and fallback to their local `.Values.xxx`
# to maintain compatibility with legacy independent commercial deployments.
global:
  # Image overrides
  imageRegistry: "swr.cn-east-3.myhuaweicloud.com/kweaver-ai"
  imagePullSecrets: []
  
  # Basic Deployment
  replicaCount: 1
  mode: Community
  storageClass: "local-path"
  ingressClassName: "nginx"

  # Environment
  env:
    language: en_US.UTF-8
    timezone: Asia/Shanghai

  # Access Address
  accessAddress:
    host: 10.4.175.152
    port: 443
    scheme: https
    path: /

  # Flow Automation S3 Config
  flowAutomation:
    s3:
      default: "default"
      connections:
        - name: default
          endpoint: ""
          region: us-east-1
          accessKeyID: ""
          secretAccessKey: ""
          bucketName: ""
          skipVerify: true
          disableHTTPS: false

  # Dependency Services (Databases, MQ, Cache, etc.)
  depServices:
    mq:
      auth:
        mechanism: 'PLAIN'
        username: 'kafkauser'
        password: ''
      mqHost: 'kafka.resource.svc.cluster.local'
      mqLookupdHost: ""
      mqLookupdPort: 0
      mqPort: 9092
      mqType: kafka
    opensearch:
      distribution: opensearch
      host: 'opensearch-cluster-master.resource.svc.cluster.local'
      user: 'admin'
      password: ''
      port: 9200
      protocol: https
      version: ""
    mongodb:
      source_type: internal
      host: 'mongodb.resource.svc.cluster.local'
      port: 28000
      user: 'admin'
      password: ''
      replicaSet: 'rs0'
      options:
        authSource: 'admin'
    rds:
      admin_key: ''
      host: 'mariadb.resource.svc.cluster.local'
      hostRead: 'mariadb.resource.svc.cluster.local'
      port: 3306
      portRead: 3306
      source_type: internal
      type: MariaDB
      user: 'adp'
      password: ''
      database: 'adp'
    redis:
      connectInfo:
        masterGroupName: mymaster
        password: ''
        sentinelHost: proton-redis-proton-redis-sentinel.resource.svc.cluster.local
        sentinelPassword: ''
        sentinelPort: 26379
        sentinelUsername: root
        username: root
      connectType: sentinel
      sourceType: internal
    structure-extractor:
      privateHost: 127.0.0.1
      privatePort: 8089
      outputDir: /output
      backend: vlm-http-client
      serverUrl: http://127.0.0.1:8089
      fileHost: 127.0.0.1
      filePort: 8090
    class-443:
      ingressClass: nginx


# =============================================================================
# Specific Subchart Overrides (Optional)
# =============================================================================
# If a specific subchart requires a different configuration than the global defaults,
# you can define it here. Helm's local values always override global ones in templates 
# if written correctly, or we can just specify them under the subchart's key.

# Example:
# agent-backend:
#   replicaCount: 3

