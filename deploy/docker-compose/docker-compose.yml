# KWeaver Core (B1 demo: infra + migrator + 11 services, no agent/dataflow/sandbox)

name: ${COMPOSE_PROJECT_NAME:-kweaver-compose}

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./configs/mariadb/init.sql:/docker-entrypoint-initdb.d/99-kweaver-extras.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - kweaver-network
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo stat | timeout 2 nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 60s

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200 | grep -q 200"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  kweaver-core-data-migrator:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/kweaver-core-data-migrator:${KWEAVER_VERSION}
    restart: "no"
    networks:
      - kweaver-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
    volumes:
      - ./configs/generated/kweaver-core-data-migrator/cm-kw-migrator-app/config.yaml:/app/config.yaml:ro
      - ./configs/generated/kweaver-core-data-migrator/secret-kweaver-core-data-migrator-secret/secret-config.yaml:/etc/data-migrator/secret-config.yaml:ro

  bkn-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/bkn-backend:${KWEAVER_VERSION}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      BUSINESS_DOMAIN_ENABLED: "false"
      DM_SVC_PATH: /opt/bkn-backend/config
    volumes:
      - ./configs/generated/bkn-backend/cm-bkn-backend-cm/bkn-backend-config.yaml:/opt/bkn-backend/config/bkn-backend-config.yaml:ro
      - ./configs/generated/bkn-backend/cm-bkn-backend-cm/dm_svc.conf:/opt/bkn-backend/config/dm_svc.conf:ro

  mf-model-manager:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mf-model-manager:${KWEAVER_VERSION}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/mf-model-manager/cm-kw-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DM_SVC_PATH: /tmp/rds_conf/
      DEVICE_CODE: "None"
    volumes:
      - ./configs/generated/mf-model-manager/cm-kw-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  mf-model-api:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mf-model-api:${KWEAVER_VERSION}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/mf-model-api/cm-kw-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DM_SVC_PATH: /tmp/rds_conf/
      DEVICE_CODE: "None"
    volumes:
      - ./configs/generated/mf-model-api/cm-kw-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  ontology-query:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/ontology-query:${KWEAVER_VERSION}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/ontology-query/config
      ACTION_EXECUTION_MAX_OBJECTS: "10000"
    volumes:
      - ./configs/generated/ontology-query/cm-ontology-query-cm/ontology-query-config.yaml:/opt/ontology-query/config/ontology-query-config.yaml:ro

  vega-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-backend:${KWEAVER_VERSION}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/vega-backend/config
    volumes:
      - ./configs/generated/vega-backend/cm-vega-backend-cm/vega-backend-config.yaml:/opt/vega-backend/config/vega-backend-config.yaml:ro
      - ./configs/generated/vega-backend/cm-vega-backend-cm/dm_svc.conf:/opt/vega-backend/config/dm_svc.conf:ro

  data-connection:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/data-connection:${DATA_CONNECTION_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      AUTH_ENABLED: "false"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=70.0 -XX:MaxRAMPercentage=70.0 -XX:MaxMetaspaceSize=512M -XX:MetaspaceSize=128M -XX:+UseG1GC -XX:InitiatingHeapOccupancyPercent=30 -XX:ParallelGCThreads=8 -XX:+ExitOnOutOfMemoryError"
    volumes:
      - ./configs/generated/data-connection/cm-data-connection/application.yml:/opt/vega/config/application.yml:ro

  vega-gateway:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-gateway:${VEGA_GATEWAY_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      AUTH_ENABLED: "false"
    volumes:
      - ./configs/generated/vega-gateway/cm-vega-gateway-deployment-cm/application.yml:/opt/virtual-engine/config/application.yml:ro

  vega-gateway-pro:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-gateway-pro:${VEGA_GATEWAY_PRO_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      AUTH_ENABLED: "false"
    volumes:
      - ./configs/generated/vega-gateway-pro/cm-vega-gateway-pro-cm/vega-gateway-pro-config.yaml:/opt/vega-gateway-pro/config/vega-gateway-pro-config.yaml:ro

  mdl-data-model:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-data-model:${MDL_DATA_MODEL_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      AES_KEY: ${MDL_DATA_MODEL_AES_KEY:-46EBA22EF5204DD5B110A1F730513965}
      DM_SVC_PATH: /opt/data-model/config
    volumes:
      - ./configs/generated/mdl-data-model/cm-mdl-data-model-cm/data-model-config.yaml:/opt/data-model/config/data-model-config.yaml:ro
      - ./configs/generated/mdl-data-model/cm-mdl-data-model-cm/dm_svc.conf:/opt/data-model/config/dm_svc.conf:ro

  mdl-uniquery:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-uniquery:${MDL_UNIQUERY_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/uniquery/config
    volumes:
      - ./configs/generated/mdl-uniquery/cm-mdl-uniquery-cm/uniquery-config.yaml:/opt/uniquery/config/uniquery-config.yaml:ro
      - ./configs/generated/mdl-uniquery/cm-mdl-uniquery-cm/dm_svc.conf:/opt/uniquery/config/dm_svc.conf:ro

  mdl-data-model-job:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-data-model-job:${MDL_DATA_MODEL_JOB_VERSION:-0.6.0}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      DM_SVC_PATH: /opt/data-model-job/config
    volumes:
      - ./configs/generated/mdl-data-model-job/cm-mdl-data-model-job-cm/data-model-job-config.yaml:/opt/data-model-job/config/data-model-job-config.yaml:ro
      - ./configs/generated/mdl-data-model-job/cm-mdl-data-model-job-cm/dm_svc.conf:/opt/data-model-job/config/dm_svc.conf:ro

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${KWEAVER_HTTP_PORT:-8080}:8080"
    networks:
      - kweaver-network
    depends_on:
      - mf-model-manager
      - mf-model-api
      - bkn-backend
      - ontology-query
      - vega-backend
      - data-connection
      - vega-gateway
      - vega-gateway-pro
      - mdl-data-model
      - mdl-uniquery
      - mdl-data-model-job
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  kweaver-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-kweaver-compose}-network

volumes:
  mariadb_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  opensearch_data:
  minio_data:
