# KWeaver Core — Docker Compose aligned with `deploy.sh kweaver-core install --minimum`
# (release-manifests/0.7.0/kweaver-core.yaml releases; AUTH_ENABLED=false / BUSINESS_DOMAIN_ENABLED=false).
# Does not install optional ISF from the manifest (skip when auth.enabled=false in Helm).

name: ${COMPOSE_PROJECT_NAME:-kweaver-compose}

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./configs/mariadb/init.sql:/docker-entrypoint-initdb.d/99-kweaver-extras.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - kweaver-network
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo stat | timeout 2 nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 60s

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200 | grep -q 200"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    networks:
      - kweaver-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env (run ./setup.sh -p YOUR_PASSWORD)}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  kweaver-core-data-migrator:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/kweaver-core-data-migrator:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: "no"
    networks:
      - kweaver-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
    volumes:
      - ./configs/generated/kweaver-core-data-migrator/cm-kw-migrator-app/config.yaml:/app/config.yaml:ro
      - ./configs/generated/kweaver-core-data-migrator/secret-kweaver-core-data-migrator-secret/secret-config.yaml:/etc/data-migrator/secret-config.yaml:ro

  bkn-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/bkn-backend:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      BUSINESS_DOMAIN_ENABLED: "false"
      DM_SVC_PATH: /opt/bkn-backend/config
    volumes:
      - ./configs/generated/bkn-backend/cm-bkn-backend-cm/bkn-backend-config.yaml:/opt/bkn-backend/config/bkn-backend-config.yaml:ro
      - ./configs/generated/bkn-backend/cm-bkn-backend-cm/dm_svc.conf:/opt/bkn-backend/config/dm_svc.conf:ro

  mf-model-manager:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mf-model-manager:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/mf-model-manager/cm-kw-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DM_SVC_PATH: /tmp/rds_conf/
      DEVICE_CODE: "None"
    volumes:
      - ./configs/generated/mf-model-manager/cm-kw-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  mf-model-api:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mf-model-api:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/mf-model-api/cm-kw-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DM_SVC_PATH: /tmp/rds_conf/
      DEVICE_CODE: "None"
    volumes:
      - ./configs/generated/mf-model-api/cm-kw-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  ontology-query:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/ontology-query:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/ontology-query/config
      ACTION_EXECUTION_MAX_OBJECTS: "10000"
    volumes:
      - ./configs/generated/ontology-query/cm-ontology-query-cm/ontology-query-config.yaml:/opt/ontology-query/config/ontology-query-config.yaml:ro

  vega-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-backend:${KWEAVER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/vega-backend/config
    volumes:
      - ./configs/generated/vega-backend/cm-vega-backend-cm/vega-backend-config.yaml:/opt/vega-backend/config/vega-backend-config.yaml:ro
      - ./configs/generated/vega-backend/cm-vega-backend-cm/dm_svc.conf:/opt/vega-backend/config/dm_svc.conf:ro

  data-connection:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/data-connection:${DATA_CONNECTION_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      AUTH_ENABLED: "false"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=70.0 -XX:MaxRAMPercentage=70.0 -XX:MaxMetaspaceSize=512M -XX:MetaspaceSize=128M -XX:+UseG1GC -XX:InitiatingHeapOccupancyPercent=30 -XX:ParallelGCThreads=8 -XX:+ExitOnOutOfMemoryError"
    volumes:
      - ./configs/generated/data-connection/cm-data-connection/application.yml:/opt/vega/config/application.yml:ro

  vega-gateway:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-gateway:${VEGA_GATEWAY_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      AUTH_ENABLED: "false"
    volumes:
      - ./configs/generated/vega-gateway/cm-vega-gateway-deployment-cm/application.yml:/opt/virtual-engine/config/application.yml:ro

  vega-gateway-pro:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/vega-gateway-pro:${VEGA_GATEWAY_PRO_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      AUTH_ENABLED: "false"
    volumes:
      - ./configs/generated/vega-gateway-pro/cm-vega-gateway-pro-cm/vega-gateway-pro-config.yaml:/opt/vega-gateway-pro/config/vega-gateway-pro-config.yaml:ro

  mdl-data-model:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-data-model:${MDL_DATA_MODEL_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      AES_KEY: ${MDL_DATA_MODEL_AES_KEY:-46EBA22EF5204DD5B110A1F730513965}
      DM_SVC_PATH: /opt/data-model/config
    volumes:
      - ./configs/generated/mdl-data-model/cm-mdl-data-model-cm/data-model-config.yaml:/opt/data-model/config/data-model-config.yaml:ro
      - ./configs/generated/mdl-data-model/cm-mdl-data-model-cm/dm_svc.conf:/opt/data-model/config/dm_svc.conf:ro

  mdl-uniquery:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-uniquery:${MDL_UNIQUERY_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      AUTH_ENABLED: "false"
      DM_SVC_PATH: /opt/uniquery/config
    volumes:
      - ./configs/generated/mdl-uniquery/cm-mdl-uniquery-cm/uniquery-config.yaml:/opt/uniquery/config/uniquery-config.yaml:ro
      - ./configs/generated/mdl-uniquery/cm-mdl-uniquery-cm/dm_svc.conf:/opt/uniquery/config/dm_svc.conf:ro

  mdl-data-model-job:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/mdl-data-model-job:${MDL_DATA_MODEL_JOB_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MariaDB
      MQ_TYPE: kafka
      DM_SVC_PATH: /opt/data-model-job/config
    volumes:
      - ./configs/generated/mdl-data-model-job/cm-mdl-data-model-job-cm/data-model-job-config.yaml:/opt/data-model-job/config/data-model-job-config.yaml:ro
      - ./configs/generated/mdl-data-model-job/cm-mdl-data-model-job-cm/dm_svc.conf:/opt/data-model-job/config/dm_svc.conf:ro

  agent-operator-integration:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/agent-operator-integration:${AGENT_OPERATOR_INTEGRATION_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - agent-operator-integration
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MYSQL
      AUTH_ENABLED: "false"
      BUSINESS_DOMAIN_ENABLED: "false"
    volumes:
      - ./configs/generated/agent-operator-integration/cm-kw:/sysvol/config:ro
      - ./configs/generated/agent-operator-integration/secret-kw:/sysvol/secret:ro

  agent-retrieval:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/agent-retrieval:${AGENT_RETRIEVAL_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - agent-retrieval
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: MYSQL
      AUTH_ENABLED: "false"
    volumes:
      - ./configs/generated/agent-retrieval/cm-kw:/sysvol/config:ro
      - ./configs/generated/agent-retrieval/secret-kw:/sysvol/secret:ro

  agent-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/agent-backend:${AGENT_BACKEND_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - agent-backend
          - agent-factory
          - agent-app
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/agent-backend/cm-agent-memory-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      AGENT_FACTORY_DISABLE_PMS_CHECK: "false"
      AUTH_ENABLED: "false"
      BUSINESS_DOMAIN_ENABLED: "false"
      DM_SVC_PATH: /tmp/rds_conf/
    volumes:
      - ./configs/generated/agent-backend/cm-agent-factory-yaml/agent-factory.yaml:/sysvol/conf/agent-factory.yaml:ro
      - ./configs/generated/agent-backend/cm-agent-factory-yaml/dm_svc.conf:/sysvol/conf/dm_svc.conf:ro
      - ./configs/generated/agent-backend/cm-agent-factory-yaml/mq_config.yaml:/sysvol/conf/mq_config.yaml:ro
      - ./configs/generated/agent-backend/secret-agent-factory-secret-yaml:/sysvol/conf/secret:ro
      - ./configs/generated/agent-backend/cm-agent-executor-yaml/agent-executor.yaml:/sysvol/conf/agent-executor.yaml:ro
      - ./configs/generated/agent-backend/cm-agent-factory-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  dataflow:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/dataflow:${DATAFLOW_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - flow-automation
          - flow-automation-private
          - ecron-management
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/dataflow/flow-automation.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      LOGOUT: stdout
      AUTH_ENABLED: "false"
      BUSINESS_DOMAIN_ENABLED: "false"
    volumes:
      - ./configs/generated/dataflow/secret-flow-automation-ca/mongo.ca.pem:/opt/flow-automation/ssl/mongo.ca.pem:ro
      - ./configs/generated/dataflow/cm-flow-automation/flow_o11y_data.yaml:/conf/flow_o11y_data.yaml:ro
      - ./configs/generated/dataflow/cm-flow-automation/ACTION_CONFIG:/conf/action_config.yaml:ro
      - ./configs/generated/dataflow/cm-flow-automation/S3:/conf/s3.yaml:ro
      - ./configs/generated/dataflow/cm-ecron-management-yaml:/sysvol/conf/service_conf:ro
      - ./configs/generated/dataflow/secret-ecron-management-secret:/sysvol/conf/secret_conf:ro
      - dataflow_tmp:/tmp
      - dataflow_osslog:/opt/flow-automation/osslog
    command: ["/bin/bash", "-c", "cd /opt/flow-automation && ./flow-automation"]

  flow-stream-data-pipeline:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/dataflow:${DATAFLOW_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
      dataflow:
        condition: service_started
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: en_US.UTF-8
      DB_TYPE: mysql
      MQ_TYPE: kafka
      DM_SVC_PATH: /opt/pipeline/config
      AUTH_ENABLED: "false"
      SDP_PIPELINE_IMAGE: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/dataflow:${DATAFLOW_VERSION:?set by ./setup.sh from compose-manifest.yaml}
      SDP_PIPELINE_NAMESPACE: ${SDP_PIPELINE_NAMESPACE:-dip}
    volumes:
      - ./configs/generated/dataflow/cm-flow-stream-data-pipeline-cm:/opt/pipeline/config:ro
    command: ["/bin/bash", "-c", "cd /opt/pipeline && ./pipeline-mgmt-server"]

  dataflowtools:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/dataflowtools:${DATAFLOWTOOLS_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - dataflowtools-private
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/coderunner/dataflowtools.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./configs/generated/coderunner/cm-dataflowtools/mq_config.yaml:/sysvol/conf/mq_config.yaml:ro
      - dataflowtools_tmp:/tmp

  coderunner:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/coderunner:${CODERUNNER_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - coderunner-private
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
      dataflowtools:
        condition: service_started
    env_file:
      - .env
      - ./configs/generated/coderunner/coderunner.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - coderunner_pylib:/tmp
      - coderunner_usr_local:/usr/local
    command: ["/bin/bash", "-c", "./init_site_packages.sh && python3 ./src/main.py"]

  doc-convert-gotenberg:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/gotenberg:${DOC_CONVERT_GOTENBERG_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      kweaver-network:
        aliases:
          - doc-convert-private
    expose:
      - "3000"
      - "9998"

  doc-convert-tika:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/tika:${DOC_CONVERT_TIKA_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    network_mode: "service:doc-convert-gotenberg"
    depends_on:
      - doc-convert-gotenberg

  sandbox:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/sandbox-control-plane:${SANDBOX_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
      - ./configs/generated/sandbox/sandbox.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${SANDBOX_HTTP_PORT:-8001}:8000"

  oss-gateway-backend:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/oss-gateway-backend:${OSS_GATEWAY_BACKEND_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      kweaver-core-data-migrator:
        condition: service_completed_successfully
    env_file:
      - .env
      - ./configs/generated/oss-gateway-backend/cm-kw-yaml.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DEVICE_CODE: ""
    volumes:
      - ./configs/generated/oss-gateway-backend/cm-kw-yaml/dm_svc.conf:/tmp/rds_conf/dm_svc.conf:ro

  otelcol-contrib:
    image: ${IMAGE_REGISTRY}/${DIP_NAMESPACE}/opentelemetry-collector-contrib:${OTELCOL_CONTRIB_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      opensearch:
        condition: service_healthy
    command: ["--config=/conf/collector-config.yaml"]
    volumes:
      - ./configs/generated/otelcol-contrib/cm-kw-otelcol-contrib/collector-config.yaml:/conf/collector-config.yaml:ro

  agent-observability:
    image: ${IMAGE_REGISTRY}/agent-observability:${AGENT_OBSERVABILITY_VERSION:?set by ./setup.sh from compose-manifest.yaml}
    restart: unless-stopped
    networks:
      - kweaver-network
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OPENSEARCH_ENDPOINT: http://${OPENSEARCH_HOST:-opensearch}:${OPENSEARCH_PORT:-9200}
      OPENSEARCH_TRACE_INDEX: ${AGENT_OBSERVABILITY_TRACE_INDEX:-ss4o_traces-default-anyshare}
      OPENSEARCH_AUTH_ENABLED: "false"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${KWEAVER_HTTP_PORT:-8080}:8080"
    networks:
      - kweaver-network
    depends_on:
      - mf-model-manager
      - mf-model-api
      - bkn-backend
      - ontology-query
      - vega-backend
      - data-connection
      - vega-gateway
      - vega-gateway-pro
      - mdl-data-model
      - mdl-uniquery
      - mdl-data-model-job
      - agent-operator-integration
      - agent-retrieval
      - agent-backend
      - dataflow
      - flow-stream-data-pipeline
      - coderunner
      - dataflowtools
      - doc-convert-gotenberg
      - doc-convert-tika
      - sandbox
      - oss-gateway-backend
      - otelcol-contrib
      - agent-observability
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  kweaver-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-kweaver-compose}-network

volumes:
  mariadb_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  opensearch_data:
  minio_data:
  dataflow_tmp:
  dataflow_osslog:
  dataflowtools_tmp:
  coderunner_pylib:
  coderunner_usr_local:
